<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
        --bg: #0e0e0e;
        --bg2: #141414;
        --bg3: #1a1a1a;
        --b1: #2a2a2a;
        --b2: #363636;
        --b3: #444444;
        --txt: #d8d8d8;
        --mut: #888880;
        --red: #dd1133;
        --r2: #ff3355;
        --r3: #ff6680;
        --gold: #c89000;
        --g2: #f5b200;
        --g3: #ffe066;
        --cyan: #00c8d4;
        --c2: #00eeff;
        --c3: #80f8ff;
        --grn: #00bb44;
        --gr2: #00ee66;
        --gr3: #80ffaa;
        --ora: #cc5500;
        --or2: #ff8000;
        --pur: #7722cc;
        --p2: #aa55ff;
        --yel: #bbaa00;
        --y2: #ffee00;
        --beb: 'Bebas Neue', cursive;
        --exo: 'Exo 2', sans-serif;
        --jb: 'JetBrains Mono', monospace;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--txt);
        font-family: var(--exo);
    }

    /* scanline overlay */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.012) 3px, rgba(0, 0, 0, 0.012) 4px);
    }

    /* ═══════════ SCREENS ═══════════ */
    html,
    body {
        background-color: var(--bg) !important;
        background-image:
            linear-gradient(rgba(0, 238, 255, 0.03) 1px, transparent 1px),
            linear-gradient(90deg, rgba(0, 238, 255, 0.03) 1px, transparent 1px) !important;
        background-size: 30px 30px !important;
        background-position: center center !important;
        color: var(--txt);
        margin: 0;
        padding: 0;
        min-height: 100vh;
    }

    .scr {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow-y: auto;
        background-color: transparent !important;
    }

    #s-char {
        background: transparent !important;
        background-color: transparent !important;
        background-image: none !important;
    }

    .scr.on {
        display: flex;
    }

    /* ═══════════ NOTIFICATIONS ═══════════ */
    #notifs {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        pointer-events: none;
    }

    .notif {
        font-family: var(--jb);
        font-size: 11px;
        padding: 8px 20px;
        letter-spacing: 1px;
        animation: nslide .3s ease-out;
        border: 1px solid;
        max-width: 400px;
        text-align: center;
        border-radius: 4px;
        backdrop-filter: blur(4px);
        box-shadow: 0 3px 12px rgba(0, 0, 0, .35);
    }

    @keyframes nslide {
        from {
            opacity: 0;
            transform: translateY(-8px);
        }

        to {
            opacity: 1;
            transform: none;
        }
    }

    .ng {
        color: #00cc44;
        border-color: rgba(0, 180, 60, .5);
        background: rgba(10, 90, 35, .88);
        font-weight: 600;
    }

    .nb {
        color: #ff5577;
        border-color: rgba(220, 30, 60, .5);
        background: rgba(100, 15, 25, .88);
        font-weight: 600;
    }

    .ni {
        color: #00ddff;
        border-color: rgba(0, 180, 210, .4);
        background: rgba(10, 55, 80, .88);
        font-weight: 600;
    }

    .np {
        color: #cc88ff;
        border-color: rgba(140, 60, 220, .5);
        background: rgba(50, 10, 90, .88);
        font-weight: 600;
    }

    .nw {
        color: #ffe044;
        border-color: rgba(210, 170, 0, .5);
        background: rgba(80, 60, 5, .88);
        font-weight: 600;
    }

    /* ═══════════ TITLE ═══════════ */
    #s-title {
        background:
            radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200, 0, 50, .1) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0, 200, 212, .06) 0%, transparent 50%),
            var(--bg);
    }

    .title-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: relative;
    }

    .title-iperc {
        font-family: var(--beb);
        font-size: clamp(60px, 12vw, 120px);
        letter-spacing: 12px;
        line-height: 1;
        background: linear-gradient(135deg, #ffe066, #f5b200, #cc8800);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(245, 178, 0, .4));
        text-shadow: none;
    }

    .title-zone {
        font-family: var(--beb);
        font-size: clamp(24px, 5vw, 50px);
        letter-spacing: 20px;
        color: var(--c2);
        text-shadow: 0 0 20px rgba(0, 238, 255, .5);
        margin-bottom: 4px;
    }

    .title-tag {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--mut);
        letter-spacing: 5px;
        margin-bottom: 28px;
        border: 1px solid var(--b2);
        padding: 4px 14px;
    }

    .title-desc {
        font-family: var(--exo);
        font-size: 14px;
        color: var(--mut);
        line-height: 1.8;
        max-width: 500px;
        text-align: center;
        margin-bottom: 30px;
        font-weight: 300;
    }

    .title-phases {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .ph-chip {
        font-family: var(--jb);
        font-size: 9px;
        padding: 5px 14px;
        border: 1px solid;
        letter-spacing: 2px;
    }

    .ph-red {
        color: var(--r2);
        border-color: rgba(220, 20, 50, .4);
        background: rgba(80, 0, 15, .5);
    }

    .ph-yel {
        color: var(--y2);
        border-color: rgba(200, 180, 0, .4);
        background: rgba(60, 50, 0, .5);
    }

    .ph-grn {
        color: var(--gr2);
        border-color: rgba(0, 200, 68, .3);
        background: rgba(0, 50, 15, .5);
    }

    .btn-main {
        font-family: var(--beb);
        font-size: clamp(16px, 2.5vw, 22px);
        letter-spacing: 4px;
        border: 2px solid var(--g2);
        cursor: pointer;
        background: linear-gradient(135deg, rgba(200, 144, 0, .15), rgba(245, 178, 0, .25));
        color: var(--g3);
        padding: 14px 50px;
        transition: all .2s;
        position: relative;
        overflow: hidden;
    }

    .btn-main::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(245, 178, 0, 0), rgba(245, 178, 0, .15));
        opacity: 0;
        transition: .2s;
    }

    .btn-main:hover::before {
        opacity: 1;
    }

    .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(245, 178, 0, .3);
    }

    .deco-line {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
    }

    .dl {
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, transparent, var(--b3));
    }

    .dr {
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, var(--b3), transparent);
    }

    .dd {
        width: 8px;
        height: 8px;
        background: var(--g2);
        transform: rotate(45deg);
    }

    .hof-score {
        font-family: var(--jb);
        font-size: 10px;
        color: var(--mut);
        letter-spacing: 2px;
    }

    /* ═══════════ LEVEL SELECT / MAP ═══════════ */
    #s-map {
        background:
            radial-gradient(ellipse 70% 50% at 50% 50%, rgba(0, 100, 200, .05), transparent 60%),
            var(--bg);
    }

    .map-header {
        text-align: center;
        margin-bottom: 20px;
    }

    .map-title {
        font-family: var(--beb);
        font-size: clamp(18px, 3vw, 28px);
        letter-spacing: 4px;
        color: var(--c2);
    }

    .map-hero-card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 10px 18px;
        margin-bottom: 20px;
    }

    .mhc-av {
        font-size: 32px;
    }

    .mhc-name {
        font-family: var(--beb);
        font-size: 16px;
        letter-spacing: 2px;
        color: var(--c2);
    }

    .mhc-stats {
        display: flex;
        gap: 14px;
        margin-top: 4px;
    }

    .mhcs {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--mut);
    }

    .mhcs span {
        color: var(--txt);
    }

    .levels-track {
        display: flex;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 800px;
        justify-content: center;
    }

    .lnode {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 10px;
        transition: all .2s;
        flex: 0 0 auto;
    }

    .lnc {
        width: clamp(64px, 9vw, 88px);
        height: clamp(64px, 9vw, 88px);
        border-radius: 50%;
        border: 2px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(22px, 3.5vw, 34px);
        transition: all .2s;
        background: rgba(0, 0, 0, .7);
        position: relative;
    }

    .lnc.locked {
        border-color: var(--b1);
        opacity: .35;
        filter: grayscale(1);
        cursor: not-allowed;
    }

    .lnc.current {
        border-color: var(--c2);
        animation: cpulse 1.5s ease-in-out infinite;
    }

    @keyframes cpulse {

        0%,
        100% {
            box-shadow: 0 0 16px rgba(0, 238, 255, .5);
        }

        50% {
            box-shadow: 0 0 36px rgba(0, 238, 255, .8), 0 0 60px rgba(0, 238, 255, .2);
        }
    }

    .lnc.done {
        border-color: var(--gr2);
        background: rgba(0, 100, 40, .2);
    }

    .lnc-phase-tag {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--jb);
        font-size: 6px;
        letter-spacing: 1px;
        padding: 2px 6px;
        border: 1px solid;
        white-space: nowrap;
    }

    .pt-red {
        color: var(--r2);
        border-color: var(--red);
        background: rgba(60, 0, 10, .9);
    }

    .pt-ora {
        color: var(--or2);
        border-color: var(--ora);
        background: rgba(50, 20, 0, .9);
    }

    .pt-yel {
        color: var(--y2);
        border-color: var(--yel);
        background: rgba(50, 40, 0, .9);
    }

    .pt-boss {
        color: #ff55ff;
        border-color: #aa00aa;
        background: rgba(40, 0, 40, .9);
    }

    .lnn {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--mut);
        letter-spacing: 1px;
        text-align: center;
        max-width: 85px;
        line-height: 1.4;
    }

    .lnn.current {
        color: var(--c2);
    }

    .lnn.done {
        color: var(--gr2);
    }

    .lconn {
        height: 2px;
        flex: 1;
        max-width: 60px;
    }

    .lconn.done {
        background: linear-gradient(90deg, var(--gr2), var(--g2));
    }

    .lconn.locked {
        background: var(--b1);
    }

    .risk-preview {
        background: rgba(0, 0, 0, .4);
        border: 1px solid var(--b2);
        padding: 12px 20px;
        max-width: 600px;
        margin-top: 16px;
        font-family: var(--jb);
        font-size: 10px;
        letter-spacing: 1px;
    }

    .rp-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 8px;
    }

    .rp-item {
        display: flex;
        flex-direction: column;
        gap: 3px;
        flex: 1;
    }

    .rp-label {
        font-size: 7px;
        color: var(--mut);
        letter-spacing: 2px;
    }

    .rp-val {
        font-size: 14px;
        font-family: var(--beb);
        letter-spacing: 2px;
    }

    /* ═══════════ SHARED GAME UI ═══════════ */
    #s-game {
        position: fixed;
        inset: 0;
        padding: 0;
    }

    #ghud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
        overflow: hidden;
        padding: 4px 10px;
        background: #ffffff;
        border-bottom: 2px solid #cccccc;
        height: 44px;
    }

    .hitem {
        display: flex;
        flex-direction: column;
        gap: 0px;
        min-width: 0;
        flex-shrink: 1;
    }

    .hlbl {
        font-family: var(--jb);
        font-size: 5.5px;
        color: rgba(60, 55, 50, .8);
        letter-spacing: 1.5px;
        white-space: nowrap;
    }

    .hbar {
        height: 6px;
        background: rgba(0, 0, 0, .12);
        border: 1px solid rgba(0, 0, 0, .18);
        overflow: hidden;
        width: 70px;
    }

    .hfill {
        height: 100%;
        transition: width .5s ease;
    }

    .hval {
        font-family: var(--beb);
        font-size: 10px;
        letter-spacing: 1px;
        white-space: nowrap;
    }

    .hsep {
        width: 1px;
        height: 22px;
        background: rgba(0, 0, 0, .18);
        flex-shrink: 0;
    }

    .hstage-name {
        font-family: var(--beb);
        font-size: clamp(9px, 1.4vw, 13px);
        color: var(--gold);
        letter-spacing: 2px;
        margin-left: auto;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .hkeys {
        font-family: var(--jb);
        font-size: 6px;
        color: rgba(60, 55, 50, .75);
        line-height: 1.6;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .kb {
        display: inline-block;
        background: rgba(0, 0, 0, .08);
        border: 1px solid rgba(0, 0, 0, .2);
        padding: 1px 4px;
        border-radius: 2px;
        color: rgba(30, 28, 25, .9);
    }

    #gameCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Victory overlay — fixed at root, above everything */
    #vic-ov {
        position: fixed;
        inset: 0;
        z-index: 5000;
        background: rgba(6, 8, 16, .97);
        display: none;
        align-items: center;
        justify-content: center;
    }

    #vic-ov.show {
        display: flex;
    }

    .vic-box {
        text-align: center;
        padding: clamp(1.5rem, 3vw, 2.5rem) clamp(2rem, 4vw, 3rem);
        max-width: 560px;
        width: 92%;
        background: rgba(6, 12, 24, .99);
        border: 1px solid var(--b3);
    }

    .vic-phase-label {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--cyan);
        letter-spacing: 4px;
        margin-bottom: 8px;
    }

    .vic-title {
        font-family: var(--beb);
        font-size: clamp(26px, 4.5vw, 38px);
        color: var(--g2);
        letter-spacing: 4px;
        margin-bottom: 4px;
        text-shadow: 0 0 20px rgba(245, 178, 0, .5);
    }

    .vic-subtitle {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--mut);
        letter-spacing: 3px;
        margin-bottom: 18px;
    }

    .vic-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 14px;
    }

    .vs-item {
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 10px 8px;
        text-align: center;
    }

    .vs-val {
        font-family: var(--beb);
        font-size: clamp(18px, 3vw, 26px);
        letter-spacing: 2px;
    }

    .vs-lbl {
        font-family: var(--jb);
        font-size: 6px;
        color: var(--mut);
        letter-spacing: 1px;
        margin-top: 2px;
    }

    .vic-iperc-box {
        background: rgba(0, 100, 40, .08);
        border: 1px solid rgba(0, 200, 68, .2);
        padding: 10px 14px;
        font-family: var(--jb);
        font-size: 9px;
        color: var(--gr2);
        line-height: 1.7;
        margin-bottom: 10px;
        text-align: left;
    }

    .vic-lesson {
        background: rgba(200, 150, 0, .06);
        border: 1px solid rgba(200, 150, 0, .2);
        padding: 10px 14px;
        font-size: 12px;
        color: var(--g2);
        line-height: 1.6;
        margin-bottom: 18px;
        text-align: left;
    }

    .vic-next-info {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--c2);
        letter-spacing: 2px;
        margin-bottom: 14px;
    }

    .vic-btn {
        font-family: var(--beb);
        font-size: 18px;
        letter-spacing: 4px;
        border: 2px solid;
        cursor: pointer;
        padding: 12px 36px;
        transition: all .2s;
    }

    .vic-btn-grn {
        border-color: var(--gr2);
        color: var(--gr2);
        background: rgba(0, 100, 40, .15);
    }

    .vic-btn-grn:hover {
        background: rgba(0, 100, 40, .3);
        transform: translateY(-2px);
    }

    .vic-btn-red {
        border-color: var(--r2);
        color: var(--r2);
        background: rgba(80, 0, 15, .15);
    }

    .vic-btn-red:hover {
        background: rgba(80, 0, 15, .3);
        transform: translateY(-2px);
    }

    /* ═══════════ RISK METER HUD ═══════════ */
    #risk-meter {
        position: fixed;
        top: 46px;
        right: 10px;
        z-index: 40;
        width: 160px;
        display: none;
        background: rgba(200, 240, 220, .96);
        border: 1px solid rgba(0, 140, 80, .25);
        padding: 10px;
    }

    .rm-title {
        font-family: var(--jb);
        font-size: 7px;
        color: rgba(0, 80, 40, .8);
        letter-spacing: 2px;
        margin-bottom: 8px;
    }

    .rm-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .rm-label {
        font-family: var(--jb);
        font-size: 7px;
        color: rgba(0, 70, 35, .8);
    }

    .rm-val {
        font-family: var(--beb);
        font-size: 12px;
        letter-spacing: 1px;
    }

    .rm-bar {
        height: 6px;
        background: rgba(0, 0, 0, .1);
        border: 1px solid rgba(0, 100, 50, .2);
        margin-bottom: 6px;
    }

    .rm-fill {
        height: 100%;
        transition: width .6s ease;
    }

    .rm-badge {
        font-family: var(--jb);
        font-size: 8px;
        padding: 3px 10px;
        border: 1px solid;
        text-align: center;
        margin-top: 6px;
        letter-spacing: 2px;
    }

    .rmb-AC {
        color: var(--gr2);
        border-color: rgba(0, 200, 68, .5);
    }

    .rmb-MO {
        color: var(--y2);
        border-color: rgba(200, 180, 0, .5);
    }

    .rmb-IM {
        color: var(--or2);
        border-color: rgba(200, 80, 0, .5);
    }

    .rmb-IN {
        color: var(--r2);
        border-color: rgba(200, 0, 40, .5);
    }

    /* ═══════════ CHAR SELECT — EPIC HERO STYLE ═══════════ */
    #s-char {
        background:
            radial-gradient(ellipse 120% 60% at 50% 100%, rgba(0, 60, 180, .22) 0%, transparent 55%),
            radial-gradient(ellipse 80% 40% at 20% 50%, rgba(0, 80, 200, .10) 0%, transparent 50%),
            radial-gradient(ellipse 80% 40% at 80% 50%, rgba(0, 60, 180, .10) 0%, transparent 50%),
            linear-gradient(180deg, #060e2a 0%, #0a1640 40%, #060e28 100%);
        overflow-y: auto;
    }

    .cs-title {
        font-family: var(--beb);
        font-size: clamp(28px, 5vw, 52px);
        letter-spacing: 8px;
        margin-bottom: 2px;
        background: linear-gradient(135deg, #ffffff, #ffe88a, #f5c200);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(255, 200, 0, .5));
        text-align: center;
    }

    .cs-sub {
        font-family: var(--jb);
        font-size: 9px;
        color: rgba(180, 220, 255, .6);
        letter-spacing: 5px;
        margin-bottom: 28px;
        text-align: center;
    }

    .chars-row {
        display: flex;
        gap: 0;
        justify-content: center;
        flex-wrap: nowrap;
        max-width: 1000px;
        width: 100%;
        align-items: stretch;
    }

    /* Hero card */
    .cc {
        width: clamp(140px, 20vw, 220px);
        background: linear-gradient(170deg, rgba(30, 5, 2, .98) 0%, rgba(10, 0, 0, .99) 100%);
        border: 1px solid rgba(255, 60, 0, .2);
        cursor: pointer;
        text-align: center;
        transition: all .28s cubic-bezier(.2, .8, .3, 1);
        position: relative;
        overflow: hidden;
        clip-path: polygon(0 0, 100% 0, 100% 92%, 90% 100%, 0 100%);
        flex: 1;
    }

    /* Angled side separator */
    .cc+.cc {
        border-left: none;
    }

    .cc::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(160deg, rgba(255, 80, 0, 0) 50%, rgba(255, 40, 0, .06) 100%);
        transition: .3s;
    }

    .cc:hover::before,
    .cc.sel::before {
        background: linear-gradient(160deg, rgba(255, 100, 20, .08) 0%, rgba(255, 40, 0, .18) 100%);
    }

    /* Bottom diagonal cut shadow */
    .cc::after {
        content: '';
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 3px;
        background: linear-gradient(90deg, transparent, rgba(255, 80, 0, .0));
        transition: .3s;
    }

    .cc:hover {
        transform: translateY(-10px) scale(1.03);
        border-color: rgba(255, 100, 30, .6);
        z-index: 2;
        box-shadow: 0 20px 60px rgba(200, 30, 0, .4), 0 0 0 1px rgba(255, 80, 0, .3);
    }

    .cc.sel {
        border-color: rgba(255, 120, 40, .9);
        transform: translateY(-12px) scale(1.05);
        z-index: 3;
        box-shadow: 0 24px 70px rgba(255, 60, 0, .5), 0 0 0 2px rgba(255, 100, 20, .5), inset 0 0 40px rgba(255, 40, 0, .06);
    }

    .cc.sel::after {
        background: linear-gradient(90deg, transparent, rgba(255, 120, 40, .9), transparent);
    }

    /* Hero portrait area */
    .cc-portrait {
        width: 100%;
        height: clamp(130px, 18vw, 200px);
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        background: linear-gradient(180deg, rgba(255, 40, 0, .05) 0%, rgba(0, 0, 0, 0) 100%);
    }

    .cc-portrait-bg {
        position: absolute;
        inset: 0;
        background: radial-gradient(ellipse 80% 80% at 50% 60%, var(--char-aura, rgba(255, 80, 0, .15)) 0%, transparent 70%);
    }

    .cc-portrait-lines {
        position: absolute;
        bottom: 0;
        left: 0;
        right: 0;
        height: 40%;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(255, 255, 255, .015) 3px, rgba(255, 255, 255, .015) 4px);
    }

    .cc-av {
        font-size: clamp(64px, 9vw, 100px);
        display: block;
        position: relative;
        z-index: 1;
        animation: heroFloat 3s ease-in-out infinite;
        filter: drop-shadow(0 0 20px var(--char-aura-solid, rgba(255, 80, 0, .6)));
    }

    @keyframes heroFloat {

        0%,
        100% {
            transform: translateY(0) scale(1);
        }

        50% {
            transform: translateY(-8px) scale(1.04);
        }
    }

    .cc.sel .cc-av {
        filter: drop-shadow(0 0 32px var(--char-aura-solid, rgba(255, 100, 30, .9))) drop-shadow(0 0 60px var(--char-aura-solid, rgba(255, 60, 0, .4)));
    }

    /* Corner badge */
    .cc-chk {
        position: absolute;
        top: 0;
        right: 0;
        width: 32px;
        height: 32px;
        background: rgba(0, 0, 0, .5);
        border-bottom: 1px solid rgba(255, 60, 0, .3);
        border-left: 1px solid rgba(255, 60, 0, .3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 12px;
        clip-path: polygon(100% 0, 100% 100%, 0 100%);
        transition: .2s;
    }

    .cc.sel .cc-chk {
        background: rgba(255, 80, 0, .8);
        color: #fff;
    }

    /* Info area */
    .cc-info {
        padding: 10px 10px 14px;
    }

    .cc-name {
        font-family: var(--beb);
        font-size: clamp(13px, 1.8vw, 18px);
        letter-spacing: 3px;
        margin-bottom: 1px;
        text-shadow: 0 0 20px currentColor;
    }

    .cc-role {
        font-family: var(--jb);
        font-size: 6px;
        color: rgba(255, 150, 80, .7);
        letter-spacing: 3px;
        margin-bottom: 8px;
        text-transform: uppercase;
    }

    /* Stat bars */
    .cc-stat-bars {
        margin-bottom: 8px;
    }

    .csb-row {
        display: flex;
        align-items: center;
        gap: 5px;
        margin-bottom: 3px;
    }

    .csb-lbl {
        font-family: var(--jb);
        font-size: 5.5px;
        color: rgba(200, 140, 100, .6);
        min-width: 52px;
        text-align: left;
        text-transform: uppercase;
    }

    .csb-bg {
        flex: 1;
        height: 3px;
        background: rgba(255, 255, 255, .07);
        border-radius: 2px;
    }

    .csb-fill {
        height: 100%;
        border-radius: 2px;
    }

    /* Bonus tag */
    .cc-bonus {
        font-family: var(--jb);
        font-size: 7px;
        color: #ffcc88;
        background: rgba(255, 100, 0, .1);
        border: 1px solid rgba(255, 100, 0, .25);
        border-radius: 2px;
        padding: 4px 7px;
        margin-bottom: 6px;
        text-align: left;
    }

    .cc-desc {
        font-size: 9px;
        color: rgba(180, 130, 110, .7);
        line-height: 1.5;
        text-align: left;
        border-top: 1px solid rgba(255, 60, 0, .1);
        padding-top: 6px;
    }

    /* Confirm button */
    #btn-confirm {
        font-family: var(--beb);
        font-size: clamp(14px, 2vw, 20px);
        letter-spacing: 5px;
        border: 2px solid rgba(255, 80, 0, .4);
        color: rgba(255, 150, 80, .4);
        background: rgba(255, 40, 0, .05);
        padding: 14px 56px;
        cursor: pointer;
        margin-top: 24px;
        opacity: .4;
        pointer-events: none;
        transition: all .25s;
        clip-path: polygon(8px 0, 100% 0, calc(100% - 8px) 100%, 0 100%);
    }

    #btn-confirm.on {
        opacity: 1;
        pointer-events: all;
        color: #fff;
        border-color: rgba(255, 100, 30, .9);
        background: rgba(255, 50, 0, .2);
    }

    #btn-confirm.on:hover {
        background: rgba(255, 60, 0, .35);
        transform: translateY(-3px);
        box-shadow: 0 12px 40px rgba(255, 50, 0, .4);
    }

    /* ═══════════ FINAL SCREEN ═══════════ */
    #s-final {
        background: radial-gradient(ellipse 80% 60% at 50% 50%, rgba(0, 100, 40, .08), transparent 60%), var(--bg);
        justify-content: flex-start !important;
        padding-top: 20px !important;
        padding-bottom: 40px !important;
        overflow-y: auto !important;
    }

    .final-box {
        max-width: 620px;
        width: 92%;
        background: rgba(6, 12, 24, .99);
        border: 1px solid var(--b3);
        padding: clamp(1.2rem, 3vw, 2.2rem);
        margin: 0 auto;
    }

    .final-title {
        font-family: var(--beb);
        font-size: clamp(30px, 5vw, 48px);
        letter-spacing: 5px;
        margin-bottom: 6px;
    }

    .final-sub {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--mut);
        letter-spacing: 4px;
        margin-bottom: 24px;
    }

    .final-iperc-result {
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 18px;
        margin-bottom: 18px;
    }

    .fir-title {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--mut);
        letter-spacing: 3px;
        margin-bottom: 14px;
    }

    .fir-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 6px 0;
        border-bottom: 1px solid rgba(255, 255, 255, .04);
    }

    .fir-label {
        font-family: var(--exo);
        font-size: 12px;
        color: var(--mut);
    }

    .fir-val {
        font-family: var(--beb);
        font-size: 18px;
        letter-spacing: 2px;
    }

    .fir-arrow {
        font-size: 20px;
        color: var(--b3);
    }

    .final-grid {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 8px;
        margin-bottom: 18px;
    }

    .fg-item {
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 12px;
        text-align: center;
    }

    .fg-val {
        font-family: var(--beb);
        font-size: clamp(20px, 3.5vw, 28px);
        letter-spacing: 2px;
    }

    .fg-lbl {
        font-family: var(--jb);
        font-size: 6px;
        color: var(--mut);
        letter-spacing: 1px;
        margin-top: 2px;
    }

    .final-msg {
        font-size: 13px;
        line-height: 1.7;
        margin-bottom: 22px;
        color: var(--mut);
    }

    .final-btns {
        display: flex;
        gap: 10px;
        justify-content: center;
        flex-wrap: wrap;
    }

    .fbtn {
        font-family: var(--beb);
        font-size: 16px;
        letter-spacing: 3px;
        border: 2px solid;
        cursor: pointer;
        padding: 12px 32px;
        transition: .2s;
    }

    .fbtn-g {
        border-color: var(--gr2);
        color: var(--gr2);
        background: rgba(0, 80, 30, .15);
    }

    .fbtn-g:hover {
        background: rgba(0, 80, 30, .3);
        transform: translateY(-2px);
    }

    .fbtn-b {
        border-color: var(--b3);
        color: var(--txt);
        background: rgba(0, 0, 0, .3);
    }

    .fbtn-b:hover {
        background: rgba(0, 0, 0, .5);
        transform: translateY(-2px);
    }

    /* ═══════════ SECRET DOOR QUIZ ═══════════ */
    #quiz-modal {
        position: fixed;
        inset: 0;
        z-index: 8000;
        background: rgba(4, 6, 14, 0.65);
        /* Fondo exterior más limpio */
        backdrop-filter: blur(12px);
        /* Efecto cristal borroso moderno */
        -webkit-backdrop-filter: blur(12px);
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 20px;
        opacity: 0;
        transition: opacity 0.3s ease;
    }

    #quiz-modal.on {
        display: flex;
        opacity: 1;
        animation: qzFadeIn 0.4s cubic-bezier(0.1, 0.8, 0.2, 1) forwards;
    }

    @keyframes qzFadeIn {
        from {
            transform: scale(0.95);
            opacity: 0;
        }

        to {
            transform: scale(1);
            opacity: 1;
        }
    }

    .qz-header {
        text-align: center;
        margin-bottom: 20px;
        background: radial-gradient(circle at top, rgba(0, 238, 255, 0.15), transparent 70%);
        padding: 15px 30px;
        border-radius: 12px;
        border-top: 1px solid rgba(0, 238, 255, 0.3);
    }

    .qz-door-icon {
        font-size: 42px;
        margin-bottom: 8px;
        animation: qzdoor 2s ease-in-out infinite;
    }

    @keyframes qzdoor {

        0%,
        100% {
            filter: drop-shadow(0 0 10px rgba(0, 238, 255, 0.6));
        }

        50% {
            filter: drop-shadow(0 0 25px rgba(0, 255, 200, 1));
        }
    }

    .qz-title {
        font-family: var(--beb);
        font-size: clamp(24px, 4vw, 36px);
        letter-spacing: 5px;
        background: linear-gradient(135deg, #00eeff, #ffffff);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 6px;
    }

    .qz-subtitle {
        font-family: var(--jb);
        font-size: 9px;
        color: #88aacc;
        letter-spacing: 3px;
        margin-bottom: 12px;
    }

    .qz-timer-bar-wrap {
        width: 340px;
        max-width: 90vw;
        height: 6px;
        background: rgba(0, 0, 0, 0.6);
        border: 1px solid rgba(0, 238, 255, 0.3);
        border-radius: 4px;
        margin: 0 auto 6px auto;
        overflow: hidden;
    }

    .qz-timer-fill {
        height: 100%;
        background: linear-gradient(90deg, #0088aa, #00eeff);
        transition: width .2s linear;
        box-shadow: 0 0 8px rgba(0, 238, 255, 0.6);
    }

    .qz-timer-label {
        font-family: var(--jb);
        font-size: 10px;
        color: #00eeff;
        letter-spacing: 2px;
    }

    .qz-box {
        width: 100%;
        max-width: 600px;
        background: rgba(10, 15, 25, 0.75);
        /* Cristal interior */
        border: 1px solid rgba(0, 238, 255, 0.3);
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.4), inset 0 0 20px rgba(0, 238, 255, 0.05);
        border-radius: 12px;
        padding: clamp(20px, 4vw, 35px);
        backdrop-filter: blur(10px);
    }

    .qz-q-num {
        font-family: var(--jb);
        font-size: 8px;
        color: #00eeff;
        letter-spacing: 4px;
        margin-bottom: 8px;
        text-transform: uppercase;
    }

    .qz-question {
        font-family: var(--exo);
        font-size: clamp(14px, 2.5vw, 17px);
        color: #ffffff;
        line-height: 1.6;
        margin-bottom: 20px;
        font-weight: 500;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.5);
    }

    .qz-options {
        display: flex;
        flex-direction: column;
        gap: 10px;
        margin-bottom: 20px;
    }

    .qz-opt {
        font-family: var(--exo);
        font-size: clamp(12px, 2vw, 15px);
        padding: 12px 18px;
        border: 1px solid rgba(0, 238, 255, 0.2);
        background: rgba(0, 20, 30, 0.6);
        color: #ddeeff;
        cursor: pointer;
        text-align: left;
        border-radius: 6px;
        transition: all 0.2s cubic-bezier(0.1, 0.8, 0.2, 1);
        line-height: 1.4;
        position: relative;
        overflow: hidden;
    }

    .qz-opt:hover {
        border-color: rgba(0, 238, 255, 0.8);
        background: rgba(0, 238, 255, 0.1);
        transform: translateX(6px);
        box-shadow: -4px 0 15px rgba(0, 238, 255, 0.2);
    }

    .qz-opt.selected {
        border-color: #00eeff;
        background: rgba(0, 238, 255, 0.2);
        color: #ffffff;
        font-weight: 600;
    }

    .qz-opt.correct {
        border-color: #00ee66;
        background: rgba(0, 238, 102, 0.2);
        color: #00ee66;
        box-shadow: 0 0 15px rgba(0, 238, 102, 0.3);
    }

    .qz-opt.wrong {
        border-color: #ff3355;
        background: rgba(255, 51, 85, 0.2);
        color: #ff3355;
    }

    .qz-opt:disabled,
    .qz-opt[disabled] {
        cursor: not-allowed;
        opacity: 0.5;
        transform: none;
        box-shadow: none;
    }

    .qz-progress {
        display: flex;
        gap: 10px;
        justify-content: center;
        margin-bottom: 20px;
    }

    .qz-dot {
        width: 12px;
        height: 4px;
        border-radius: 2px;
        background: rgba(255, 255, 255, 0.2);
        transition: 0.3s ease;
    }

    .qz-dot.done {
        background: #00ee66;
        box-shadow: 0 0 8px rgba(0, 238, 102, 0.6);
    }

    .qz-dot.active {
        background: #00eeff;
        box-shadow: 0 0 10px rgba(0, 238, 255, 0.8);
        width: 24px;
    }

    .qz-dot.fail {
        background: #ff3355;
        box-shadow: 0 0 8px rgba(255, 51, 85, 0.6);
    }

    .qz-feedback {
        font-family: var(--jb);
        font-size: 11px;
        text-align: center;
        min-height: 20px;
        letter-spacing: 1px;
        margin-bottom: 15px;
    }

    .qz-btn-next {
        font-family: var(--beb);
        font-size: 18px;
        letter-spacing: 3px;
        border: none;
        border-radius: 4px;
        color: #111;
        background: #00eeff;
        padding: 12px 35px;
        cursor: pointer;
        transition: 0.2s;
        display: none;
        box-shadow: 0 4px 15px rgba(0, 238, 255, 0.4);
    }

    .qz-btn-next:hover {
        background: #ffffff;
        transform: translateY(-2px);
        box-shadow: 0 6px 20px rgba(0, 238, 255, 0.6);
    }

    .qz-result {
        text-align: center;
        padding: 20px;
        display: none;
    }

    .qz-result-icon {
        font-size: 64px;
        margin-bottom: 15px;
        filter: drop-shadow(0 0 15px rgba(0, 238, 255, 0.5));
    }

    .qz-result-title {
        font-family: var(--beb);
        font-size: 32px;
        letter-spacing: 4px;
        color: #ffffff;
        margin-bottom: 10px;
    }

    .qz-result-msg {
        font-family: var(--exo);
        font-size: 14px;
        color: #b0c4de;
        line-height: 1.6;
        margin-bottom: 25px;
    }

    .qz-result-btn {
        font-family: var(--beb);
        font-size: 16px;
        letter-spacing: 2px;
        border: 2px solid;
        border-radius: 4px;
        cursor: pointer;
        padding: 12px 25px;
        transition: 0.2s;
    }

    .qz-result-btn-tp {
        border-color: #00eeff;
        color: #00eeff;
        background: rgba(0, 238, 255, 0.1);
    }

    .qz-result-btn-tp:hover {
        background: #00eeff;
        color: #111;
        box-shadow: 0 0 20px rgba(0, 238, 255, 0.5);
    }

    .qz-result-btn-close {
        border-color: #556677;
        color: #aaccdd;
        background: transparent;
    }

    .qz-result-btn-close:hover {
        background: rgba(255, 255, 255, 0.1);
        color: #ffffff;
    }

    #sdoor-hint {
        position: fixed;
        bottom: 50px;
        left: 50%;
        /* Centrado en pantalla */
        transform: translateX(-50%);
        z-index: 200;
        font-family: var(--jb);
        font-size: 10px;
        color: #00eeff;
        letter-spacing: 2px;
        pointer-events: none;
        display: none;
        background: rgba(4, 10, 20, 0.9);
        border: 1px solid rgba(0, 238, 255, 0.5);
        border-radius: 6px;
        padding: 8px 16px;
        box-shadow: 0 0 15px rgba(0, 238, 255, 0.3);
        animation: sdpulse 1.5s ease-in-out infinite;
    }

    @keyframes sdpulse {

        0%,
        100% {
            opacity: 0.6;
            box-shadow: 0 0 5px rgba(0, 238, 255, 0.2);
        }

        50% {
            opacity: 1;
            box-shadow: 0 0 20px rgba(0, 238, 255, 0.6);
        }
    }

    /* --- ESTILOS DEL NUEVO MENÚ --- */
    .btn-menu {
        font-family: var(--beb);
        font-size: 20px;
        letter-spacing: 2px;
        padding: 15px 40px;
        width: 300px;
        border: none;
        cursor: pointer;
        transition: all 0.3s ease;
        text-align: center;
    }

    .btn-primary {
        background-color: var(--cyan);
        color: var(--bg);
        font-weight: 900;
    }

    .btn-primary:hover {
        background-color: var(--c3);
        transform: scale(1.05);
    }

    .btn-secondary {
        background-color: transparent;
        color: var(--txt);
        border: 2px solid var(--b3);
    }

    .btn-secondary:hover {
        border-color: var(--cyan);
        color: var(--cyan);
    }

    /* --- ESTILOS DEL MODAL (MANUAL) --- */
    .modal-overlay {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        background-color: rgba(0, 0, 0, 0.85);
        z-index: 9999;
        display: flex;
        justify-content: center;
        align-items: center;
        backdrop-filter: blur(4px);
    }

    .modal-content {
        background-color: var(--bg2);
        border: 1px solid var(--b3);
        padding: 40px;
        width: 90%;
        max-width: 500px;
        box-shadow: 0px 10px 30px rgba(0, 0, 0, 0.8);
        text-align: center;
    }

    /* ─── TARJETA DE SELECCIÓN MEJORADA ─── */
    .char-card {
        position: relative;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.08);
        background: rgba(20, 20, 20, 0.6);
        border-radius: 6px;
        padding: 24px 16px;
        transition: all 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        cursor: pointer;
    }

    /* Cuando pasas el mouse, la tarjeta brilla con el color único del personaje */
    .char-card:hover {
        transform: translateY(-4px);
        border-color: var(--char-color);
        box-shadow: 0 12px 30px rgba(0, 0, 0, 0.5), 0 0 15px calc(var(--char-color));
    }

    /* ─── CUADRO DEL AVATAR HOLOGRÁFICO ─── */
    .c-avatar-frame {
        position: relative;
        width: 90px;
        height: 90px;
        margin: 0 auto 18px;
        background: rgba(0, 0, 0, 0.4);
        border: 2px dashed rgba(255, 255, 255, 0.15);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.3s ease;
    }

    .char-card:hover .c-avatar-frame {
        border: 2px solid var(--char-color);
        background: rgba(0, 0, 0, 0.7);
        border-radius: 8px;
        /* Se transforma de círculo a cuadrado tecnológico */
    }

    /* Efecto de resplandor interno */
    .c-avatar-glow {
        position: absolute;
        width: 70%;
        height: 70%;
        background: var(--char-color);
        opacity: 0.05;
        filter: blur(12px);
        border-radius: 50%;
        transition: opacity 0.3s;
    }

    .char-card:hover .c-avatar-glow {
        opacity: 0.25;
    }

    /* Texto de código tipo terminal de computadora (INS-01, ANA-02...) */
    .c-avatar-code {
        font-family: var(--jb);
        font-size: 13px;
        font-weight: bold;
        color: rgba(255, 255, 255, 0.4);
        letter-spacing: 1px;
        z-index: 2;
        transition: color 0.3s;
    }

    .char-card:hover .c-avatar-code {
        color: var(--char-color);
        text-shadow: 0 0 8px var(--char-color);
    }

    /* Línea de escáner láser animada que sube y baja */
    .c-avatar-scanner {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 2px;
        background: linear-gradient(90deg, transparent, var(--char-color), transparent);
        opacity: 0;
        z-index: 3;
    }

    .char-card:hover .c-avatar-scanner {
        opacity: 0.8;
        animation: scanLines 2s linear infinite;
    }

    @keyframes scanLines {
        0% {
            top: 0%;
        }

        50% {
            top: 100%;
        }

        100% {
            top: 0%;
        }
    }

    /* ─── MODIFICACIÓN DEL POP-UP (SIN EMOJIS) ─── */
    .char-tooltip {
        position: absolute;
        bottom: 0;
        left: 0;
        width: 100%;
        background: rgba(10, 10, 10, 0.95);
        border-top: 3px solid var(--char-color);
        padding: 20px 15px;
        box-sizing: border-box;
        transform: translateY(101%);
        transition: transform 0.3s cubic-bezier(0.25, 1, 0.5, 1);
        z-index: 20;
        display: flex;
        flex-direction: column;
        gap: 8px;
    }

    .char-card:hover .char-tooltip {
        transform: translateY(0);
    }

    .ct-title {
        font-family: var(--beb);
        font-size: 15px;
        color: var(--char-color);
        /* Título del color del personaje */
        letter-spacing: 2px;
        margin-bottom: 6px;
        font-weight: 900;
        text-shadow: 0 0 5px rgba(0, 0, 0, 0.5);
    }

    .ct-text {
        font-family: var(--exo);
        font-size: 12px;
        color: #e0e0e0;
        line-height: 1.4;
        font-weight: 400;
    }

    /* ─── DASHBOARD SUPERIOR ─── */
    .map-dashboard {
        display: flex;
        justify-content: space-between;
        background: linear-gradient(135deg, var(--b1), var(--bg2));
        padding: 15px 20px;
        border-bottom: 2px solid var(--b2);
        box-shadow: 0 4px 15px rgba(0, 0, 0, 0.5);
        position: sticky;
        top: 0;
        z-index: 10;
        border-bottom-left-radius: 15px;
        border-bottom-right-radius: 15px;
    }

    .dash-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.4rem;
        letter-spacing: 1px;
        margin-bottom: 5px;
    }

    .dash-stats {
        font-size: 0.9rem;
        display: flex;
        gap: 10px;
        font-family: 'JetBrains Mono', monospace;
        font-weight: bold;
    }

    .iperc-grid {
        display: flex;
        gap: 15px;
        color: var(--mut);
    }

    /* ─── RUTA DUOLINGO (PATH) ─── */
    .duo-path-container {
        position: relative;
        padding: 40px 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 60px;
        /* Separación vertical entre niveles */
        overflow-y: auto;
    }

    /* La línea del camino */
    .duo-path-line {
        position: absolute;
        top: 40px;
        bottom: 40px;
        left: 50%;
        width: 8px;
        background: var(--b2);
        transform: translateX(-50%);
        z-index: 1;
        border-radius: 4px;
    }

    /* Posicionamiento en Zig-Zag */
    .duo-row {
        position: relative;
        z-index: 2;
        width: 100%;
        display: flex;
        justify-content: center;
    }

    .duo-row.left {
        transform: translateX(-50px);
    }

    .duo-row.right {
        transform: translateX(50px);
    }

    .duo-row.center {
        transform: translateX(0);
    }

    /* Nodos Circulares */
    .duo-node {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: var(--bg);
        border: 5px solid var(--b2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 2.5rem;
        cursor: pointer;
        position: relative;
        transition: transform 0.2s, box-shadow 0.2s;
    }

    /* Etiquetas debajo del nodo */
    .duo-label {
        position: absolute;
        top: 105%;
        width: 140px;
        text-align: center;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.1rem;
        letter-spacing: 1px;
        background: rgba(0, 0, 0, 0.8);
        padding: 4px;
        border-radius: 6px;
    }

    /* Estados del Nodo */
    .duo-node.locked {
        filter: grayscale(100%);
        opacity: 0.6;
        cursor: not-allowed;
    }

    .duo-node.done {
        border-color: var(--gold);
        background: rgba(200, 144, 0, 0.2);
    }

    .duo-node.active {
        border-color: var(--c2);
        background: rgba(0, 238, 255, 0.1);
        box-shadow: 0 0 20px var(--c2), inset 0 0 15px var(--c2);
        transform: scale(1.15);
        animation: pulseNode 2s infinite;
    }

    @keyframes pulseNode {
        0% {
            box-shadow: 0 0 0 0 rgba(0, 238, 255, 0.7);
        }

        70% {
            box-shadow: 0 0 0 15px rgba(0, 238, 255, 0);
        }

        100% {
            box-shadow: 0 0 0 0 rgba(0, 238, 255, 0);
        }
    }

    /* ═══════════════════════════════════════════
               MAPA TÁCTICO SERPENTEANTE (SIN EMOJIS)
               ═══════════════════════════════════════════ */
    .map-container {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 50px;
        padding: 40px 20px;
        background: radial-gradient(circle at center, var(--bg2) 0%, var(--bg) 100%);
        border: 1px solid var(--b1);
        border-radius: 8px;
        max-width: 750px;
        margin: 20px auto;
        position: relative;
    }

    /* Filas para crear el efecto Zig-Zag / Serpenteante */
    .map-row {
        display: flex;
        width: 100%;
        justify-content: space-around;
        position: relative;
    }

    /* Invierte el orden de los nodos en las filas pares para serpentear */
    .map-row.reverse {
        flex-direction: row-reverse;
    }

    /* Envoltorio del Nodo */
    .map-node-wrapper {
        position: relative;
        display: flex;
        flex-direction: column;
        align-items: center;
        width: 140px;
        transition: transform 0.2s ease;
    }

    .map-node-wrapper:not(.locked):hover {
        transform: scale(1.05);
    }

    /* El círculo del nivel (Estilo Nodo de Red Industrial) */
    .map-node {
        width: 64px;
        height: 64px;
        border-radius: 50%;
        background: var(--bg3);
        border: 3px solid var(--b3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'JetBrains Mono', monospace;
        font-weight: 700;
        font-size: 1.3rem;
        color: var(--mut);
        box-shadow: inset 0 0 10px rgba(0, 0, 0, 0.8);
        cursor: pointer;
        position: relative;
        transition: all 0.3s ease;
    }

    /* Estado: Completado (Verde Seguridad) */
    .map-node.completed {
        border-color: var(--grn);
        color: var(--gr2);
        box-shadow: 0 0 15px rgba(0, 187, 68, 0.4), inset 0 0 10px rgba(0, 187, 68, 0.2);
    }

    /* Estado: Nivel Actual (Cian Activo + Animación Pulsante) */
    .map-node.current {
        border-color: var(--cyan);
        color: var(--c2);
        background: #162a30;
        box-shadow: 0 0 25px rgba(0, 200, 212, 0.6);
        animation: activeNodePulse 2s infinite alternate;
    }

    /* Estado: Bloqueado */
    .map-node.locked {
        opacity: 0.3;
        cursor: not-allowed;
    }

    /* Información de texto debajo del nodo */
    .node-info {
        margin-top: 12px;
        text-align: center;
        font-family: 'Exo 2', sans-serif;
    }

    .node-code {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 1.1rem;
        letter-spacing: 0.5px;
    }

    .node-name {
        font-size: 0.75rem;
        color: var(--mut);
        text-transform: uppercase;
        max-width: 130px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        margin-top: 2px;
    }

    .map-node-wrapper.current .node-name {
        color: var(--txt);
        font-weight: 600;
    }

    /* ═══════════════════════════════════════════
               AVATAR / ICONO DEL PERSONAJE EN EL MAPA
               ═══════════════════════════════════════════ */
    .map-player-badge {
        position: absolute;
        top: -42px;
        background: rgba(12, 12, 12, 0.95);
        border: 2px solid var(--char-color, var(--cyan));
        padding: 4px 10px;
        border-radius: 4px;
        font-family: 'Bebas Neue', sans-serif;
        font-size: 0.85rem;
        color: #fff;
        letter-spacing: 1px;
        box-shadow: 0 0 15px var(--char-color, rgba(0, 200, 212, 0.4));
        display: flex;
        align-items: center;
        gap: 6px;
        z-index: 10;
        white-space: nowrap;
        animation: avatarFloat 1.5s ease-in-out infinite alternate;
    }

    /* Flecha del indicador */
    .map-player-badge::after {
        content: '';
        position: absolute;
        bottom: -6px;
        left: 50%;
        transform: translateX(-50%);
        border-width: 6px 6px 0;
        border-style: solid;
        border-color: var(--char-color, var(--cyan)) transparent;
        display: block;
        width: 0;
    }

    /* Punto de radar parpadeante */
    .radar-dot {
        width: 6px;
        height: 6px;
        background: var(--gr2);
        border-radius: 50%;
        animation: radarBlink 0.8s infinite alternate;
    }

    /* ANIMACIONES */
    @keyframes activeNodePulse {
        0% {
            box-shadow: 0 0 12px rgba(0, 200, 212, 0.4);
            border-color: var(--cyan);
        }

        100% {
            box-shadow: 0 0 28px rgba(0, 200, 212, 0.8);
            border-color: var(--c3);
        }
    }

    @keyframes avatarFloat {
        0% {
            transform: translateY(0);
        }

        100% {
            transform: translateY(-4px);
        }
    }

    @keyframes radarBlink {
        0% {
            opacity: 0.2;
        }

        100% {
            opacity: 1;
        }
    }

    /* Para los nodos del mapa (hoja de ruta) */
    .map-node-name {
        opacity: 0;
        visibility: hidden;
        position: absolute;
        bottom: -10px;
        /* Inicia un poco oculto */
        transition: all 0.3s ease;
        /* Evita que el texto interfiera con los clics */
        pointer-events: none;
    }

    .map-node:hover .map-node-name {
        opacity: 1;
        visibility: visible;
        bottom: -35px;
        /* Baja suavemente para no tapar el icono ni la línea */
    }

    /* ─── LAYOUT DEL MAPA (TERMINAL DE COMANDO) ─── */
    .map-layout-container {
        display: flex;
        height: 100vh;
        width: 100%;
        background: transparent;
    }

    /* BARRA LATERAL */
    .map-sidebar {
        width: 320px;
        background: linear-gradient(90deg, rgba(10, 10, 10, 1) 0%, rgba(18, 18, 18, 0.95) 100%);
        border-right: 1px solid rgba(0, 238, 255, 0.15);
        padding: 40px 30px;
        display: flex;
        flex-direction: column;
        gap: 40px;
        box-shadow: 5px 0 20px rgba(0, 0, 0, 0.8);
        z-index: 10;
        flex-shrink: 0;
    }

    .sidebar-section {
        display: flex;
        flex-direction: column;
        gap: 12px;
    }

    .hud-title {
        font-family: 'Bebas Neue', sans-serif;
        font-size: 2rem;
        letter-spacing: 2px;
        margin-bottom: 5px;
        text-shadow: 0 2px 4px rgba(0, 0, 0, 0.8);
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        padding-bottom: 5px;
    }

    .stat-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        font-family: 'JetBrains Mono', monospace;
        font-size: 1rem;
        padding-bottom: 8px;
        border-bottom: 1px dashed rgba(255, 255, 255, 0.05);
    }

    .stat-row .lbl {
        color: var(--mut);
        font-size: 0.85rem;
        letter-spacing: 1px;
    }

    .stat-row .val {
        font-weight: bold;
        text-shadow: 0 0 8px currentColor;
        /* Brillo sutil */
    }

    .sidebar-btn {
        margin-top: auto;
        /* Empuja el botón al fondo de la barra */
        width: 100%;
        font-size: 0.9rem;
        padding: 15px;
    }

    /* ÁREA DEL MAPA (DERECHA) */
    .map-main-area {
        flex-grow: 1;
        overflow-y: auto;
        /* Permite scroll si el mapa es muy largo */
        padding: 40px;
        display: flex;
        flex-direction: column;
        align-items: center;
        background: radial-gradient(circle at center, rgba(0, 238, 255, 0.03) 0%, transparent 70%);
    }

    /* RESPONSIVE PARA CELULARES */
    @media (max-width: 800px) {
        .map-layout-container {
            flex-direction: column;
        }

        .map-sidebar {
            width: 100%;
            height: auto;
            border-right: none;
            border-bottom: 1px solid rgba(0, 238, 255, 0.15);
            padding: 20px;
            gap: 20px;
        }

        .sidebar-btn {
            margin-top: 10px;
        }

        .map-main-area {
            padding: 20px;
        }
    }

    /* ═══════════════════════════════════════════
           NUEVO LAYOUT DEL JUEGO (PANTALLA DIVIDIDA)
           ═══════════════════════════════════════════ */

    /* 1. Contenedor Principal de la Acción */
    .game-main-area {
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 30px;
        position: relative;
        overflow-y: hidden;
        /* Evita scrolls dobles */
        height: 100vh;
    }

    /* 2. Sobrescribir el HUD Antiguo para volverlo Minimalista */
    #ghud.sleek-game-hud {
        position: relative !important;
        /* Quita el "fixed" antiguo */
        top: auto !important;
        left: auto !important;
        right: auto !important;
        width: 100%;
        max-width: 1000px;
        height: auto !important;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: rgba(10, 10, 10, 0.9) !important;
        border: 1px solid rgba(0, 238, 255, 0.15) !important;
        border-bottom: 1px solid rgba(0, 238, 255, 0.15) !important;
        border-radius: 6px;
        padding: 15px 25px !important;
        margin-bottom: 20px;
        box-shadow: 0 5px 20px rgba(0, 0, 0, 0.6);
        z-index: 5;
    }

    /* 3. Corrección del Medidor de Riesgo (Ahora vive en el Sidebar) */
    #risk-meter.sidebar-section {
        position: relative !important;
        top: auto !important;
        right: auto !important;
        display: flex !important;
        /* Fuerza a que siempre se vea en el panel */
        flex-direction: column;
        width: 100% !important;
    }

    /* 4. Canvas Integrado (Mejor borde y sombra) */
    .canvas-container {
        flex-grow: 1;
        display: flex;
        justify-content: center;
        align-items: flex-start;
        width: 100%;
        max-height: calc(100vh - 150px);
    }

    #gameCanvas {
        position: relative !important;
        /* Quita el absolute antiguo */
        max-width: 100%;
        max-height: 100%;
        object-fit: contain;
        /* Mantiene la proporción del juego */
    }

    /* ═══════════════════════════════════════════
       RESPONSIVE MÓVIL — BREAKPOINT PRINCIPAL
       ═══════════════════════════════════════════ */
    @media (max-width: 600px) {

        /* ── PANTALLA TÍTULO ── */
        .title-zone {
            font-size: clamp(20px, 8vw, 36px);
            letter-spacing: 8px;
        }

        .title-iperc {
            font-size: clamp(52px, 18vw, 90px);
            letter-spacing: 6px;
        }

        .title-tag {
            font-size: 7px;
            letter-spacing: 3px;
        }

        .title-desc {
            font-size: 13px !important;
            padding: 0 10px;
        }

        .btn-menu {
            width: 90vw;
            max-width: 320px;
            font-size: 18px;
            padding: 14px 20px;
        }

        /* ── MODAL MANUAL ── */
        .modal-content {
            padding: 24px 18px;
            width: 95%;
        }

        .modal-content ul li {
            margin-bottom: 8px;
            line-height: 1.6;
        }

        /* ── SELECCIÓN DE PERSONAJE ── */
        .cs-title {
            font-size: clamp(22px, 7vw, 36px);
            letter-spacing: 4px;
        }

        .cs-sub {
            font-size: 7px;
            letter-spacing: 2px;
            padding: 0 10px;
        }

        .chars-row {
            flex-wrap: wrap;
            gap: 8px;
            padding: 0 8px;
            justify-content: center;
        }

        .cc {
            width: calc(50% - 8px);
            min-width: 130px;
            flex: 0 0 calc(50% - 8px);
            clip-path: none;
            border-radius: 6px;
        }

        .cc-portrait {
            height: clamp(90px, 22vw, 140px);
        }

        .cc-av {
            font-size: clamp(44px, 12vw, 70px);
        }

        .cc-info {
            padding: 8px 8px 10px;
        }

        .cc-name {
            font-size: clamp(11px, 3vw, 15px);
            letter-spacing: 1px;
        }

        #btn-confirm {
            font-size: 16px;
            letter-spacing: 3px;
            padding: 14px 30px;
            clip-path: none;
            border-radius: 4px;
            width: 90vw;
            max-width: 320px;
        }

        /* ── MAPA / SIDEBAR ── */
        .map-layout-container {
            flex-direction: column;
            height: auto;
            min-height: 100vh;
        }

        .map-sidebar {
            width: 100%;
            height: auto;
            border-right: none;
            border-bottom: 1px solid rgba(0, 238, 255, 0.15);
            padding: 16px;
            gap: 14px;
            flex-direction: row;
            flex-wrap: wrap;
            align-items: flex-start;
        }

        .map-sidebar .sidebar-section {
            flex: 1 1 140px;
            min-width: 130px;
        }

        #sidebar-avatar-container {
            width: 70px !important;
            height: 70px !important;
        }

        #map-char-name {
            font-size: 1.2rem !important;
        }

        .hud-title {
            font-size: 1.4rem;
        }

        .stat-row {
            font-size: 0.85rem;
        }

        .sidebar-btn {
            width: 100%;
            margin-top: 4px;
        }

        .map-main-area {
            padding: 16px 10px;
            overflow-y: auto;
        }

        /* ── PANTALLA DE JUEGO CON CONTROLES TÁCTILES ── */
        #s-game {
            overflow: hidden;
        }

        #s-game .map-layout-container {
            flex-direction: column;
            height: 100vh;
        }

        #s-game .map-sidebar {
            display: flex !important;
            flex-direction: column !important;
            width: 200px !important;
            min-width: 200px !important;
            height: 100vh !important;
            padding: 6px !important;
            gap: 4px !important;
            background: rgba(0, 15, 25, 0.95) !important;
            border-right: 2px solid rgba(0, 238, 255, 0.2) !important;
            overflow-y: auto !important;
            box-sizing: border-box !important;
        }

        #s-game .map-sidebar>div {
            /* ver esto */
            flex: 1 1 120px;
        }

        .game-main-area {
            height: calc(100vh - 130px - 140px);
            /* sidebar + controles táctiles */
            padding: 0;
        }

        .canvas-container {
            max-height: 100%;
        }

        button[onclick="returnToMap()"] {
            top: auto !important;
            bottom: 150px !important;
            right: 10px !important;
            font-size: 0.9rem !important;
            padding: 6px 12px !important;
        }

        /* ── QUIZ MODAL ── */
        #quiz-modal {
            padding: 10px;
            justify-content: flex-start;
            padding-top: 20px;
        }

        .qz-header {
            padding: 10px 16px;
            margin-bottom: 12px;
        }

        .qz-door-icon {
            font-size: 28px;
            margin-bottom: 4px;
        }

        .qz-title {
            font-size: clamp(18px, 5vw, 26px);
            letter-spacing: 3px;
        }

        .qz-subtitle {
            font-size: 7px;
            letter-spacing: 1px;
        }

        .qz-box {
            padding: 16px;
        }

        .qz-question {
            font-size: 14px;
            margin-bottom: 14px;
        }

        .qz-opt {
            font-size: 13px;
            padding: 11px 14px;
        }

        .qz-btn-next {
            font-size: 15px;
            padding: 10px 24px;
            width: 100%;
        }

        .qz-result-btn {
            font-size: 14px;
            padding: 10px 16px;
        }

        /* ── PANTALLA FINAL / VICTORIA ── */
        .vic-box {
            padding: 20px 16px;
        }

        .vic-stats {
            grid-template-columns: repeat(2, 1fr);
        }

        .final-box {
            padding: 16px;
            width: 96%;
        }

        .final-grid {
            grid-template-columns: 1fr;
        }

        .final-btns {
            flex-direction: column;
            align-items: center;
        }

        .fbtn {
            width: 100%;
            font-size: 14px;
            padding: 12px;
        }

        /* ── NODOS DEL MAPA ── */
        .map-container {
            gap: 30px;
            padding: 20px 10px;
        }

        .map-node-wrapper {
            width: 100px;
        }

        .map-node {
            width: 52px;
            height: 52px;
            font-size: 1rem;
        }

        .node-name {
            font-size: 0.65rem;
            max-width: 90px;
        }

        /* ── NOTIFICACIONES ── */
        .notif {
            font-size: 10px;
            padding: 6px 14px;
            max-width: 90vw;
        }
    }

    /* ═══════════════════════════════════════════
       CONTROLES TÁCTILES (D-PAD + BOTONES ACCIÓN)
       ═══════════════════════════════════════════ */
    #mobile-controls {
        position: fixed;
        top: 0;
        left: 0;
