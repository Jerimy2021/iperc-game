    }
    function drawPhone() {
        if (!ZONE || !ZONE.isLotoLevel) return;
        const t = Date.now();
        for (const ph of PHONE_EMOJIS) {
            if (!ph.active) continue;
            const py = ph.y + Math.sin(ph.bt) * 4;
            const cx2 = ph.x + ph.w / 2, cy2 = py + ph.h / 2;

            // ── Warning zone ring (large, clearly visible) ──
            const dist = Math.hypot(PL.x + PL.w / 2 - cx2, PL.y + PL.h / 2 - cy2);
            const inZone = dist < ph.warnR;
            const ringAlpha = inZone ? 0.35 + Math.sin(t * .012) * .15 : 0.10 + Math.sin(t * .006) * .05;
            CX.save();
            CX.strokeStyle = inZone ? 'rgba(255,200,0,.8)' : 'rgba(255,200,0,.3)';
            CX.lineWidth = inZone ? 2 : 1;
            CX.setLineDash([5, 5]);
            CX.beginPath(); CX.arc(cx2, cy2, ph.warnR, 0, Math.PI * 2); CX.stroke();
            CX.setLineDash([]);

            // Zone fill
            const zg = CX.createRadialGradient(cx2, cy2, 0, cx2, cy2, ph.warnR);
            zg.addColorStop(0, `rgba(255,180,0,${ringAlpha * .4})`);
            zg.addColorStop(.6, `rgba(255,180,0,${ringAlpha * .1})`);
            zg.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = zg; CX.beginPath(); CX.arc(cx2, cy2, ph.warnR, 0, Math.PI * 2); CX.fill();
            CX.restore();

            // ── Phone emoji (ringing animation when player near) ──
            CX.save();
            CX.translate(cx2, py + ph.h / 2);
            if (ph.ringing) {CX.rotate(Math.sin(t * .025) * .12);} // vibración
            CX.font = '24px serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
            CX.fillText('📱', 0, 0);
            CX.restore(); CX.textBaseline = 'alphabetic';

            // ── Label ──
            CX.font = '7px "JetBrains Mono",monospace';
            CX.fillStyle = '#ffcc00'; CX.textAlign = 'center';
            CX.fillText('DISTRACCIÓN', cx2, py - 6);

            // ── When in zone: show [E] prompt and warning ──
            if (inZone) {
                CX.font = 'bold 9px "JetBrains Mono",monospace';
                CX.fillStyle = `rgba(255,80,80,${.75 + Math.sin(t * .015) * .25})`;
                CX.fillText('[E] USAR = PENALIZACIÓN', cx2, py - 20);
                CX.font = '7px "JetBrains Mono",monospace';
                CX.fillStyle = 'rgba(200,200,200,.7)';
                CX.fillText('IGNÓRALO ← →', cx2, py + ph.h + 14);
            }
            CX.textAlign = 'left';
        }
    }

    /* ═══════════════════════════════════════════
       CRUCE SEGURO (Level 5)
    ═══════════════════════════════════════════ */
    function initCruceLevel() {
        const W = CV.width, H = CV.height, HUD = 52;
        // No separate routes — the calzada itself is the crossing zone.
        // Player must cross it when semaphore is green to reach the right platform and open the portal.
        CRUCE.routes = [];   // keep empty; crossing detection handled via carZone overlap
        CRUCE.chosen = null;
        CRUCE.semaphore = 'red';
        CRUCE.semTimer = 0;
        CRUCE.cars = [];
        CRUCE.carSpawnTimer = 0;
        CRUCE.redLightHitTimer = 0;
        CRUCE.playerCrossed = false; // true once player fully passes through the carZone on green

        // 🛠️ ¡CAMBIO AQUÍ PARA CORREGIR EL BUG DEL CELULAR! 🛠️
        // Reducimos la altura (laneH) de 64 a 40 para hacer la línea más delgada.
        // Ajustamos laneY (de -52 a -42) para centrarla perfectamente en la pista real sin tocar tus plataformas.
        const laneH = 40;
        const laneY = PLATS[1].y - 42;
        CRUCE.carZone = {x: 0, y: laneY, w: W, h: laneH};

        setTimeout(() => notify('🚗 ¡CUIDADO! La CALZADA está activa. Respeta el SEMÁFORO 🚦', 'b'), 600);
        setTimeout(() => notify('🟢 VERDE → Los carros frenan. ¡Cruza la franja ahora!', 'g'), 2400);
        setTimeout(() => notify('🔴 ROJO → Los carros circulan a toda velocidad. ¡No entres a la calzada!', 'b'), 4200);
    }
    /* Spawn a new car from one side */
    function spawnCar() {
        const W = CV.width;
        const dir = Math.random() > 0.5 ? 1 : -1; // 1=left-to-right, -1=right-to-left
        const cz = CRUCE.carZone;
        const carH = 34, carW = 54;
        const y = cz.y + (cz.h - carH) / 2;
        const emojis = ['🚗', '🚙', '🚛', '🚕', '🏎️'];
        const emoji = emojis[Math.floor(Math.random() * emojis.length)];
        CRUCE.cars.push({
            x: dir === 1 ? -carW - 10 : W + 10,
            y: y,
            w: carW, h: carH,
            vx: dir * (2.8 + Math.random() * 1.4),
            dir: dir,
            emoji: emoji,
            alive: true,
            // State: 'moving' | 'braking' | 'stopped'
            state: 'moving',
            // Stop position when green (stop before zone center if approaching)
            stopX: dir === 1 ? CRUCE.carZone.x + CRUCE.carZone.w * 0.28 - carW : CRUCE.carZone.x + CRUCE.carZone.w * 0.72,
            flashTimer: 0,
        });
    }
    /* Update all cars each frame */
    function updateCars() {
        const W = CV.width;
        const cz = CRUCE.carZone;
        if (!cz) return;
        // Spawn: more cars on red (dangerous), fewer on green
        const spawnInterval = CRUCE.semaphore === 'red' ? 170 : 310;
        CRUCE.carSpawnTimer++;
        if (CRUCE.carSpawnTimer >= spawnInterval) {
            CRUCE.carSpawnTimer = 0;
            spawnCar();
        }

        for (const car of CRUCE.cars) {
            if (!car.alive) continue;

            if (CRUCE.semaphore === 'green') {
                // GREEN: cars respect the light — stop before entering the crossing zone
                if (car.dir === 1) {
                    // Approaching from left — stop before reaching zone
                    if (car.x + car.w < car.stopX) {
                        car.state = 'moving';
                        car.x += car.vx;
                    } else {
                        car.state = 'stopped';
                        car.x = Math.min(car.x, car.stopX - car.w);
                    }
                } else {
                    // Approaching from right — stop before reaching zone
                    if (car.x > car.stopX) {
                        car.state = 'moving';
                        car.x += car.vx;
                    } else {
                        car.state = 'stopped';
                        car.x = Math.max(car.x, car.stopX);
                    }
                }
            } else {
                // RED: cars run freely through the zone — DANGER for player
                car.state = 'moving';
                car.x += car.vx;

                // MUERTE INSTANTÁNEA si el jugador entra a la calzada con semáforo ROJO
                const playerInZone = ov(PL, {x: cz.x, y: cz.y, w: cz.w, h: cz.h});
                if (playerInZone && PL.invincible === 0) {
                    car.flashTimer = 22;
                    spawnP(PL.x + PL.w / 2, PL.y, 'rgba(255,0,0,0.95)', 28);
                    ft(PL.x + PL.w / 2, PL.y - 18, '💀 ¡SEMÁFORO ROJO!', '#ff0000');
                    notify('🔴 ¡ATROPELLADO! Solo se cruza con SEMÁFORO EN VERDE', 'b');
                    G.hp = 0; updateHUD();
                    RUNNING = false; cancelAnimationFrame(RAF);
                    setTimeout(() => showGameOver(), 500);
                }
            }

            if (car.flashTimer > 0) car.flashTimer--;

            // Remove cars that left the screen
            if (car.dir === 1 && car.x > W + 70) car.alive = false;
            if (car.dir === -1 && car.x < -70) car.alive = false;
        }

        CRUCE.cars = CRUCE.cars.filter(c => c.alive);
    }
    function updateCruce() {
        // Semaphore cycles: red 260 ticks (~4.3s), green 220 ticks (~3.7s)
        CRUCE.semTimer++;
        const cycleDuration = 480;
        if (CRUCE.semTimer > cycleDuration) CRUCE.semTimer = 0;
        const prevSem = CRUCE.semaphore;
        CRUCE.semaphore = CRUCE.semTimer < 260 ? 'red' : 'green';

        // Notify on state transitions
        if (prevSem !== CRUCE.semaphore) {
            if (CRUCE.semaphore === 'green') {
                notify('🟢 SEMÁFORO VERDE — ¡Ahora! Cruza la calzada antes de que cambie', 'g');
            } else {
                notify('🔴 SEMÁFORO ROJO — ¡PARA! Los carros vienen en marcha', 'b');
            }
        }

        const el = $('hv-sem');
        if (el) {
            el.textContent = CRUCE.semaphore === 'green' ? 'VERDE' : 'ROJO';
            el.style.color = CRUCE.semaphore === 'green' ? '#00ee66' : '#ff3355';
        }

        // Update cars
        updateCars();

        // Check if player is inside the carZone
        const cz = CRUCE.carZone;
        if (!cz || !PL) return;
        const playerInZone = ov(PL, {x: cz.x, y: cz.y, w: cz.w, h: cz.h});

        // La muerte en rojo ya se maneja en updateCars (muerte instantánea)

        // Detect successful crossing: player enters calzada on GREEN and reaches the other side
        // "Crossed" = player was in zone during green and is now on the right half of the screen
        if (!CRUCE.chosen) {
            if (playerInZone && CRUCE.semaphore === 'green') {
                CRUCE._crossingOnGreen = true;
            }
            // Player exited zone to the right side → successful safe crossing
            if (CRUCE._crossingOnGreen && !playerInZone && PL.x > cz.x + cz.w * 0.5) {
                CRUCE.chosen = 'safe';
                G.safeRouteChosen = true;
                spawnP(PL.x + PL.w / 2, PL.y, 'rgba(0,238,102,0.9)', 20);
                ft(PL.x + PL.w / 2, PL.y - 20, '✅ CRUCE SEGURO +50xp', '#00ee66');
                G.xp += 50;
                notify('✅ ¡CRUZASTE CON SEMÁFORO EN VERDE! Cruce seguro +50 XP', 'g');
                snd('good');
                const el2 = $('hv-ruta'); if (el2) {el2.textContent = 'SEGURA'; el2.style.color = '#00ee66';}
            }
        }
    }
    function drawCruce() {
        if (!ZONE || !ZONE.isCruceLevel) return;
        const t = Date.now();
        const cz = CRUCE.carZone;
        const isRed = CRUCE.semaphore === 'red';
        const pulse = 0.4 + Math.sin(t * .007) * .3;

        // ── Calzada vehicular rectangle ──
        if (cz) {
            CX.save();

            // Road surface color: RED when danger (rojo), GREEN when safe to cross (verde)

            CX.globalAlpha = 0.22 + pulse * .08;
            CX.fillStyle = roadColor;
            CX.fillRect(cz.x, cz.y, cz.w, cz.h);

            // Animated border glow
            CX.shadowColor = isRed ? '#ff3355' : '#00ee66';
            CX.shadowBlur = isRed ? 12 + pulse * 8 : 10 + pulse * 6;
            CX.strokeStyle = isRed ? `rgba(255,50,80,${0.6 + pulse * .35})` : `rgba(0,238,100,${0.6 + pulse * .35})`;
            CX.lineWidth = 2;
            CX.strokeRect(cz.x + 1, cz.y + 1, cz.w - 2, cz.h - 2);
            CX.shadowBlur = 0;

            // Dashed center lane line

            CX.setLineDash([20, 12]);
            CX.beginPath();
            CX.moveTo(cz.x, cz.y + cz.h / 2);
            CX.lineTo(cz.x + cz.w, cz.y + cz.h / 2);
            CX.stroke();
            CX.setLineDash([]);

            // Red danger flash overlay
            if (isRed) {
                CX.globalAlpha = pulse * .06;
                CX.fillStyle = '#ff0000';
                CX.fillRect(cz.x, cz.y, cz.w, cz.h);
                CX.globalAlpha = 1;
            } else {
                // Green safe overlay shimmer
                CX.globalAlpha = pulse * .04;
                CX.fillStyle = '#00ff88';
                CX.fillRect(cz.x, cz.y, cz.w, cz.h);
                CX.globalAlpha = 1;
            }

            // Zone status label
            CX.font = 'bold 8px "JetBrains Mono",monospace';
            CX.textAlign = 'center';
            if (isRed) {
                CX.fillStyle = `rgba(255,100,80,${0.8 + pulse * .2})`;
                CX.fillText('⛔ CALZADA — SEMÁFORO ROJO — ¡NO CRUCES!', cz.x + cz.w / 2, cz.y + 14);
            } else {
                CX.fillStyle = `rgba(80,255,140,${0.8 + pulse * .2})`;
                CX.fillText('✅ CALZADA — SEMÁFORO VERDE — ¡CRUZA AHORA!', cz.x + cz.w / 2, cz.y + 14);
            }

            CX.restore();
        }

        // ── Draw cars ──
        for (const car of CRUCE.cars) {
            if (!car.alive) continue;
            const cx2 = car.x + car.w / 2, cy2 = car.y + car.h / 2;

            CX.save();

            // Shadow
            CX.fillStyle = 'rgba(0,0,0,.35)';
            CX.beginPath(); CX.ellipse(cx2, car.y + car.h + 3, car.w / 2 - 4, 5, 0, 0, Math.PI * 2); CX.fill();

            // Glow
            const isRunning = car.state === 'moving';
            const glowCol = isRunning && isRed ? 'rgba(255,60,0,.45)' : 'rgba(180,220,180,.25)';
            const cg = CX.createRadialGradient(cx2, cy2, 0, cx2, cy2, car.w);
            cg.addColorStop(0, glowCol); cg.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = cg; CX.fillRect(car.x - car.w * .5, car.y - car.h * .5, car.w * 2, car.h * 2);

            // Flash on hit
            if (car.flashTimer > 0) {
                CX.globalAlpha = car.flashTimer / 20 * 0.8;
                CX.fillStyle = '#ff3333';
                CX.fillRect(car.x - 2, car.y - 2, car.w + 4, car.h + 4);
                CX.globalAlpha = 1;
            }

            // Car emoji — mirror horizontally if going right-to-left
            CX.translate(cx2, cy2);
            if (car.dir === -1) CX.scale(-1, 1);
            CX.font = `${Math.round(car.h * 0.9)}px serif`;
            CX.textAlign = 'center'; CX.textBaseline = 'middle';
            CX.fillText(car.emoji, 0, 0);

            // State badge
            CX.font = 'bold 6px "JetBrains Mono",monospace';
            CX.textAlign = 'center';
            if (car.state === 'stopped') {
                CX.fillStyle = 'rgba(0,238,100,.95)';
                CX.fillText('● FRENADO', cx2, car.y - 6);
            } else if (isRed) {
                CX.fillStyle = (Math.floor(t * .013) % 2 === 0) ? 'rgba(255,80,0,.95)' : 'rgba(255,220,0,.95)';
                CX.fillText('⚠ PASA ROJO', cx2, car.y - 6);
            }
            CX.textAlign = 'left';
        }

        // ── Semaphore widget ──

        CX.fillText('SEMÁFORO', sx + 27, sy + 10);

        // ── Red bulb ──
        CX.save();
        if (isRed) {
            CX.shadowColor = '#ff2244';
            CX.shadowBlur = 14 + pulse * 10;
        }
        CX.fillStyle = isRed ? `rgb(255,${Math.round(30 + pulse * 25)},${Math.round(50 + pulse * 20)})` : 'rgba(80,0,20,.4)';
        CX.beginPath(); CX.arc(sx + 27, sy + 30, 11, 0, Math.PI * 2); CX.fill();
        CX.restore();

        // ── Green bulb ──
        CX.save();
        if (!isRed) {
            CX.shadowColor = '#00ee66';
            CX.shadowBlur = 14 + pulse * 10;
        }
        CX.fillStyle = !isRed ? `rgb(${Math.round(20 + pulse * 20)},${Math.round(220 + pulse * 35)},${Math.round(80 + pulse * 30)})` : 'rgba(0,40,20,.4)';
        CX.beginPath(); CX.arc(sx + 27, sy + 62, 11, 0, Math.PI * 2); CX.fill();
        CX.restore();

        // State text
        CX.font = 'bold 7px "JetBrains Mono",monospace';
        CX.fillStyle = isRed ? `rgba(255,80,80,${0.8 + pulse * .2})` : `rgba(60,255,120,${0.8 + pulse * .2})`;
        CX.textAlign = 'center';
        CX.fillText(isRed ? 'ROJO' : 'VERDE', sx + 27, sy + 88);

        CX.restore();
        CX.textAlign = 'left';
    }

    /* ═══════════ RENDER ═══════════ */
    function loop() {update(); draw(); RAF = requestAnimationFrame(loop);}
    function draw() {
        const W = CV.width, H = CV.height;
        CX.clearRect(0, 0, W, H);

        // BG — sky fills full canvas (HUD HTML sits on top via z-index)
        const bg = CX.createLinearGradient(0, 0, 0, H);
        const bgCols = ZONE.bg || ['#060810', '#0a0f20', '#050810'];
        bgCols.forEach((c, i) => bg.addColorStop(i / (bgCols.length - 1), c));
        CX.fillStyle = bg; CX.fillRect(0, 0, W, H);

        // Mario-style clouds (static, seeded by level)
        const cloudSeed = ZONE.id || 1;
        const clouds = [
            {x: (W * .12 + cloudSeed * 67) % W, y: H * .10, r: 28},
            {x: (W * .42 + cloudSeed * 113) % W, y: H * .07, r: 22},
            {x: (W * .70 + cloudSeed * 89) % W, y: H * .13, r: 32},
            {x: (W * .85 + cloudSeed * 41) % W, y: H * .06, r: 18},
        ];
        clouds.forEach(cl => {
            // Cloud body — 3 bumps
            CX.fillStyle = 'rgba(255,255,255,.92)';
            [[0, 0, cl.r], [cl.r * .7, -cl.r * .4, cl.r * .75], [cl.r * 1.4, 0, cl.r * .6]].forEach(([ox, oy, r]) => {
                CX.beginPath(); CX.arc(cl.x + ox, cl.y + oy, r, 0, Math.PI * 2); CX.fill();
            });
            // Bottom flat
            CX.fillRect(cl.x - 4, cl.y, cl.r * 2 + 8, cl.r * .55);
            // Inner highlight
            CX.fillStyle = 'rgba(255,255,255,1)';
            CX.beginPath(); CX.arc(cl.x + cl.r * .5, cl.y - cl.r * .15, cl.r * .38, 0, Math.PI * 2); CX.fill();
        });

        // Mario-style bushes near the floor
        const floorY = H * .82;
        const bushes = [
            {x: W * .08, w: 52}, {x: W * .30, w: 40}, {x: W * .55, w: 60}, {x: W * .78, w: 44}, {x: W * .92, w: 36}
        ];
        bushes.forEach(bu => {
            // Dark green base
            CX.fillStyle = '#2a7a10';
            CX.beginPath(); CX.arc(bu.x + bu.w * .25, floorY, bu.w * .28, Math.PI, 0, false); CX.fill();
            CX.beginPath(); CX.arc(bu.x + bu.w * .75, floorY, bu.w * .22, Math.PI, 0, false); CX.fill();
            CX.beginPath(); CX.arc(bu.x + bu.w * .5, floorY - bu.w * .18, bu.w * .36, Math.PI, 0, false); CX.fill();
            // Light green highlight
            CX.fillStyle = '#4ab820';
            CX.beginPath(); CX.arc(bu.x + bu.w * .4, floorY - bu.w * .22, bu.w * .22, Math.PI, 0, false); CX.fill();
        });

        // Platforms — Mario Bros brick style
        for (const p of PLATS) {
            // Shadow
            CX.fillStyle = 'rgba(0,0,0,.35)'; CX.fillRect(p.x + 4, p.y + 5, p.w, p.h);
            // Base brick color gradient
            const pg = CX.createLinearGradient(0, p.y, 0, p.y + p.h);
            pg.addColorStop(0, lighten(p.col, 18)); pg.addColorStop(1, lighten(p.col, -12));
            CX.fillStyle = pg; CX.fillRect(p.x, p.y, p.w, p.h);

            // Brick mortar lines — horizontal
            CX.strokeStyle = 'rgba(0,0,0,.28)'; CX.lineWidth = 1.5;
            const brickH = 10;
            for (let by = p.y + brickH; by < p.y + p.h; by += brickH) {
                CX.beginPath(); CX.moveTo(p.x, by); CX.lineTo(p.x + p.w, by); CX.stroke();
            }
            // Brick mortar lines — vertical (offset every other row)
            const brickW = 16;
            for (let row = 0; row * brickH < p.h; row++) {
                const offset = (row % 2 === 0) ? 0 : brickW / 2;
                for (let bx = p.x + offset + brickW; bx < p.x + p.w; bx += brickW) {
                    CX.beginPath();
                    CX.moveTo(bx, p.y + row * brickH);
                    CX.lineTo(bx, p.y + (row + 1) * brickH);
                    CX.stroke();
                }
            }

            // Top highlight (light edge)
            CX.fillStyle = 'rgba(255,200,150,.22)'; CX.fillRect(p.x, p.y, p.w, 3);
            // Right/bottom dark edges
            CX.fillStyle = lighten(p.col, -38);
            CX.fillRect(p.x + p.w, p.y + 4, 5, p.h); CX.fillRect(p.x, p.y + p.h, p.w + 5, 5);

            // Green grass strip on top
            const grassH = 5;
            const grassG = CX.createLinearGradient(0, p.y, 0, p.y + grassH);
            grassG.addColorStop(0, '#6cc430'); grassG.addColorStop(1, '#3e9018');
            CX.fillStyle = grassG; CX.fillRect(p.x, p.y, p.w, grassH);
            CX.fillStyle = 'rgba(200,255,120,.2)'; CX.fillRect(p.x, p.y, p.w, 2);
        }

        // Hazards
        for (const h of HZDS) {
            if (!h.alive) continue;
            const hx = h.px, hy = h.py + h.bY;
            // Danger aura for high severity
            if (h.sev >= 3) {
                const pulse = Math.sin(h.at * .08) * .5 + .5;
                const da = CX.createRadialGradient(hx + 18, hy + 18, 0, hx + 18, hy + 18, 46);
                da.addColorStop(0, `rgba(220,20,60,${pulse * .18})`); da.addColorStop(1, 'rgba(0,0,0,0)');
                CX.fillStyle = da; CX.fillRect(hx - 46, hy - 46, h.w + 92, h.h + 92);
            }

            // Shadow -- Peligros
            CX.fillStyle = 'rgba(0,0,0,.3)'; CX.beginPath();
            CX.ellipse(hx + h.w / 2, hy + h.h + 3, h.w / 2, 6, 0, 0, Math.PI * 2); CX.fill();
            // Emoji
            const flash = (Math.sin(h.at * 0.14) + 1) / 2;
            const auraColor = flash > 0.5 ? 'rgba(255, 204, 0, 0.25)' : 'rgba(255, 17, 51, 0.3)';
            const borderColor = flash > 0.5 ? '#ffcc00' : '#ff1133';
            CX.beginPath();
            CX.arc(hx + h.w / 2, hy + h.h / 2, 20 + Math.sin(h.at * 0.1) * 2, 0, Math.PI * 2);
            CX.fillStyle = auraColor;
            CX.fill();
            CX.strokeStyle = borderColor;
            CX.lineWidth = 2.5;
            CX.stroke();
            CX.font = '32px serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle'; CX.fillText(h.emoji, hx + h.w / 2, hy + h.h / 2);
            // Severity badge (Prioridad 1)
            //CX.fillStyle = 'rgba(0,0,0,.75)'; roundRect(hx, hy - 18, 36, 14, 3); CX.fill();
            //CX.font = 'bold 8px "JetBrains Mono",monospace';
            //CX.fillStyle = h.sevColor || '#ff8800'; CX.textAlign = 'center';
            //CX.fillText('SEV-' + h.sevLbl, hx + 18, hy - 7);
            // Label
            //CX.font = '7px "JetBrains Mono",monospace';
            //CX.fillStyle = 'rgba(200,200,200,.7)'; CX.fillText(h.type.substring(0, 12), hx + h.w / 2, hy - 20);
            //

            /* ─── DESTELLO INDUSTRIAL INTERMITENTE ───
            const flash = (Math.sin(h.at * 0.14) + 1) / 2;
            const colorDestello = flash > 0.5 ? '#ffcc00' : '#ff1133';
            const radioGlow = 15 + flash * 20;
            const glow = CX.createRadialGradient(hx + h.w / 2, hy + h.h / 2, 2, hx + h.w / 2, hy + h.h / 2, radioGlow);
            glow.addColorStop(0, colorDestello);
            glow.addColorStop(0.4, flash > 0.5 ? 'rgba(255,204,0,0.4)' : 'rgba(255,17,51,0.4)');
            glow.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = glow;
            CX.beginPath();
            CX.arc(hx + h.w / 2, hy + h.h / 2, radioGlow, 0, Math.PI * 2);
            CX.fill();
            CX.fillStyle = '#232731';
            CX.fillRect(hx + h.w / 2 - 7, hy + h.h - 8, 14, 8);
            CX.fillStyle = colorDestello;
            CX.strokeStyle = '#ffffff';
            CX.lineWidth = 1.5;
            CX.beginPath();
            CX.arc(hx + h.w / 2, hy + h.h / 2 + 1, 7, 0, Math.PI * 2);
            CX.fill();
            CX.stroke();
            */
            // Proximity popup
            // Proximity popup (Cajita Amarilla de Peligro)
            if (Math.abs(h.px - PL.x) < 150) {
                // Aumentamos la altura de la caja de 64 a 74 píxeles para que quepa bien todo
                const bx = Math.min(hx + 2, W - 168), by = Math.max(hy - 88, 46);

                // Dibujar Fondo y Borde Amarillo
                CX.fillStyle = 'rgba(255,220,30,.97)'; CX.strokeStyle = 'rgba(180,130,0,.9)'; CX.lineWidth = 1.5;
                roundRect(bx, by, 164, 74, 4); CX.fill(); CX.stroke(); // <--- Aquí cambiamos la altura a 74

                // Cabecera "Peligro Identificado"
                CX.font = '6px "JetBrains Mono",monospace'; CX.fillStyle = 'rgba(80,50,0,.85)'; CX.textAlign = 'left';
                CX.fillText('▸ PELIGRO IDENTIFICADO', bx + 8, by + 12);

                // Línea 1: TIPO DE PELIGRO (Prensa Industrial)
                CX.font = 'bold 10px "Exo 2",sans-serif'; CX.fillStyle = 'rgba(30,20,0,.95)';
                CX.fillText(h.type.toUpperCase(), bx + 8, by + 26);

                // Línea 2: DESCRIPCIÓN DEL DAÑO (Aplastamiento de extremidades) - ¡Sin recortes!
                CX.font = 'italic 8.5px "Exo 2",sans-serif'; CX.fillStyle = 'rgba(80,30,0,.9)';
                CX.fillText(h.desc, bx + 8, by + 38);

                // Datos Técnicos abajo (Severidad y Personas)
                CX.font = 'bold 8px "JetBrains Mono",monospace';

                CX.fillStyle = h.sevColor || '#cc4400';
                CX.fillText('SEV: ' + h.sevLbl, bx + 8, by + 50);

                CX.fillStyle = '#005520';
                CX.fillText('| Personas: ' + h.pers, bx + 45, by + 50);

                CX.fillStyle = '#7a3d00';
                CX.textAlign = 'right';
                CX.fillText('[SPC] Neutralizar', bx + 156, by + 64);
                CX.textAlign = 'left';
            }
        }
        // Collectibles (EPP / workers / controls)
        for (const c of COLS) {
            if (c.collected) continue;
            const cy = c.py + Math.sin(c.bt) * 5;
            const isWorker = c.isWorker;
            // Glow
            const cg = CX.createRadialGradient(c.px + 14, cy + 14, 0, c.px + 14, cy + 14, 28);
            const gc = isWorker ? 'rgba(0,238,102,.2)' : 'rgba(245,178,0,.2)';
            cg.addColorStop(0, gc); cg.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = cg; CX.fillRect(c.px - 16, cy - 16, 60, 60);

            // Prioridad 1: Emoji
            CX.font = '26px serif';
            CX.textAlign = 'center';
            CX.textBaseline = 'alphabetic';
            CX.fillText(c.emoji, c.px + 14, cy + 22);

            // Texto de identificación nítido con sombra proyecatada
            const labelText = (isWorker ? 'RESCATAR' : c.type).toUpperCase();
            CX.font = 'bold 11px "JetBrains Mono", monospace';
            CX.textAlign = 'center';

            // 1. Capa de Sombra negra (Desplazada +1px abajo)
            CX.fillStyle = 'rgba(0, 0, 0, 0.85)';
            CX.fillText(labelText, c.px + 14, cy - 4 + 1);

            // 2. Capa de Texto frontal brillante
            CX.fillStyle = c.color || '#f5b200';
            CX.fillText(labelText, c.px + 14, cy - 4);

            // Bounce arrow if close (Ajustada a cy - 18 para evitar colisión de textos)
            if (Math.abs(c.px - PL.x) < 100) {
                CX.fillStyle = `rgba(0,238,102,${.7 + Math.sin(Date.now() * .007) * .3})`;
                CX.font = '12px serif'; CX.textAlign = 'center';
                CX.fillText('▼', c.px + 14, cy - 18); // <-- Subimos la flecha aquí
            }
            CX.textAlign = 'left';
        }

        // ── MUSHROOMS (levels 1 & 2) ──
        drawMushrooms();

        // ── PET SCROLLS & CHEMICAL/WORK ICONS ──
        drawPETs();

        // ── YO REPORTO STAR (boss level) ──
        drawStar();

        // ── PHONE DISTRACTORS (level 3) ──
        drawPhone();

        // ── CRUCE SEGURO (level 5) ──
        drawCruce();

        // ── EXTINGUISHER (level 7) ──
        drawExtinguisher();

        // ── BOSS ──
        drawBoss();

        // ── DOOR (Mario-style) ──
        drawDoor();

        // ── SECRET DOOR ──
        drawSecretDoor();

        // Attack arc / Extinguisher spray
        if (PL.attacking) {
            const isExt = G.extinguisherHeld && ZONE && ZONE.isBossLevel;
            const extRange = isExt ? 110 : 58;
            const ax = PL.facing === 1 ? PL.x + PL.w : PL.x - extRange;
            if (isExt) {
                // Foam spray — cone of white/blue
                CX.save();
                const sprayX = PL.facing === 1 ? PL.x + PL.w : PL.x;
                const sprayDirX = PL.facing === 1 ? 1 : -1;
                const sg = CX.createLinearGradient(sprayX, PL.y + PL.h / 2, sprayX + extRange * sprayDirX, PL.y + PL.h / 2);
                sg.addColorStop(0, 'rgba(200,240,255,0.7)');
                sg.addColorStop(0.4, 'rgba(150,220,255,0.45)');
                sg.addColorStop(1, 'rgba(100,200,255,0)');
                CX.fillStyle = sg;
                // Draw a tapered spray cone
                CX.beginPath();
                CX.moveTo(sprayX, PL.y + PL.h / 2);
                CX.lineTo(sprayX + extRange * sprayDirX, PL.y + PL.h / 2 - 22);
                CX.lineTo(sprayX + extRange * sprayDirX, PL.y + PL.h / 2 + 22);
                CX.closePath(); CX.fill();
                // Foam dots
                for (let i = 0; i < 6; i++) {
                    const fx = sprayX + (extRange * .3 + Math.random() * extRange * .6) * sprayDirX;
                    const fy = PL.y + PL.h / 2 + (Math.random() - .5) * 36;
                    CX.fillStyle = `rgba(220,245,255,${0.4 + Math.random() * .4})`;
                    CX.beginPath(); CX.arc(fx, fy, 2 + Math.random() * 4, 0, Math.PI * 2); CX.fill();
                }
                CX.restore();
            } else {
                // Normal punch arc
                const ag = CX.createLinearGradient(ax, 0, ax + 58 * PL.facing, 0);
                ag.addColorStop(0, 'rgba(0,238,255,.55)'); ag.addColorStop(1, 'rgba(0,238,255,0)');
                CX.fillStyle = ag; CX.fillRect(ax, PL.y + 5, 58 * PL.facing, PL.h - 10);
            }
        }

        // Extinguisher range indicator — show when equipped and boss is nearby
        if (ZONE && ZONE.isBossLevel && G.extinguisherHeld && BOSS && BOSS.alive && !PL.attacking) {
            const distToBoss = Math.abs((PL.x + PL.w / 2) - (BOSS.x + BOSS.w / 2));
            const extRange = 110;
            const inRange = distToBoss < extRange + BOSS.w / 2;
            const t2 = Date.now();
            const rp = 0.4 + Math.sin(t2 * .01) * .3;
            // Range arc in front of player
            const sprayDirX = PL.facing === 1 ? 1 : -1;
            const rangeEnd = PL.x + PL.w / 2 + extRange * sprayDirX;
            CX.save();
            CX.strokeStyle = inRange ? `rgba(0,238,200,${rp + .3})` : `rgba(255,180,0,${rp})`;
            CX.lineWidth = 1;
            CX.setLineDash([4, 5]);
            CX.beginPath();
            CX.moveTo(PL.x + PL.w / 2, PL.y + PL.h / 2);
            CX.lineTo(rangeEnd, PL.y + PL.h / 2);
            CX.stroke();
            CX.setLineDash([]);
            // Tip indicator
            CX.fillStyle = inRange ? `rgba(0,238,200,${rp + .3})` : `rgba(255,180,0,${rp})`;
            CX.font = 'bold 7px "JetBrains Mono",monospace';
            CX.textAlign = 'center';
            CX.fillText(inRange ? '🧯 ¡EN RANGO! [SPC]' : '← acércate más', rangeEnd, PL.y + PL.h / 2 - 8);
            CX.restore();
            CX.textAlign = 'left';
        }

        // Player
        drawPlayer();

        // Particles
        for (const p of PARTS) {
            CX.globalAlpha = p.l / 100; CX.fillStyle = p.col;
            CX.beginPath(); CX.arc(p.x, p.y, p.s, 0, Math.PI * 2); CX.fill();
        }
        CX.globalAlpha = 1;

        // Float texts
        for (const f of FTXTS) {
            CX.globalAlpha = f.a; CX.font = 'bold 11px "Bebas Neue",cursive'; CX.fillStyle = f.c; CX.textAlign = 'center';
            CX.strokeStyle = 'rgba(0,0,0,.8)'; CX.lineWidth = 3; CX.strokeText(f.t, f.x, f.y); CX.fillText(f.t, f.x, f.y);
            CX.textAlign = 'left';
        }
        CX.globalAlpha = 1;

        // Invincibility flash
        if (PL.invincible > 0 && Math.floor(PL.invincible / 6) % 2 === 0) {
            CX.fillStyle = 'rgba(255,0,40,.06)'; CX.fillRect(0, 0, W, H);
        }

        // Objective banner bottom-left
        CX.font = '8px "JetBrains Mono",monospace'; CX.fillStyle = 'rgba(0,200,212,.6)'; CX.textAlign = 'left';
        CX.fillText(ZONE.objective.substring(0, 65), 12, H - 12);

        // Boss level: persistent extinguisher reminder
        if (ZONE && ZONE.isBossLevel && BOSS && BOSS.alive) {
            const t2 = Date.now();
            const p2 = 0.7 + Math.sin(t2 * .007) * .3;
            CX.font = 'bold 10px "JetBrains Mono",monospace';
            CX.textAlign = 'center';
            if (!G.extinguisherHeld) {
                CX.fillStyle = `rgba(255,200,0,${p2})`;
                CX.fillText('🧯  PASO 1: Recoge el EXTINTOR (camina sobre él)  →  PASO 2: Acércate al monstruo  →  PASO 3: Presiona [SPC]', W / 2, H - 28);
            } else {
                const distToBoss = BOSS ? Math.abs((PL.x + PL.w / 2) - (BOSS.x + BOSS.w / 2)) : 999;
                const inRange = distToBoss < 160;
                CX.fillStyle = inRange ? `rgba(0,238,180,${p2})` : `rgba(255,160,0,${p2})`;
                CX.fillText(inRange ? '🧯 ¡EN RANGO! — Presiona [SPC] para disparar el extintor al monstruo' : '🧯 Extintor equipado — Acércate más al 🐲 y presiona [SPC] para atacar', W / 2, H - 28);
            }
            CX.textAlign = 'left';
        }

        // Timer bar (EPP level)
        if (ZONE.isEPPLevel && LEVEL_MAX_TIME > 0) {
            const remaining = (LEVEL_MAX_TIME - LEVEL_TIMER) / LEVEL_MAX_TIME;
            const col = remaining > .5 ? '#00ee66' : remaining > .25 ? '#f5b200' : '#ff3355';
            CX.fillStyle = 'rgba(0,0,0,.6)'; CX.fillRect(W / 2 - 120, H - 22, 240, 10);
            CX.fillStyle = col; CX.fillRect(W / 2 - 120, H - 22, 240 * remaining, 10);
            CX.font = '7px "JetBrains Mono",monospace'; CX.fillStyle = col; CX.textAlign = 'center';
            CX.fillText('TIEMPO RESTANTE', W / 2, H - 26); CX.textAlign = 'left';
        }
    }
    function drawDoor() {
        if (!PLATS || !PLATS[0]) return;
        const d = doorPos();
        const open = isPortalOpen();
        const t = Date.now();
        const {x, y, w, h} = d;

        // === PROGRESS BAR above door (Siempre visible, más delgada y nítida) ===
        const remaining = C_TOT - C_COLL;
        const pct = C_TOT > 0 ? C_COLL / C_TOT : 0;
        const barW = w + 40, barX = x - 20, barY = y - 30;

        // Base de la barra
        CX.fillStyle = 'rgba(0, 0, 0, 0.8)';
        CX.fillRect(barX, barY, barW, 6);
        // Relleno de la barra
        CX.fillStyle = open ? '#00ee66' : pct > .6 ? '#f5b200' : '#ff3355';
        CX.fillRect(barX, barY, barW * pct, 6);
        // Borde fino
        CX.strokeStyle = 'rgba(255, 255, 255, 0.3)'; CX.lineWidth = 1;
        CX.strokeRect(barX, barY, barW, 6);

        // Texto de progreso con sombra hiper-nítida
        CX.font = 'bold 9px "JetBrains Mono", monospace';
        CX.textAlign = 'center';
        const txt = open ? 'ZONA DESPEJADA: SALIDA HABILITADA' : `OBJETIVO: ${C_COLL}/${C_TOT} CONTROLES`;
        CX.fillStyle = 'rgba(0, 0, 0, 0.9)';
        CX.fillText(txt, x + w / 2, barY - 6 + 1); // Sombra
        CX.fillStyle = open ? '#00ee66' : '#ffffff';
        CX.fillText(txt, x + w / 2, barY - 6);     // Frente

        // === ESTRUCTURA DE LA COMPUERTA (Chasis Industrial Metálico) ===
        const frameColor = open ? '#112211' : '#221111';
        const glowColor = open ? '#00ee66' : '#ff3355';
        const pulse = Math.sin(t * 0.005) * 0.5 + 0.5;

        // Sombra de la estructura
        CX.fillStyle = 'rgba(0, 0, 0, 0.5)';
        CX.fillRect(x + 5, y + 5, w, h);

        // Base gris oscuro industrial
        CX.fillStyle = '#1c2024';
        CX.fillRect(x - 5, y - 5, w + 10, h + 5);

        // Paneles laterales (Columnas de soporte)
        CX.fillStyle = '#2a3036';
        CX.fillRect(x - 5, y - 5, 8, h + 5);
        CX.fillRect(x + w - 3, y - 5, 8, h + 5);
        CX.fillRect(x - 5, y - 5, w + 10, 8); // Techo

        // === INTERIOR DE LA PUERTA ===
        if (open) {
            // ABIERTO — Campo de fuerza verde
            const ig = CX.createLinearGradient(x, y, x, y + h);
            ig.addColorStop(0, `rgba(0, 238, 102, ${0.4 + pulse * 0.2})`);
            ig.addColorStop(1, 'rgba(0, 30, 10, 0.9)');
            CX.fillStyle = ig;
            CX.fillRect(x, y, w, h);

            // Líneas de escaneo horizontal (Grid tecnológico)
            CX.save();
            CX.beginPath(); CX.rect(x, y, w, h); CX.clip();
            CX.strokeStyle = `rgba(0, 238, 102, 0.2)`; CX.lineWidth = 1;
            for (let ly = y + ((t / 30) % 15); ly < y + h; ly += 15) {
                CX.beginPath(); CX.moveTo(x, ly); CX.lineTo(x + w, ly); CX.stroke();
            }
            CX.restore();

            // Símbolo de Avance (▶) nítido sin pixelado excesivo
            CX.font = 'bold 24px Arial';
            CX.fillStyle = '#ffffff';
            CX.shadowColor = '#00ee66';
            CX.shadowBlur = 10;
            CX.textAlign = 'center';
            CX.textBaseline = 'middle';
            CX.fillText('▶', x + w / 2, y + h / 2);
            CX.shadowBlur = 0; // Reset

            // Borde luminoso verde
            CX.strokeStyle = '#00ee66';
            CX.lineWidth = 2;
            CX.strokeRect(x, y, w, h);

        } else {
            // CERRADO — Campo de fuerza láser rojo
            const ig = CX.createLinearGradient(x, y, x, y + h);
            ig.addColorStop(0, `rgba(255, 51, 85, ${0.3 + pulse * 0.1})`);
            ig.addColorStop(1, 'rgba(40, 5, 10, 0.9)');
            CX.fillStyle = ig;
            CX.fillRect(x, y, w, h);

            // Rejas láser rojas
            CX.strokeStyle = `rgba(255, 51, 85, ${0.6 + pulse * 0.4})`;
            CX.lineWidth = 2;
            CX.shadowColor = '#ff3355';
            CX.shadowBlur = 8;
            for (let lx = x + 10; lx < x + w; lx += 15) {
                CX.beginPath(); CX.moveTo(lx, y); CX.lineTo(lx, y + h); CX.stroke();
            }
            CX.shadowBlur = 0; // Reset

            // Icono de Candado / Bloqueo
            CX.font = '22px Arial';
            CX.fillStyle = '#ffffff';
            CX.textAlign = 'center';
            CX.textBaseline = 'middle';
            CX.fillText('🔒', x + w / 2, y + h / 2);

            // Borde luminoso rojo
            CX.strokeStyle = '#ff3355';
            CX.lineWidth = 2;
            CX.strokeRect(x, y, w, h);
        }
        CX.textBaseline = 'alphabetic';
        CX.textAlign = 'left';
    }

    /* ── CHARACTER SPRITES ── */
    function drawCharSprite(cx, idx, cx0, cy0, pw, ph) {
        // cx0,cy0 = center of sprite (translated already)
        const W = pw || 32, H = ph || 48;
        const hw = W / 2, hh = H / 2;

        if (idx === 0) {
            // ══ LOTOTITO — Guerrero orco: armadura roja/marrón oscuro, casco blanco con marca roja, espada ══
            // Sombra bajo los pies
              cx.fillStyle = 'rgba(0,0,0,0.25)';
              cx.beginPath(); cx.ellipse(0, hh * 0.98, hw * 0.8, hh * 0.07, 0, 0, Math.PI * 2); cx.fill();

              // === PIERNAS Y BOTAS ===
              // Botas (Negras)
              cx.fillStyle = '#111111';
              cx.beginPath(); cx.ellipse(-hw * 0.35, hh * 0.85, hw * 0.3, hh * 0.15, 0, 0, Math.PI * 2); cx.fill();
              cx.beginPath(); cx.ellipse(hw * 0.35, hh * 0.85, hw * 0.3, hh * 0.15, 0, 0, Math.PI * 2); cx.fill();
              // Piernas (Amarillas)
              cx.fillStyle = '#ffde00';
              cx.fillRect(-hw * 0.55, hh * 0.4, hw * 0.4, hh * 0.4);
              cx.fillRect(hw * 0.15, hh * 0.4, hw * 0.4, hh * 0.4);
              // Rodilleras (Rojas)
              cx.fillStyle = '#d3121b';
              cx.beginPath(); cx.ellipse(-hw * 0.35, hh * 0.65, hw * 0.2, hh * 0.1, 0, 0, Math.PI * 2); cx.fill();
              cx.beginPath(); cx.ellipse(hw * 0.35, hh * 0.65, hw * 0.2, hh * 0.1, 0, 0, Math.PI * 2); cx.fill();

              // === BRAZOS ===
              cx.fillStyle = '#ffde00';
              // Brazo derecho (descansando a su lado)
              cx.beginPath(); cx.ellipse(hw * 0.7, -hh * 0.1, hw * 0.2, hh * 0.3, -0.2, 0, Math.PI * 2); cx.fill();
              // Brazo izquierdo (levantado)
              cx.beginPath(); cx.ellipse(-hw * 0.7, -hh * 0.2, hw * 0.2, hh * 0.3, 0.5, 0, Math.PI * 2); cx.fill();

              // Hombreras (Rojas)
              cx.fillStyle = '#d3121b';
              cx.beginPath(); cx.ellipse(hw * 0.75, -hh * 0.3, hw * 0.15, hh * 0.15, 0, 0, Math.PI * 2); cx.fill();

    function drawPlayer() {
        const p = PL;
        if (!p || !isFinite(p.x) || !isFinite(p.y)) return;
        const bob = p.onGround && Math.abs(p.vx) > .5 ? Math.sin(p.ft * .85) * 2 : 0;
        // Shadow
        CX.fillStyle = 'rgba(0,0,0,.28)'; CX.beginPath();
        CX.ellipse(p.x + p.w / 2, p.y + p.h + 4, p.w / 2 - 2, 6, 0, 0, Math.PI * 2); CX.fill();
        // Glow
        const gl = CX.createRadialGradient(p.x + p.w / 2, p.y + p.h / 2, 0, p.x + p.w / 2, p.y + p.h / 2, 28);
        gl.addColorStop(0, 'rgba(0,200,212,.12)'); gl.addColorStop(1, 'rgba(0,0,0,0)');
        CX.fillStyle = gl; CX.fillRect(p.x - 28, p.y - 28, p.w + 56, p.h + 56);
        // Sprite
        CX.save(); CX.translate(p.x + p.w / 2, p.y + p.h / 2 + bob);
        const sc = p.scale || 1;
        if (sc !== 1) CX.scale(sc, sc);
        if (p.facing === -1) CX.scale(-1, 1);
        if (p.invincible > 0) CX.globalAlpha = Math.sin(p.invincible * .5) * .4 + .6;
        CX.textAlign = 'center'; CX.textBaseline = 'middle';
        const charIdx = G.charIdx || 0;
        if (p.attacking) {
            CX.font = '28px serif';
            CX.fillText(ZONE && ZONE.isBossLevel && G.extinguisherHeld ? '🧯' : '🥊', 0, 0);
        } else {
            drawCharSprite(CX, charIdx, 0, 0, p.w, p.h);
        }
        CX.restore(); CX.globalAlpha = 1; CX.textBaseline = 'alphabetic';
        // ATK cooldown bar
        if (p.atkCd > 0) {
            CX.fillStyle = 'rgba(0,0,0,.5)'; CX.fillRect(p.x - 2, p.y - 10, p.w + 4, 4);
            CX.fillStyle = '#00eeff'; CX.fillRect(p.x - 2, p.y - 10, (p.w + 4) * (1 - p.atkCd / 28), 4);
        }
    }
    /* ── RISK METER UPDATE ── */
    function updateRiskMeter() {
        const aliveHzds = HZDS ? HZDS.filter(h => h.alive) : [];
        // Severity from alive hazards
        const sevScore = aliveHzds.length ? aliveHzds.reduce((a, h) => a + h.sev, 0) / aliveHzds.length : 0;
        // Probability approximation
        const expScore = ZONE && ZONE.isProbabilityLevel ? (C_TOT - C_COLL) / Math.max(1, C_TOT) * 4 : 2;
        const initRisk = Math.round(sevScore * expScore);
        //SEGURITA (-15% Riesgo Residual)
        let bonusGerente = (CHARS[G.charIdx] && CHARS[G.charIdx].name === 'SEGURITA') ? 15 : 0;
        const ctrlRed = Math.min(85, Math.round((G.eppReduction + G.controlReduction) * 100) + bonusGerente);
        const residual = Math.round(initRisk * (1 - ctrlRed / 100));

        const label = residual > 7 ? 'INTOLERABLE' : residual > 4 ? 'IMPORTANTE' : residual > 2 ? 'MODERADO' : 'ACEPTABLE';
        const col = residual > 7 ? '#aa0022' : residual > 4 ? '#cc4400' : residual > 2 ? '#886600' : '#005520';

        const rmSev = $('rm-sev'); if (rmSev) rmSev.textContent = sevScore.toFixed(1);
        const rmProb = $('rm-prob'); if (rmProb) rmProb.textContent = expScore.toFixed(1);
        const rmInit = $('rm-initial'); if (rmInit) {rmInit.textContent = initRisk; rmInit.style.color = '#aa0022';}
        const rmFill = $('rm-initial-fill'); if (rmFill) {rmFill.style.width = Math.min(100, initRisk * 10) + '%'; rmFill.style.background = '#aa0022';}
        const rmCtrl = $('rm-ctrl'); if (rmCtrl) rmCtrl.textContent = ctrlRed + '%';
        const rmRes = $('rm-residual'); if (rmRes) {rmRes.textContent = residual; rmRes.style.color = col;}
        const rmResFill = $('rm-residual-fill'); if (rmResFill) {rmResFill.style.width = Math.min(100, residual * 10) + '%'; rmResFill.style.background = col;}
        const rmBadge = $('rm-badge'); if (rmBadge) {rmBadge.textContent = label; rmBadge.className = 'rm-badge rmb-' + label.substring(0, 2);}
    }

    /* ── HUD UPDATE ── */
    function updateHUD() {
        const hp = Math.max(0, G.hp);
        const hfhp = $('hf-hp');
        if (hfhp) {
            hfhp.style.width = hp + '%';
            hfhp.style.background = hp > 60 ? 'linear-gradient(90deg,#007030,#00ee66)' : hp > 30 ? 'linear-gradient(90deg,#554400,#f5b200)' : 'linear-gradient(90deg,#550000,#ff3355)';
        }
        const hvhp = $('hv-hp'); if (hvhp) {hvhp.textContent = hp + '%'; hvhp.style.color = hp > 60 ? '#00ee66' : hp > 30 ? '#f5b200' : '#ff3355';}
        const hvxp = $('hv-xp'); if (hvxp) hvxp.textContent = G.xp;
        const hvneut = $('hv-neut'); if (hvneut) hvneut.textContent = P_NEUT + '/' + P_TOT; const hvitems = $('hv-items'); if (hvitems) hvitems.textContent = C_COLL + '/' + C_TOT;
    }

    /* ── HELPERS ── */
    function spawnP(x, y, col, n) {
        for (let i = 0; i < n; i++) {
            const a = (Math.PI * 2 / n) * i + Math.random() * .5, sp = 2.5 + Math.random() * 3;
            PARTS.push({x, y, vx: Math.cos(a) * sp, vy: Math.sin(a) * sp - 1, col, l: 80 + Math.random() * 30, s: 3 + Math.random() * 4});
        }
    }
    function ft(x, y, t, c) {FTXTS.push({t, x, y, c, l: 80, a: 1});}
    function roundRect(x, y, w, h, r) {
        CX.beginPath(); CX.moveTo(x + r, y); CX.lineTo(x + w - r, y); CX.arcTo(x + w, y, x + w, y + r, r);
        CX.lineTo(x + w, y + h - r); CX.arcTo(x + w, y + h, x + w - r, y + h, r);
        CX.lineTo(x + r, y + h); CX.arcTo(x, y + h, x, y + h - r, r);
        CX.lineTo(x, y + r); CX.arcTo(x, y, x + r, y, r); CX.closePath();
    }
    function lighten(h, a) {
        try {
            let r = parseInt(h.slice(1, 3), 16) + a, g = parseInt(h.slice(3, 5), 16) + a, b = parseInt(h.slice(5, 7), 16) + a;
            return '#' + [r, g, b].map(v => Math.min(255, Math.max(0, v)).toString(16).padStart(2, '0')).join('');
        } catch (e) {return h;}
    }

                <button class="mc-btn mc-dpad-left"              id="mc-left">◀</button>
                <button class="mc-btn mc-dpad-right"             id="mc-right">▶</button>
              </div>

              <div class="mc-actions">
                <button class="mc-btn" id="mc-inter" style="grid-column:1; grid-row:1;">[F]</button>
                <button class="mc-btn" id="mc-atk"   style="grid-column:2; grid-row:1;">⚔</button>
                <button class="mc-btn" id="mc-ext"   style="grid-column:1 / span 2; grid-row:2;">🧯</button>
              </div>`;

        document.body.appendChild(mc);

        // ── Asignar eventos táctiles robustos ──
        // ── Asignar eventos táctiles robustos ──
        function bindKey(btnId, keyName, onlyTap) {
            const btn = document.getElementById(btnId);
            if (!btn) return;

            if (onlyTap) {
                btn.addEventListener('touchstart', e => {
                    e.preventDefault();
                    btn.classList.add('pressed');

                    if (keyName === '__atk__' && typeof doAtk === 'function') {
                        doAtk();
                    }
                    else if (keyName === '__inter__') {
                        KEYS['f'] = true;
                        if (typeof onKey === 'function') onKey('f');
                        setTimeout(() => {KEYS['f'] = false;}, 150);
                    }
                    else if (keyName === '__ext__') {
                        KEYS[' '] = true;
                        if (typeof onKey === 'function') onKey(' ');
                        setTimeout(() => {KEYS[' '] = false;}, 150);
                    }

                    setTimeout(() => btn.classList.remove('pressed'), 180);
                }, {passive: false});
            } else {
                btn.addEventListener('touchstart', e => {
                    e.preventDefault();
                    btn.classList.add('pressed');
                    KEYS[keyName] = true;
                }, {passive: false});

                btn.addEventListener('touchend', e => {
                    e.preventDefault();
                    btn.classList.remove('pressed');
                    KEYS[keyName] = false;
                }, {passive: false});

                btn.addEventListener('touchcancel', e => {
                    e.preventDefault();
                    btn.classList.remove('pressed');
                    KEYS[keyName] = false;
                }, {passive: false});
            }
        }

        bindKey('mc-left', 'a', false);
        bindKey('mc-right', 'd', false);
        bindKey('mc-up', 'arrowup', false);
        bindKey('mc-atk', '__atk__', true);
        bindKey('mc-inter', '__inter__', true);
        bindKey('mc-ext', '__ext__', true);

        const hint = document.querySelector('.hkeys');
        if (hint) hint.style.display = 'none';
    }

    /* ── INIT ── */
    buildChars();
    loadHiScore();
    if ('ontouchstart' in window || navigator.maxTouchPoints > 0) addMobileControls();

    /* ── Volver al Mapa de Selección ── */
    function returnToMap() {
        RUNNING = false;      // Detiene el ciclo de físicas
        LEVEL_DONE = true;    // Marca el nivel como finalizado/interrumpido

        if (typeof stopBGM === 'function') stopBGM();

        if (QZ && QZ.active) closeQuiz();

        show('s-map');

        if (typeof buildMap === 'function') buildMap();
    }

    /* ════════════════════════════════════════════════
      NUEVO BLOQUE: SELECCIÓN DE UBICACIÓN
    ════════════════════════════════════════════════ */

    // Variables globales para guardar la selección (Guardamos el ID y el Nombre por si acaso)
    var ubicacionSeleccionada = {
        paisId: "",
        paisNombre: "",
        operacionId: "",
        operacionNombre: ""
    };

    function iniciarJuego() {
        document.getElementById('modal-ubicacion').style.display = 'flex';
        google.script.run
            .withSuccessHandler(llenarDesplegables)
            .obtenerDatosUbicacion();
    }

    function llenarDesplegables(datos) {
        var selectPais = document.getElementById('select-pais');
        var selectPlanta = document.getElementById('select-planta');

        selectPais.innerHTML = '<option value="">-- Selecciona un País --</option>';
        selectPlanta.innerHTML = '<option value="">-- Selecciona tu Producto --</option>';

        // Llenar Países
        datos.paises.forEach(function(pais) {
            var opt = document.createElement('option');
            opt.value = pais.id; // <-- AQUÍ GUARDAMOS EL ID
            opt.innerHTML = pais.label; // Lo que ve el usuario
            opt.setAttribute('data-nombre', pais.label); // Guardamos el nombre extra
            selectPais.appendChild(opt);
        });

        // Llenar Operaciones (Sociedad - Planta - Producto)
        datos.operaciones.forEach(function(op) {
            var opt = document.createElement('option');
            opt.value = op.id; // <-- AQUÍ GUARDAMOS EL ID
            opt.innerHTML = op.label; // Ejemplo: "Alicorp - COPSA - Salsas"
            opt.setAttribute('data-nombre', op.label);
            selectPlanta.appendChild(opt);
        });
    }

    function cerrarModalUbicacion() {
        document.getElementById('modal-ubicacion').style.display = 'none';
    }

    function confirmarUbicacion() {
        var selectPais = document.getElementById('select-pais');
        var selectPlanta = document.getElementById('select-planta');

        if (selectPais.value === "" || selectPlanta.value === "") {
            alert("Por favor, completa ambos campos para continuar.");
            return;
        }

        // Guardamos los IDs seleccionados
        ubicacionSeleccionada.paisId = selectPais.value;
        ubicacionSeleccionada.paisNombre = selectPais.options[selectPais.selectedIndex].getAttribute('data-nombre');

        ubicacionSeleccionada.operacionId = selectPlanta.value;
        ubicacionSeleccionada.operacionNombre = selectPlanta.options[selectPlanta.selectedIndex].getAttribute('data-nombre');

        cerrarModalUbicacion();

        var titleScreen = document.getElementById('s-title');
        if (titleScreen) titleScreen.classList.remove('on');
        var charScreen = document.getElementById('s-char');
        if (charScreen) charScreen.classList.add('on');
    }

    function abrirManual() {
        var modal = document.getElementById('modal-manual');
        if (modal) modal.style.display = 'flex';
    }

    function cerrarManual() {
        var modal = document.getElementById('modal-manual');
        if (modal) modal.style.display = 'none';
    }

</script>
