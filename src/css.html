<style>
    @import url('https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Exo+2:wght@300;400;600;700;900&family=JetBrains+Mono:wght@400;700&display=swap');

    :root {
        --bg: #0e0e0e;
        --bg2: #141414;
        --bg3: #1a1a1a;
        --b1: #2a2a2a;
        --b2: #363636;
        --b3: #444444;
        --txt: #d8d8d8;
        --mut: #888880;
        --red: #dd1133;
        --r2: #ff3355;
        --r3: #ff6680;
        --gold: #c89000;
        --g2: #f5b200;
        --g3: #ffe066;
        --cyan: #00c8d4;
        --c2: #00eeff;
        --c3: #80f8ff;
        --grn: #00bb44;
        --gr2: #00ee66;
        --gr3: #80ffaa;
        --ora: #cc5500;
        --or2: #ff8000;
        --pur: #7722cc;
        --p2: #aa55ff;
        --yel: #bbaa00;
        --y2: #ffee00;
        --beb: 'Bebas Neue', cursive;
        --exo: 'Exo 2', sans-serif;
        --jb: 'JetBrains Mono', monospace;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    html,
    body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: var(--bg);
        color: var(--txt);
        font-family: var(--exo);
    }

    /* scanline overlay */
    body::after {
        content: '';
        position: fixed;
        inset: 0;
        z-index: 9999;
        pointer-events: none;
        background: repeating-linear-gradient(0deg, transparent, transparent 3px, rgba(0, 0, 0, 0.012) 3px, rgba(0, 0, 0, 0.012) 4px);
    }

    /* ═══════════ SCREENS ═══════════ */
    .scr {
        position: fixed;
        inset: 0;
        z-index: 10;
        display: none;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 16px;
        overflow-y: auto;
    }

    .scr.on {
        display: flex;
    }

    /* ═══════════ NOTIFICATIONS ═══════════ */
    #notifs {
        position: fixed;
        top: 14px;
        left: 50%;
        transform: translateX(-50%);
        z-index: 10000;
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: center;
        pointer-events: none;
    }

    .notif {
        font-family: var(--jb);
        font-size: 11px;
        padding: 8px 20px;
        letter-spacing: 1px;
        animation: nslide .3s ease-out;
        border: 1px solid;
        max-width: 400px;
        text-align: center;
        border-radius: 4px;
        backdrop-filter: blur(4px);
        box-shadow: 0 3px 12px rgba(0, 0, 0, .35);
    }

    @keyframes nslide {
        from {
            opacity: 0;
            transform: translateY(-8px);
        }

        to {
            opacity: 1;
            transform: none;
        }
    }

    .ng {
        color: #00cc44;
        border-color: rgba(0, 180, 60, .5);
        background: rgba(10, 90, 35, .88);
        font-weight: 600;
    }

    .nb {
        color: #ff5577;
        border-color: rgba(220, 30, 60, .5);
        background: rgba(100, 15, 25, .88);
        font-weight: 600;
    }

    .ni {
        color: #00ddff;
        border-color: rgba(0, 180, 210, .4);
        background: rgba(10, 55, 80, .88);
        font-weight: 600;
    }

    .np {
        color: #cc88ff;
        border-color: rgba(140, 60, 220, .5);
        background: rgba(50, 10, 90, .88);
        font-weight: 600;
    }

    .nw {
        color: #ffe044;
        border-color: rgba(210, 170, 0, .5);
        background: rgba(80, 60, 5, .88);
        font-weight: 600;
    }

    /* ═══════════ TITLE ═══════════ */
    #s-title {
        background:
            radial-gradient(ellipse 80% 50% at 50% 0%, rgba(200, 0, 50, .1) 0%, transparent 60%),
            radial-gradient(ellipse 60% 40% at 20% 80%, rgba(0, 200, 212, .06) 0%, transparent 50%),
            var(--bg);
    }

    .title-wrap {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 0;
        position: relative;
    }

    .title-iperc {
        font-family: var(--beb);
        font-size: clamp(60px, 12vw, 120px);
        letter-spacing: 12px;
        line-height: 1;
        background: linear-gradient(135deg, #ffe066, #f5b200, #cc8800);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(245, 178, 0, .4));
        text-shadow: none;
    }

    .title-zone {
        font-family: var(--beb);
        font-size: clamp(24px, 5vw, 50px);
        letter-spacing: 20px;
        color: var(--c2);
        text-shadow: 0 0 20px rgba(0, 238, 255, .5);
        margin-bottom: 4px;
    }

    .title-tag {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--mut);
        letter-spacing: 5px;
        margin-bottom: 28px;
        border: 1px solid var(--b2);
        padding: 4px 14px;
    }

    .title-desc {
        font-family: var(--exo);
        font-size: 14px;
        color: var(--mut);
        line-height: 1.8;
        max-width: 500px;
        text-align: center;
        margin-bottom: 30px;
        font-weight: 300;
    }

    .title-phases {
        display: flex;
        gap: 10px;
        margin-bottom: 30px;
        flex-wrap: wrap;
        justify-content: center;
    }

    .ph-chip {
        font-family: var(--jb);
        font-size: 9px;
        padding: 5px 14px;
        border: 1px solid;
        letter-spacing: 2px;
    }

    .ph-red {
        color: var(--r2);
        border-color: rgba(220, 20, 50, .4);
        background: rgba(80, 0, 15, .5);
    }

    .ph-yel {
        color: var(--y2);
        border-color: rgba(200, 180, 0, .4);
        background: rgba(60, 50, 0, .5);
    }

    .ph-grn {
        color: var(--gr2);
        border-color: rgba(0, 200, 68, .3);
        background: rgba(0, 50, 15, .5);
    }

    .btn-main {
        font-family: var(--beb);
        font-size: clamp(16px, 2.5vw, 22px);
        letter-spacing: 4px;
        border: 2px solid var(--g2);
        cursor: pointer;
        background: linear-gradient(135deg, rgba(200, 144, 0, .15), rgba(245, 178, 0, .25));
        color: var(--g3);
        padding: 14px 50px;
        transition: all .2s;
        position: relative;
        overflow: hidden;
    }

    .btn-main::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(245, 178, 0, 0), rgba(245, 178, 0, .15));
        opacity: 0;
        transition: .2s;
    }

    .btn-main:hover::before {
        opacity: 1;
    }

    .btn-main:hover {
        transform: translateY(-3px);
        box-shadow: 0 8px 30px rgba(245, 178, 0, .3);
    }

    .deco-line {
        display: flex;
        align-items: center;
        gap: 12px;
        margin: 16px 0;
    }

    .dl {
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, transparent, var(--b3));
    }

    .dr {
        height: 1px;
        width: 80px;
        background: linear-gradient(90deg, var(--b3), transparent);
    }

    .dd {
        width: 8px;
        height: 8px;
        background: var(--g2);
        transform: rotate(45deg);
    }

    .hof-score {
        font-family: var(--jb);
        font-size: 10px;
        color: var(--mut);
        letter-spacing: 2px;
    }

    /* ═══════════ LEVEL SELECT / MAP ═══════════ */
    #s-map {
        background:
            radial-gradient(ellipse 70% 50% at 50% 50%, rgba(0, 100, 200, .05), transparent 60%),
            var(--bg);
    }

    .map-header {
        text-align: center;
        margin-bottom: 20px;
    }

    .map-title {
        font-family: var(--beb);
        font-size: clamp(18px, 3vw, 28px);
        letter-spacing: 4px;
        color: var(--c2);
    }

    .map-hero-card {
        display: flex;
        align-items: center;
        gap: 14px;
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 10px 18px;
        margin-bottom: 20px;
    }

    .mhc-av {
        font-size: 32px;
    }

    .mhc-name {
        font-family: var(--beb);
        font-size: 16px;
        letter-spacing: 2px;
        color: var(--c2);
    }

    .mhc-stats {
        display: flex;
        gap: 14px;
        margin-top: 4px;
    }

    .mhcs {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--mut);
    }

    .mhcs span {
        color: var(--txt);
    }

    .levels-track {
        display: flex;
        align-items: center;
        gap: 0;
        width: 100%;
        max-width: 800px;
        justify-content: center;
    }

    .lnode {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 8px;
        cursor: pointer;
        padding: 10px;
        transition: all .2s;
        flex: 0 0 auto;
    }

    .lnc {
        width: clamp(64px, 9vw, 88px);
        height: clamp(64px, 9vw, 88px);
        border-radius: 50%;
        border: 2px solid;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: clamp(22px, 3.5vw, 34px);
        transition: all .2s;
        background: rgba(0, 0, 0, .7);
        position: relative;
    }

    .lnc.locked {
        border-color: var(--b1);
        opacity: .35;
        filter: grayscale(1);
        cursor: not-allowed;
    }

    .lnc.current {
        border-color: var(--c2);
        animation: cpulse 1.5s ease-in-out infinite;
    }

    @keyframes cpulse {

        0%,
        100% {
            box-shadow: 0 0 16px rgba(0, 238, 255, .5);
        }

        50% {
            box-shadow: 0 0 36px rgba(0, 238, 255, .8), 0 0 60px rgba(0, 238, 255, .2);
        }
    }

    .lnc.done {
        border-color: var(--gr2);
        background: rgba(0, 100, 40, .2);
    }

    .lnc-phase-tag {
        position: absolute;
        top: -10px;
        left: 50%;
        transform: translateX(-50%);
        font-family: var(--jb);
        font-size: 6px;
        letter-spacing: 1px;
        padding: 2px 6px;
        border: 1px solid;
        white-space: nowrap;
    }

    .pt-red {
        color: var(--r2);
        border-color: var(--red);
        background: rgba(60, 0, 10, .9);
    }

    .pt-ora {
        color: var(--or2);
        border-color: var(--ora);
        background: rgba(50, 20, 0, .9);
    }

    .pt-yel {
        color: var(--y2);
        border-color: var(--yel);
        background: rgba(50, 40, 0, .9);
    }

    .pt-boss {
        color: #ff55ff;
        border-color: #aa00aa;
        background: rgba(40, 0, 40, .9);
    }

    .lnn {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--mut);
        letter-spacing: 1px;
        text-align: center;
        max-width: 85px;
        line-height: 1.4;
    }

    .lnn.current {
        color: var(--c2);
    }

    .lnn.done {
        color: var(--gr2);
    }

    .lconn {
        height: 2px;
        flex: 1;
        max-width: 60px;
    }

    .lconn.done {
        background: linear-gradient(90deg, var(--gr2), var(--g2));
    }

    .lconn.locked {
        background: var(--b1);
    }

    .risk-preview {
        background: rgba(0, 0, 0, .4);
        border: 1px solid var(--b2);
        padding: 12px 20px;
        max-width: 600px;
        margin-top: 16px;
        font-family: var(--jb);
        font-size: 10px;
        letter-spacing: 1px;
    }

    .rp-row {
        display: flex;
        justify-content: space-between;
        gap: 20px;
        margin-top: 8px;
    }

    .rp-item {
        display: flex;
        flex-direction: column;
        gap: 3px;
        flex: 1;
    }

    .rp-label {
        font-size: 7px;
        color: var(--mut);
        letter-spacing: 2px;
    }

    .rp-val {
        font-size: 14px;
        font-family: var(--beb);
        letter-spacing: 2px;
    }

    /* ═══════════ SHARED GAME UI ═══════════ */
    #s-game {
        position: fixed;
        inset: 0;
        padding: 0;
    }

    #ghud {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        z-index: 50;
        display: flex;
        align-items: center;
        gap: 6px;
        flex-wrap: nowrap;
        overflow: hidden;
        padding: 4px 10px;
        background: #ffffff;
        border-bottom: 2px solid #cccccc;
        height: 44px;
    }

    .hitem {
        display: flex;
        flex-direction: column;
        gap: 0px;
        min-width: 0;
        flex-shrink: 1;
    }

    .hlbl {
        font-family: var(--jb);
        font-size: 5.5px;
        color: rgba(60, 55, 50, .8);
        letter-spacing: 1.5px;
        white-space: nowrap;
    }

    .hbar {
        height: 6px;
        background: rgba(0, 0, 0, .12);
        border: 1px solid rgba(0, 0, 0, .18);
        overflow: hidden;
        width: 70px;
    }

    .hfill {
        height: 100%;
        transition: width .5s ease;
    }

    .hval {
        font-family: var(--beb);
        font-size: 10px;
        letter-spacing: 1px;
        white-space: nowrap;
    }

    .hsep {
        width: 1px;
        height: 22px;
        background: rgba(0, 0, 0, .18);
        flex-shrink: 0;
    }

    .hstage-name {
        font-family: var(--beb);
        font-size: clamp(9px, 1.4vw, 13px);
        color: var(--gold);
        letter-spacing: 2px;
        margin-left: auto;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .hkeys {
        font-family: var(--jb);
        font-size: 6px;
        color: rgba(60, 55, 50, .75);
        line-height: 1.6;
        white-space: nowrap;
        flex-shrink: 0;
    }

    .kb {
        display: inline-block;
        background: rgba(0, 0, 0, .08);
        border: 1px solid rgba(0, 0, 0, .2);
        padding: 1px 4px;
        border-radius: 2px;
        color: rgba(30, 28, 25, .9);
    }

    #gameCanvas {
        position: absolute;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
        display: block;
    }

    /* Victory overlay — fixed at root, above everything */
    #vic-ov {
        position: fixed;
        inset: 0;
        z-index: 5000;
        background: rgba(6, 8, 16, .97);
        display: none;
        align-items: center;
        justify-content: center;
    }

    #vic-ov.show {
        display: flex;
    }

    .vic-box {
        text-align: center;
        padding: clamp(1.5rem, 3vw, 2.5rem) clamp(2rem, 4vw, 3rem);
        max-width: 560px;
        width: 92%;
        background: rgba(6, 12, 24, .99);
        border: 1px solid var(--b3);
    }

    .vic-phase-label {
        font-family: var(--jb);
        font-size: 8px;
        color: var(--cyan);
        letter-spacing: 4px;
        margin-bottom: 8px;
    }

    .vic-title {
        font-family: var(--beb);
        font-size: clamp(26px, 4.5vw, 38px);
        color: var(--g2);
        letter-spacing: 4px;
        margin-bottom: 4px;
        text-shadow: 0 0 20px rgba(245, 178, 0, .5);
    }

    .vic-subtitle {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--mut);
        letter-spacing: 3px;
        margin-bottom: 18px;
    }

    .vic-stats {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 8px;
        margin-bottom: 14px;
    }

    .vs-item {
        background: rgba(0, 0, 0, .5);
        border: 1px solid var(--b2);
        padding: 10px 8px;
        text-align: center;
    }

    .vs-val {
        font-family: var(--beb);
        font-size: clamp(18px, 3vw, 26px);
        letter-spacing: 2px;
    }

    .vs-lbl {
        font-family: var(--jb);
        font-size: 6px;
        color: var(--mut);
        letter-spacing: 1px;
        margin-top: 2px;
    }

    .vic-iperc-box {
        background: rgba(0, 100, 40, .08);
        border: 1px solid rgba(0, 200, 68, .2);
        padding: 10px 14px;
        font-family: var(--jb);
        font-size: 9px;
        color: var(--gr2);
        line-height: 1.7;
        margin-bottom: 10px;
        text-align: left;
    }

    .vic-lesson {
        background: rgba(200, 150, 0, .06);
        border: 1px solid rgba(200, 150, 0, .2);
        padding: 10px 14px;
        font-size: 12px;
        color: var(--g2);
        line-height: 1.6;
        margin-bottom: 18px;
        text-align: left;
    }

    .vic-next-info {
        font-family: var(--jb);
        font-size: 9px;
        color: var(--c2);
        letter-spacing: 2px;
        margin-bottom: 14px;
    }

    .vic-btn {
        font-family: var(--beb);
        font-size: 18px;
        letter-spacing: 4px;
        border: 2px solid;
        cursor: pointer;
        padding: 12px 36px;
        transition: all .2s;
    }

    .vic-btn-grn {
        border-color: var(--gr2);
        color: var(--gr2);
        background: rgba(0, 100, 40, .15);
    }

    .vic-btn-grn:hover {
        background: rgba(0, 100, 40, .3);
        transform: translateY(-2px);
    }

    .vic-btn-red {
        border-color: var(--r2);
        color: var(--r2);
        background: rgba(80, 0, 15, .15);
    }

    .vic-btn-red:hover {
        background: rgba(80, 0, 15, .3);
        transform: translateY(-2px);
    }

    /* ═══════════ RISK METER HUD ═══════════ */
    #risk-meter {
        position: fixed;
        top: 46px;
        right: 10px;
        z-index: 40;
        width: 160px;
        display: none;
        background: rgba(200, 240, 220, .96);
        border: 1px solid rgba(0, 140, 80, .25);
        padding: 10px;
    }

    .rm-title {
        font-family: var(--jb);
        font-size: 7px;
        color: rgba(0, 80, 40, .8);
        letter-spacing: 2px;
        margin-bottom: 8px;
    }

    .rm-row {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 4px;
    }

    .rm-label {
        font-family: var(--jb);
        font-size: 7px;
        color: rgba(0, 70, 35, .8);
    }

    .rm-val {
        font-family: var(--beb);
        font-size: 12px;
        letter-spacing: 1px;
    }

    .rm-bar {
        height: 6px;
        background: rgba(0, 0, 0, .1);
        border: 1px solid rgba(0, 100, 50, .2);
        margin-bottom: 6px;
    }

    .rm-fill {
        height: 100%;
        transition: width .6s ease;
    }

    .rm-badge {
        font-family: var(--jb);
        font-size: 8px;
        padding: 3px 10px;
        border: 1px solid;
        text-align: center;
        margin-top: 6px;
        letter-spacing: 2px;
    }

    .rmb-AC {
        color: var(--gr2);
        border-color: rgba(0, 200, 68, .5);
    }

    .rmb-MO {
        color: var(--y2);
        border-color: rgba(200, 180, 0, .5);
    }

    .rmb-IM {
        color: var(--or2);
        border-color: rgba(200, 80, 0, .5);
    }

    .rmb-IN {
        color: var(--r2);
        border-color: rgba(200, 0, 40, .5);
    }

    /* ═══════════ CHAR SELECT — EPIC HERO STYLE ═══════════ */
    #s-char {
        background:
            radial-gradient(ellipse 120% 60% at 50% 100%, rgba(0, 60, 180, .22) 0%, transparent 55%),
            radial-gradient(ellipse 80% 40% at 20% 50%, rgba(0, 80, 200, .10) 0%, transparent 50%),
            radial-gradient(ellipse 80% 40% at 80% 50%, rgba(0, 60, 180, .10) 0%, transparent 50%),
            linear-gradient(180deg, #060e2a 0%, #0a1640 40%, #060e28 100%);
        overflow-y: auto;
    }

    .cs-title {
        font-family: var(--beb);
        font-size: clamp(28px, 5vw, 52px);
        letter-spacing: 8px;
        margin-bottom: 2px;
        background: linear-gradient(135deg, #ffffff, #ffe88a, #f5c200);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        filter: drop-shadow(0 0 30px rgba(255, 200, 0, .5));
        text-align: center;
    }

    .cs-sub {
        font-family: var(--jb);
        font-size: 9px;
        color: rgba(180, 220, 255, .6);
        letter-spacing: 5px;
        margin-bottom: 28px;
        text-align: center;
    }

    .chars-row {
        display: flex;
        gap: 0;
        justify-content: center;
        flex-wrap: nowrap;
        max-width: 1000px;
        width: 100%;
        align-items: stretch;
    }

    /* Hero card */
    .cc {
        width: clamp(140px, 20vw, 220px);
        background: linear-gradient(170deg, rgba(30, 5, 2, .98) 0%, rgba(10, 0, 0, .99) 100%);
        border: 1px solid rgba(255, 60, 0, .2);
        cursor: pointer;
        text-align: center;
        transition: all .28s cubic-bezier(.2, .8, .3, 1);
        position: relative;
        overflow: hidden;
        clip-path: polygon(0 0, 100% 0, 100% 92%, 90% 100%, 0 100%);
        flex: 1;
    }

    /* Angled side separator */
    .cc+.cc {
        border-left: none;
    }

    .cc::before {
        content: '';
        position: absolute;
        inset: 0;
