    /* ── QUIZ STATE ── */
    let QZ = {
        active: false,
        levelId: 1,
        questions: [],
        current: 0,
        answers: [],        // true/false per question
        selected: null,
        timerTotal: 120,    // 2 minutes
        timerLeft: 120,
        timerInterval: null,
        doorLocked: false,  // after a failed attempt, door locks temporarily
        doorLockTimer: 0,
    };

    /* ── SECRET DOOR POSITION — next to the normal door on left platform ── */
    function secretDoorPos() {
        if (!PLATS || PLATS.length < 4) return null;

        const topPlat = PLATS[3];

        return {
            x: topPlat.x + (topPlat.w * 0.5) - 22,
            y: topPlat.y - 75,
            w: 44,
            h: 75
        };
    }

    /* ── Draw Secret Door (Teleport Portal) ── */
    function drawSecretDoor() {
        if (!PLATS || LEVEL_DONE) return;
        const d = secretDoorPos();
        if (!d) return;

        const {x, y, w, h} = d;
        const cx = x + w / 2;
        const cy = y + h / 2;
        const locked = QZ.doorLocked;

        // Movimiento suave de flotación
        const t = Date.now();
        const hoverY = cy + Math.sin(t * 0.003) * 6;

        CX.save();

        // 1. Brillo exterior (Glow)
        CX.shadowColor = locked ? '#ff3355' : '#00eeff';
        CX.shadowBlur = 15;

        // 2. Fondo del portal (Óvalo semi-transparente)
        CX.beginPath();
        CX.ellipse(cx, hoverY, w / 2, h / 2, 0, 0, Math.PI * 2);
        CX.fillStyle = locked ? 'rgba(255, 51, 85, 0.15)' : 'rgba(0, 238, 255, 0.15)';
        CX.fill();

        // 3. Borde sólido del portal
        CX.lineWidth = 3;
        CX.strokeStyle = locked ? '#ff3355' : '#00eeff';
        CX.stroke();

        // 4. Icono central
        CX.font = '24px Arial';
        CX.textAlign = 'center';
        CX.textBaseline = 'middle';
        CX.shadowBlur = 0; // Apagamos la sombra para que el emoji sea nítido
        CX.fillText(locked ? '🔒' : '⚡', cx, hoverY);

        // 5. Texto superior limpio
        CX.font = 'bold 11px "JetBrains Mono", monospace';
        CX.fillStyle = '#ffffff';

        // Si está bloqueado y hay temporizador
        if (locked && QZ.doorLockTimer > 0) {
            const segs = Math.ceil(QZ.doorLockTimer / 60);
            CX.fillStyle = '#ff3355';
            CX.fillText(`ESPERA: ${segs}s`, cx, y - 10);
        } else {
            CX.fillText(locked ? 'BLOQUEADO' : 'EVALUACIÓN [F]', cx, y - 10);
        }

        CX.restore();
    }

    /* ── Check F key for secret door ── */
    function checkSecretDoor() {
        if (!RUNNING || LEVEL_DONE || !PL) return;
        if (QZ.doorLocked) return;
        const d = secretDoorPos();
        if (!d) return;

        // Calculamos distancias de centros exactos
        const plCx = PL.x + PL.w / 2;
        const dCx = d.x + d.w / 2;

        // Un rango de 50px requiere estar de pie justo en el portal
        if (Math.abs(plCx - dCx) < 50 && PL.y + PL.h <= d.y + d.h + 10 && PL.y >= d.y - 20) {
            openQuiz();
        }
    }

    /* ── Quiz Timer Update ── */
    function quizTimerTick() {
        QZ.timerLeft--;
        if (QZ.timerLeft <= 0) {
            clearInterval(QZ.timerInterval);
            QZ.timerInterval = null;
            quizFail('⏱ ¡Tiempo agotado! Responde más rápido la próxima vez.');
            return;
        }
        const mins = Math.floor(QZ.timerLeft / 60);
        const secs = QZ.timerLeft % 60;
        const label = $('qz-timer-label');
        const fill = $('qz-timer-fill');
        if (label) label.textContent = `⏱ ${mins}:${secs.toString().padStart(2, '0')}`;
        if (fill) {
            const pct = (QZ.timerLeft / QZ.timerTotal) * 100;
            fill.style.width = pct + '%';
            fill.style.background = pct > 50 ? 'linear-gradient(90deg,#7722cc,#aa55ff)' : pct > 25 ? 'linear-gradient(90deg,#cc7700,#ffaa00)' : 'linear-gradient(90deg,#cc0020,#ff3355)';
            if (label) label.style.color = pct > 50 ? 'var(--p2)' : pct > 25 ? 'var(--or2)' : 'var(--r2)';
        }
    }

    /* ── Open Quiz Modal ── */
    function openQuiz() {
        if (QZ.active) return;
        QZ.current = 0;
        QZ.answers = [];
        if (RUNNING) {RUNNING = false; cancelAnimationFrame(RAF);}
        QZ.active = true;
        QZ.levelId = ZONE ? ZONE.id : 1;
        const bank = QUIZ_BANK[QZ.levelId] || QUIZ_BANK[1];
        QZ.questions = [...bank];
        QZ.selected = null;
        QZ.timerLeft = QZ.timerTotal = 120;
        $('sdoor-hint').style.display = 'none';

        const iconEl = document.querySelector('.qz-door-icon');
        if (iconEl) iconEl.textContent = '⚡';

        const titleEl = document.querySelector('.qz-title');
        if (titleEl) titleEl.textContent = 'PORTAL RÁPIDO';

        const subEl = document.querySelector('.qz-subtitle');
        if (subEl) subEl.textContent = 'PUERTA SECRETA · ACCESO RESTRINGIDO · RESPONDE 2 DE 3';

        const timerLabel = $('qz-timer-label');
        if (timerLabel) timerLabel.style.display = 'block';

        const timerBarWrap = document.querySelector('.qz-timer-bar-wrap');
        if (timerBarWrap) timerBarWrap.style.display = 'block';

        renderQuizQuestion();
        updateQuizProgress();

        $('quiz-modal').classList.add('on');

        // Reset timer fill
        const fill = $('qz-timer-fill');
        if (fill) {fill.style.width = '100%'; fill.style.transition = 'none';}
        setTimeout(() => {if (fill) fill.style.transition = 'width .2s linear';}, 50);

        // Start countdown
        clearInterval(QZ.timerInterval);
        QZ.timerInterval = setInterval(quizTimerTick, 1000);
        snd('collect');
    }

    /* ── Render Current Question ── */
    function renderQuizQuestion() {
        const q = QZ.questions[QZ.current];
        if (!q) return;
        $('qz-q-num').textContent = `PREGUNTA ${QZ.current + 1} DE ${QZ.questions.length}`;
        $('qz-question').textContent = q.q;
        $('qz-feedback').textContent = '';
        $('qz-feedback').style.color = '';

        const nextBtn = $('qz-btn-next');
        if (nextBtn) {
            nextBtn.style.display = 'none';
            nextBtn.textContent = 'SIGUIENTE →';
            nextBtn.onclick = quizNext;
        }

        $('qz-main').style.display = 'block';
        $('qz-result').style.display = 'none';

        const opts = $('qz-options');
        opts.innerHTML = '';
        q.opts.forEach((o, i) => {
            const btn = document.createElement('button');
            btn.className = 'qz-opt';
            btn.textContent = `${['A', 'B', 'C', 'D'][i]}) ${o}`;
            btn.onclick = () => selectQuizAnswer(i);
            opts.appendChild(btn);
        });
    }

    /* ── Select an Answer ── */
    function selectQuizAnswer(idx) {
        if (QZ.selected !== null) return; // already answered
        QZ.selected = idx;
        const q = QZ.questions[QZ.current];
        const correct = idx === q.ans;
        QZ.answers.push(correct);
        // Highlight options
        const btns = document.querySelectorAll('.qz-opt');
        btns.forEach((b, i) => {
            b.disabled = true;
            if (i === q.ans) b.classList.add('correct');
            else if (i === idx && !correct) b.classList.add('wrong');
        });
        // Feedback
        const fb = $('qz-feedback');
        if (correct) {
            fb.textContent = '✅ ¡Correcto! Bien aplicado.';
            fb.style.color = 'var(--gr2)';
            snd('collect');
        } else {
            fb.textContent = `❌ Incorrecto. La respuesta correcta es: ${['A', 'B', 'C', 'D'][q.ans]})`;
            fb.style.color = 'var(--r2)';
            snd('hit');
        }
        // Show next button after brief pause
        setTimeout(() => {
            updateQuizProgress();
            if (QZ.current < QZ.questions.length - 1) {
                $('qz-btn-next').style.display = 'inline-block';
            } else {
                // Last question — evaluate after delay
                setTimeout(quizEvaluate, 900);
            }
        }, 600);
    }

    /* ── Advance to next question ── */
    function quizNext() {
        QZ.current++;
        QZ.selected = null;
        renderQuizQuestion();
        updateQuizProgress();
    }

    /* ── Update progress dots ── */
    function updateQuizProgress() {
        const prog = $('qz-progress');
        if (!prog) return;
        prog.innerHTML = '';
        QZ.questions.forEach((_, i) => {
            const dot = document.createElement('div');
            dot.className = 'qz-dot';
            if (i < QZ.answers.length) {
                dot.classList.add(QZ.answers[i] ? 'done' : 'fail');
            } else if (i === QZ.current) {
                dot.classList.add('active');
            }
            prog.appendChild(dot);
        });
    }

    /* ── Evaluate quiz result (Portal Rápido) ── */
    function quizEvaluate() {
        clearInterval(QZ.timerInterval);
        QZ.timerInterval = null;

        const correct = QZ.answers.filter(Boolean).length;
        const total = QZ.questions.length;
        const MIN_CORRECT = 2; // Al menos 2 de 3
        const passed = (correct >= MIN_CORRECT);

        if (typeof google !== 'undefined' && google.script) {
            const quizData = {
                fecha: new Date().toLocaleString('es-PE'),
                nivel: (typeof ZONE !== 'undefined' && ZONE) ? ZONE.name : 'Nivel Desconocido',
                personaje: (typeof CHARS !== 'undefined' && typeof G !== 'undefined' && CHARS[G.charIdx]) ? CHARS[G.charIdx].name : 'Anónimo',
                puntaje: correct,
                totalPreguntas: total,
                resultado: passed ? 'APROBADO' : 'REPROBADO',
                paisId: (typeof ubicacionSeleccionada !== 'undefined') ? ubicacionSeleccionada.paisId : 'Sin ID',
                operacionId: (typeof ubicacionSeleccionada !== 'undefined') ? ubicacionSeleccionada.operacionId : 'Sin ID',
                detalle: QZ.questionDetails || []
            };
            google.script.run.guardarResultadosQuizPortalRapido(quizData);
        }

        updateQuizProgress();

        if (passed) {
            $('qz-main').style.display = 'none';
            $('qz-result').style.display = 'block';
            $('qz-result-icon').textContent = '⚡';
            $('qz-result-title').textContent = '¡ACCESO CONCEDIDO!';

            const perfectMsg = correct === total
                ? '¡Perfecto! Respondiste todas las preguntas correctamente.'
                : `Respondiste ${correct}/${total} — cumples el mínimo requerido (2 de 3).`;

            $('qz-result-msg').innerHTML = `
                <strong style="color:var(--cyan)">${correct}/${total} respuestas correctas</strong><br><br>
                ${perfectMsg}<br><br>
                <span style="color:var(--gr2)">⚡ Serás transportado al tramo final, cerca del último ícono.</span>
            `;
                $('qz-tp-btn').style.display = 'inline-block';

            if (typeof snd === 'function') snd('lvlup');
        } else {
            if (typeof quizFail === 'function') {
                quizFail(`${correct}/${total} respuestas correctas. Se necesitan al menos 2 de 3 para el acceso.`);
            }
        }
    }

    /* ── Quiz fail ── */
    function quizFail(msg) {
        clearInterval(QZ.timerInterval);
        QZ.timerInterval = null;
        $('qz-main').style.display = 'none';
        $('qz-result').style.display = 'block';
        $('qz-result-icon').textContent = '🔒';
        $('qz-result-title').textContent = 'ACCESO DENEGADO';
        $('qz-result-msg').innerHTML = `
    <span style="color:var(--r2)">${msg}</span><br><br>
    Repasa el material de seguridad y vuelve a intentarlo.<br>La puerta se bloqueará por 30 segundos.
  `;
        $('qz-tp-btn').style.display = 'none';
        snd('hit');
        // Lock door for 30s
        QZ.doorLocked = true;
        QZ.doorLockTimer = 30 * 60; // frames
    }

    /* ── Teleport to penultimate step — near last icon ── */
    function quizTeleport() {
        closeQuiz();
        notify('⚡ ¡TELETRANSPORTE ACTIVADO! → Penúltimo peldaño', 'p');
        if (PL && PLATS && PLATS.length >= 5) {
            // PLATS[4] = penultimate step (descending side, near last collectible)
            const targetPlat = PLATS[4];
            PL.x = targetPlat.x + targetPlat.w * 0.3;
            PL.y = targetPlat.y - PL.h - 4;
            PL.vx = 0; PL.vy = 0;
            spawnP(PL.x + PL.w / 2, PL.y + PL.h / 2, 'rgba(160,80,255,0.9)', 32);
            ft(PL.x + PL.w / 2, PL.y - 20, '⚡ TELEPORT!', '#aa55ff');
        }
        snd('lvlup');
    }

    /* ── Close quiz without teleporting ── */
    function closeQuiz() {
        QZ.active = false;
        clearInterval(QZ.timerInterval);
        QZ.timerInterval = null;
        $('quiz-modal').classList.remove('on');
        // Resume game
        if (!LEVEL_DONE) {
            RUNNING = true;
            loop();
        }
    }

    /* ── Update door lock timer each frame ── */
    function updateSecretDoorTimer() {
        if (QZ.doorLocked && QZ.doorLockTimer > 0) {
            QZ.doorLockTimer--;
            if (QZ.doorLockTimer <= 0) {
                QZ.doorLocked = false;
                notify('🚪 ¡La puerta secreta vuelve a estar disponible!', 'p');
            }
        }
    }

    function playBGMLoop() {
        if (!BGM_RUNNING) return;
        const c = ga(); if (!c) return;
        BGM_NODES.forEach(n => {try {n.stop();} catch (e) { } });
        BGM_NODES = [];

        const comp = c.createDynamicsCompressor();
        const masterGain = c.createGain();
        masterGain.gain.setValueAtTime(0.007, c.currentTime);
        comp.connect(masterGain);
        masterGain.connect(c.destination);

        let t = c.currentTime + .05;
        let totalDur = 0;

                o.frequency.setValueAtTime(freq, t);
                g.gain.setValueAtTime(1, t);
                g.gain.setValueAtTime(1, t + dur * 0.85);
                g.gain.linearRampToValueAtTime(0, t + dur * 0.95);
                o.connect(g); g.connect(comp);
                o.start(t); o.stop(t + dur + .02);
                BGM_NODES.push(o);
            }
            t += dur; totalDur += dur;
        });

        let tb = c.currentTime + .05;
        MARIO_BASS.forEach(([freq, dur]) => {
            if (freq > 0) {
                const o = c.createOscillator(), g = c.createGain();
                o.type = 'triangle';
                o.frequency.setValueAtTime(freq, tb);
                g.gain.setValueAtTime(0.45, tb);
                g.gain.linearRampToValueAtTime(0, tb + dur * 0.9);
                o.connect(g); g.connect(comp);
                o.start(tb); o.stop(tb + dur + .02);
                BGM_NODES.push(o);
            }
            tb += dur;
        });

        BGM_TIMEOUT = setTimeout(() => {if (BGM_RUNNING) playBGMLoop();}, totalDur * 1000 - 100);
    }
    function toggleBGM() {
        const btn = $('btn-mute');
        if (BGM_RUNNING) {
            stopBGM();
            if (btn) {

            }
        } else {
            startBGM();

                btn.textContent = '🎵';
                btn.style.opacity = '1';
            }
        }
    }

    /* ── NOTIFICATIONS ── */
    const NQ = []; let NT = null;

    function pN() {
        if (!NQ.length) {NT = null; return;}

        $('notifs').appendChild(d);
        NT = setTimeout(() => {d.style.transition = 'opacity .3s'; d.style.opacity = '0'; setTimeout(() => {d.remove(); pN();}, 300);}, 2400);
    }
    function buildChars() {

    function selectChar(i) {

    /* ─────────────────────────────
       MAP

    function buildMap() {

            if (isCurrent) state = 'current';
            else if (isCompleted) state = 'completed';

            const cleanName = lvl.name ? lvl.name.replace(/^NVL\s\d+\s·\s/, '') : '';

    function startLevel(i) {

    /* ═══════════════════════════════════════════
       PLATFORMER ENGINE

    let CV, CX, RAF = null, RUNNING = false;

    /* ─── INIT LEVEL ─── */

        // Timer for level 3 (EPP rush)

        else LEVEL_MAX_TIME = 0;

        PARTS = []; FTXTS = []; BOSS = null; BOSS_DROPS = []; MUSHROOMS = []; STAR = null; PETS = [];
        PHONE = {active: false, timer: 0, cd: 0, penalty: 0};
        CRUCE = {routes: [], chosen: null, semaphore: 'red', semTimer: 0};
        EXTINGUISHER = {x: 0, y: 0, w: 32, h: 36, collected: false, bt: 0};
        // Reset secret door state for new level
        QZ.doorLocked = false; QZ.doorLockTimer = 0; QZ.active = false;

        // Spawn mushrooms in early levels (1 and 2)

                        <div style="width:100%; height:4px; background:rgba(255,255,255,0.1); border-radius:2px; margin-bottom:10px; overflow:hidden;"><div id="hf-boss-hp" style="width:100%; height:100%; background:linear-gradient(90deg,#880088,#ff55ff); transition: width 0.2s;"></div></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span style="color:var(--mut);">EXTINTOR</span><span id="hv-extinguisher" style="color:#ff8800; font-weight:bold;">NO EQUIPADO</span></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span style="color:var(--mut);">USOS</span><span id="hv-ext-uses" style="color:#00eeff; font-weight:bold;">0</span></div>
                        <div style="display:flex; justify-content:space-between; font-size:0.85rem;"><span style="color:var(--mut);">REPORTE</span><span id="hv-star" style="color:#ffd600; font-weight:bold;">DISPONIBLE</span></div>`;

            $('hud-extra').innerHTML = extraHTML2;
            $('hstage-name').textContent = z.name;

            setTimeout(() => notify('📋 ¡LEE EL PET primero! Es el pergamino dorado — recógelo para aprender a usar el extintor', 'p'), 400);
            setTimeout(() => notify('🧯 ¡RECOGE EL EXTINTOR! Está en tu plataforma — camina hacia él', 'w'), 2200);
            setTimeout(() => notify('⚔ Una vez equipado: acércate al monstruo y presiona [SPC] para dispararlo', 'i'), 4200);
            setTimeout(() => notify('📏 Necesitas estar CERCA del monstruo para que el extintor alcance', 'w'), 6200);
            setTimeout(() => notify('⭐ ¡Recoge la ESTRELLA DORADA para 5 segundos de INMUNIDAD TOTAL!', 'w'), 8000);
            setTimeout(() => notify('🔥 ¡El monstruo lanza BOLAS DE FUEGO! Salta y esquívalas', 'b'), 10000);

        // HUD extras based on level type

    /* ─── PHYSICS ─── */
    const GV = 0.55, JP = -13.5, SP = 4.8;
    function update() {
        if (!RUNNING || LEVEL_DONE) return;
        const W = CV.width, H = CV.height;

        const left = KEYS['a'] || KEYS['arrowleft'];
        const right = KEYS['d'] || KEYS['arrowright'];

        if (left) {PL.vx = -SP; PL.facing = -1;}
        else if (right) {PL.vx = SP; PL.facing = 1;}
        else PL.vx *= .74;

        if ((KEYS['w'] || KEYS['arrowup']) && PL.onGround) {
            PL.vy = JP; PL.onGround = false;
            spawnP(PL.x + PL.w / 2, PL.y + PL.h, 'rgba(0,238,255,0.6)', 5); snd('jump');
        }

        PL.vy += GV; PL.x += PL.vx; PL.y += PL.vy;
        PL.x = Math.max(0, Math.min(W - PL.w, PL.x));
        PL.onGround = false;

        for (const p of PLATS) {
            if (PL.x + PL.w > p.x && PL.x < p.x + p.w && PL.y + PL.h > p.y && PL.y + PL.h < p.y + p.h + 16 && PL.vy >= 0) {
                PL.y = p.y - PL.h; PL.vy = 0; PL.onGround = true;
            }
        }

        // 🚨 CONTROL CRÍTICO: DETECCIÓN DE CAÍDA AL VACÍO (RE-SPAWN EN INICIO)
        if (PL.y + PL.h >= H - 5) {
            // Si el jugador toca el fondo del canvas (caída libre)
            PL.vx = 0;
            PL.vy = 0;

            // Posicionamos al jugador de vuelta en la plataforma inicial [0]
            if (PLATS && PLATS[0]) {
                PL.x = PLATS[0].x + 20;
                PL.y = PLATS[0].y - PL.h - 10;
            } else {
                PL.x = 40;
                PL.y = 100;
            }

            // Feedback de impacto al usuario
            snd('hit');
            spawnP(PL.x + PL.w / 2, PL.y + PL.h / 2, 'rgba(255, 51, 85, 0.9)', 25);
            ft(PL.x + 10, PL.y - 25, '⚠️ CAÍDA AL VACÍO', '#ff3355');
            notify('🚨 ¡CAÍDA AL VACÍO! El no usar plataformas estables reinicia tu posición al punto de partida.', 'r');
        }

        if (PL.y < 52) {PL.y = 52; PL.vy = 0;}

        if (PL.atkCd > 0) PL.atkCd--;
        if (PL.atkTimer > 0) PL.atkTimer--; else PL.attacking = false;
        if (PL.invincible > 0) PL.invincible--;
        if (PL.scaleTimer > 0) {PL.scaleTimer--; if (PL.scaleTimer === 0) {PL.scale = 1;} }
        PL.ft++;

        // Timer (EPP level)
        if (ZONE.isEPPLevel && LEVEL_MAX_TIME > 0) {
            LEVEL_TIMER++;
            const remaining = Math.max(0, Math.ceil((LEVEL_MAX_TIME - LEVEL_TIMER) / 60));
            const el = $('hv-timer');
            if (el) el.textContent = remaining + 's';
            if (el) el.style.color = remaining <= 15 ? '#ff3355' : remaining <= 30 ? '#f5b200' : '#00ee66';
            if (LEVEL_TIMER >= LEVEL_MAX_TIME && !LEVEL_DONE) {
                finishLevel(); return;
            }
        }

        // Hazards
        for (const h of HZDS) {
            if (!h.alive) continue;
            h.bt += .055; h.bY = Math.sin(h.bt) * 5; h.at++; h.mt++;
            if (h.mt > 90) {h.md *= -1; h.mt = 0;}
            h.px += h.md * .7;
            if (PL.invincible === 0 && ov(PL, {x: h.px, y: h.py + h.bY, w: h.w, h: h.h})) hurtPl(h);
        }

        // Collectibles / workers
        for (const c of COLS) {
            if (c.collected) continue;
            c.bt += .05;
            if (ov(PL, {x: c.px, y: c.py + Math.sin(c.bt) * 5, w: c.w, h: c.h})) pickUp(c);
        }

        // Mushrooms
        for (const m of MUSHROOMS) {
            if (m.collected) continue;
            m.bt += .04;
            if (ov(PL, {x: m.x, y: m.y + Math.sin(m.bt) * 4, w: m.w, h: m.h})) collectMushroom(m);
        }

        // PET scrolls & icons
        for (const pet of PETS) {
            pet.bt += .03;
            if (!pet.collected && pet.type === 'pet') {
                if (ov(PL, {x: pet.x, y: pet.y, w: pet.w, h: pet.h})) {
                    pet.collected = true;
                    spawnP(pet.x + 16, pet.y, 'rgba(245,178,0,0.8)', 16);
                    ft(pet.x + 16, pet.y - 16, '📋 ¡PET LEÍDO!', '#f5b200');
                    notify('📋 ¡PET LEÍDO! Método PASS para el extintor:', 'p');
                    setTimeout(() => notify('🅿️ JALAR — retira el seguro del extintor', 'i'), 800);
                    setTimeout(() => notify('🅰️ APUNTAR — dirígelo a la BASE del fuego', 'i'), 2200);
                    setTimeout(() => notify('🅿️ PRESIONAR — activa la palanca con firmeza', 'i'), 3600);
                    setTimeout(() => notify('🅱️ BARRER — mueve de lado a lado hasta apagar', 'i'), 5000);
                    snd('collect');
                }
            }
        }

        // YO REPORTO star
        updateStar();

        // Phone distractor (LOTO level)
        if (ZONE && ZONE.isLotoLevel) updatePhone();

        // Cruce seguro routing
        if (ZONE && ZONE.isCruceLevel) updateCruce();

        // Extinguisher pickup (boss level)
        if (ZONE && ZONE.isBossLevel && !EXTINGUISHER.collected) {
            EXTINGUISHER.bt += .05;
            if (ov(PL, {x: EXTINGUISHER.x, y: EXTINGUISHER.y + Math.sin(EXTINGUISHER.bt) * 3, w: EXTINGUISHER.w, h: EXTINGUISHER.h})) {
                EXTINGUISHER.collected = true;
                G.extinguisherHeld = true;
                spawnP(EXTINGUISHER.x + 16, EXTINGUISHER.y, 'rgba(255,150,0,0.8)', 20);
                ft(EXTINGUISHER.x + 16, EXTINGUISHER.y - 18, '🧯 ¡EXTINTOR EQUIPADO!', '#ff8800');
                notify('🧯 ¡EXTINTOR EQUIPADO! Acércate al monstruo y presiona [SPC] para atacar', 'w');
                const elEq = $('hv-extinguisher');
                if (elEq) {elEq.textContent = '✅ EQUIPADO'; elEq.style.color = '#00ee66'; elEq.style.fontSize = '12px';}
                snd('collect');
                setTimeout(() => {
                    if (RUNNING && BOSS && BOSS.alive && G.extinguisherHeld)
                        notify('💡 TIP: Acércate al 🐲 y pulsa [SPC] — cuanto más cerca, más daño', 'i');
                }, 2000);
            }
        }

        // Boss logic
        if (BOSS && BOSS.alive) updateBoss();

        // Boss drops
        for (const bd of BOSS_DROPS) {
            if (bd.collected) continue;
            bd.bt += .05;
            if (ov(PL, {x: bd.x, y: bd.y + Math.sin(bd.bt) * 4, w: bd.w, h: bd.h})) collectBossDrop(bd);
        }

        // Door collision
        if (isPortalOpen()) {
            const d = doorPos();
            if (ov(PL, {x: d.x + 8, y: d.y, w: d.w - 16, h: d.h})) finishLevel();
        }

        // Secret door lock timer
        updateSecretDoorTimer();

        // Particles
        PARTS = PARTS.filter(p => p.l > 0);
        for (const p of PARTS) {p.x += p.vx; p.y += p.vy; p.vy += .15; p.l -= 2.5; p.s *= .92;}
        FTXTS = FTXTS.filter(f => f.l > 0);
        for (const f of FTXTS) {f.y -= 1.3; f.l -= 2; f.a = f.l / 80;}

        updateRiskMeter();
    }

    function ov(a, b) {return a.x < b.x + b.w && a.x + a.w > b.x && a.y < b.y + b.h && a.y + a.h > b.y;}

    function hurtPl(h) {
        const ch = CHARS[G.charIdx];

        //BRIGADISTA (Vida inicial y Escudo)
        if (G.brigadistaShield && ch.name === 'BRIGADISTA') {
            G.brigadistaShield = false;
            PL.invincible = 60;
            ft(PL.x + PL.w / 2, PL.y, '🛡️ ¡ESCUDO ACTIVO!', '#ff3355');
            snd('collect');
            return;
        }

        let d = 12;
        // EPP collected in earlier levels reduces damage
        d -= Math.round(G.eppReduction * 10);
        d = Math.max(2, d);
        G.hp = Math.max(0, G.hp - d);
        PL.invincible = 90;
        spawnP(PL.x + PL.w / 2, PL.y + PL.h / 2, 'rgba(255,50,80,0.7)', 10);
        ft(PL.x + PL.w / 2, PL.y, '-' + d + ' HP', '#ff3355');
        snd('hit'); updateHUD();
        if (G.hp <= 0) {RUNNING = false; cancelAnimationFrame(RAF); stopBGM(); showGameOver();}
    }

    function doAtk() {
        if (PL.atkCd > 0) return;
        PL.attacking = true; PL.atkTimer = 20; PL.atkCd = 28;
        // Extinguisher has a longer range than fists
        // LOTOTITO (Mayor rango de ataque)
        let baseRange = 58;
        if (CHARS[G.charIdx] && CHARS[G.charIdx].name === 'LOTOTITO') baseRange = 85;
        const extRange = G.extinguisherHeld && ZONE && ZONE.isBossLevel ? 110 : baseRange;
        const ax = PL.facing === 1 ? PL.x + PL.w : PL.x - extRange;
        // Hit regular hazards
        for (const h of HZDS) {
            if (!h.alive) continue;
            if (h.px + h.w > ax && h.px < ax + extRange && h.py + h.h > PL.y && h.py < PL.y + PL.h + 20) neutralize(h);
        }
        // Hit boss — must have extinguisher in boss level
        if (BOSS && BOSS.alive) {
            const bossClose = BOSS.x + BOSS.w > ax && BOSS.x < ax + extRange && BOSS.y + BOSS.h > PL.y && BOSS.y < PL.y + PL.h + 30;
            if (bossClose) {
                if (ZONE && ZONE.isBossLevel && G.extinguisherHeld) {
                    G.extinguisherUses++;
                    hurtBoss(25);
                    // Spray particle effect — white/blue foam
                    for (let i = 0; i < 12; i++) {
                        const ang = (PL.facing === 1 ? 0 : Math.PI) + (Math.random() - .5) * 0.8;
                        PARTS.push({x: PL.x + PL.w / 2, y: PL.y + PL.h / 2, vx: Math.cos(ang) * (5 + Math.random() * 4), vy: Math.sin(ang) * (3 + Math.random() * 3) - 2, col: 'rgba(180,240,255,0.9)', l: 55 + Math.random() * 20, s: 4 + Math.random() * 5});
                    }
                    ft(BOSS.x + BOSS.w / 2, BOSS.y, '🧯 −' + Math.round(28 * bossDamageMult()) + ' HP', '#00eeff');
                    // Update uses counter
                    const elU = $('hv-ext-uses'); if (elU) elU.textContent = G.extinguisherUses;
                } else if (ZONE && ZONE.isBossLevel && !G.extinguisherHeld) {
                    notify('⚠️ ¡Necesitas el EXTINTOR 🧯 — recógelo primero!', 'b');
                    ft(PL.x + PL.w / 2, PL.y - 20, 'RECOGE EL 🧯', '#ff8800');
                } else {
                    hurtBoss(25);
                }
            } else if (ZONE && ZONE.isBossLevel && G.extinguisherHeld) {
                // Player attacked but too far — show range hint
                const distToBoss = Math.abs((PL.x + PL.w / 2) - (BOSS.x + BOSS.w / 2));
                if (distToBoss < 350) {
                    notify('📏 ¡Acércate más al monstruo para que el extintor alcance! [→]', 'w');
                }
            }
        }
        // Hit mini-monsters (extinguisher required in boss level)
        if (BOSS && BOSS.minis && ZONE && ZONE.isBossLevel && G.extinguisherHeld) {
            for (const m of BOSS.minis) {
                if (!m.alive) continue;
                if (m.x + m.w > ax && m.x < ax + extRange && m.y + m.h > PL.y && m.y < PL.y + PL.h + 20) {
                    m.hp--;
                    m.flashTimer = 12;
                    spawnP(m.x + m.w / 2, m.y + m.h / 2, 'rgba(180,240,255,0.85)', 8);
                    if (m.hp <= 0) {
                        m.alive = false;
                        ft(m.x + m.w / 2, m.y, '🧯 MINI apagado!', '#00eeff');
                        G.xp += 20; chkLvl();
                        snd('kill');
                    } else {
                        ft(m.x + m.w / 2, m.y, '🧯 -1 HP (' + m.hp + ' resto)', '#00ccff');
                        snd('atk');
                    }
                }
            }
        }
        snd('atk');
    }

    function neutralize(h) {
        h.alive = false; P_NEUT++;
        let xg = 55 + h.sev * 10;
        if (CHARS[G.charIdx].name === 'SEGURITO') xg = Math.round(xg * 1.2);
        G.xp += xg; chkLvl();
        spawnP(h.px + h.w / 2, h.py + h.h / 2, 'rgba(0,238,255,0.7)', 16);
        ft(h.px, h.py - 12, 'NEUTRALIZADO +' + xg + 'XP', '#00ffee');
        notify('⚔ ' + h.type + ' NEUTRALIZADO — SEV: ' + h.sevLbl, 'g');
        if (P_NEUT === P_TOT && C_COLL === C_TOT) {notify('🚀 ¡LISTO! Ve al PORTAL', 'w'); snd('good');} else if (P_NEUT === P_TOT) {notify('✅ Peligros neutralizados. ¡Recoge los ítems restantes!', 'w');}
        // For level 1: accumulate severity score
        if (ZONE.id === 1) {G.severityScore += h.sev;}
        updateHUD(); updateRiskMeter(); snd('kill');
    }

    function pickUp(c) {
        c.collected = true; C_COLL++;
        let xg = 40;
        if (CHARS[G.charIdx].name === 'SEGURITO') xg = Math.round(xg * 1.2);
        G.xp += xg; chkLvl();
        spawnP(c.px + c.w / 2, c.py, 'rgba(245,178,0,0.7)', 14);
        snd(c.isWorker ? 'rescue' : 'collect');

        if (c.isWorker) {
            G.workersRescued++;
            ft(c.px, c.py - 12, 'RESCATADO! +' + xg + 'XP', '#00ee66');
            notify('🙌 ' + c.label + ' — ¡RESCATADO!', 'g');
            const el = $('hv-rescued'); if (el) el.textContent = G.workersRescued + '/' + C_TOT;
        } else if (c.isLoto) {
            G.lotoApplied++;
            G.lotoReduction += c.lotoReduce || .12;
            ft(c.px, c.py - 12, c.label, '#ff5500');
            notify('🔒 LOTO: ' + c.label + ' — ENERGÍA BLOQUEADA', 'g');
            const el = $('hv-loto'); if (el) el.textContent = G.lotoApplied + '/' + C_TOT;
        } else if (c.cruceItem) {
            G.cruceBonus += c.cruceReduce || .15;
            ft(c.px, c.py - 12, c.label, '#00ee66');
            notify('🚦 ' + c.label + ' — RUTA SEGURA REFORZADA', 'g');
            const el = $('hv-ruta'); if (el) {el.textContent = 'SEGURA'; el.style.color = '#00ee66';}
        } else if (ZONE.isEPPLevel) {
            G.eppReduction += c.eppReduce || .09;
            G.collectedEPP.push(c.label);
            ft(c.px, c.py - 12, c.label, '#f5b200');
            notify('🪖 EPP: ' + c.label + ' activado', 'g');
            const el = $('hv-ctrl-count'); if (el) el.textContent = C_COLL + '/' + C_TOT;
        } else if (ZONE.isControlLevel) {
            G.controlReduction += c.ctrlReduce || .12;
            G.collectedControls.push(c.label);
            ft(c.px, c.py - 12, c.label, '#00eeff');
            notify('🛡️ CONTROL: ' + c.label + ' aplicado', 'g');
            const el = $('hv-ctrl-count'); if (el) el.textContent = C_COLL + '/' + C_TOT;
        } else {
            ft(c.px, c.py - 12, '+' + c.label, '#f5b200');
            notify('✓ ' + c.label + ' recolectado — ' + C_COLL + '/' + C_TOT, 'g');
            const hvitems2 = $('hv-items'); if (hvitems2) hvitems2.textContent = C_COLL + '/' + C_TOT;
        }

        if (C_COLL === C_TOT && P_NEUT === P_TOT) {
            notify('🚀 ¡COMPLETO! Ve al PORTAL para avanzar', 'w'); snd('good');
        } else if (C_COLL === C_TOT && ZONE.id === 1) {
            notify('📋 Ítems OK. Ahora neutraliza peligros con [SPC]', 'w');
        } else if (P_NEUT === P_TOT && ZONE.id === 1 && C_COLL < C_TOT) {
            notify('⚔ Peligros OK. Recoge los ítems restantes', 'w');
        } else if (C_COLL === C_TOT && ZONE.id !== 1) {
            notify('🚀 ¡TODO RECOLECTADO! Ve al PORTAL', 'w'); snd('good');
        }
        updateRiskMeter();
    }

    /* ─── DOOR (on left ground platform near player spawn) ─── */
    function doorPos() {
        const p = PLATS[PLATS.length - 1];
        return {x: p.x + p.w - 80, y: p.y - 90, w: 64, h: 90};
    }

    function isPortalOpen() {
        if (ZONE && ZONE.isBossLevel) return BOSS && !BOSS.alive;
        if (ZONE && ZONE.isCruceLevel) return CRUCE.chosen === 'safe' && C_COLL === C_TOT;
        return C_TOT > 0 && C_COLL === C_TOT;
    }

    /* ─────────────────────────────
       FINISH LEVEL — The critical fixed logic
    ───────────────────────────── */
    function finishLevel() {
        if (LEVEL_DONE) return;
        LEVEL_DONE = true;
        RUNNING = false;
        if (RAF) cancelAnimationFrame(RAF);

        // ── Compute IPERC scores for this level ──
        if (ZONE.id === 1) {
            const maxPossibleSev = HZDS.reduce((a, h) => a + h.sev, 0) || 1;
            G.severityScore = Math.round((maxPossibleSev / 4) * 10);
        }
        if (ZONE.id === 2) {
            const exposed = C_TOT - G.workersRescued;
            G.probabilityScore = Math.round((1 + (exposed / C_TOT) * 3) * 10);
            G.initialRisk = G.severityScore * G.probabilityScore / 100;
        }
        if (ZONE.id === 3) {// LOTO
            G.controlReduction += G.lotoReduction;
            if (G.phoneUses > 0) {
                const pen = G.phoneUses * 15;
                G.xp = Math.max(0, G.xp - pen);
                G.phonePenalty = pen;
                notify('📱 PENALIZACIÓN TOTAL por celular: -' + pen + ' XP', 'b');
            }
        }
        if (ZONE.id === 5) {// Cruce
            if (G.safeRouteChosen === true) {
                G.cruceBonus += 0.10;
                G.xp += 50;
            } else if (G.safeRouteChosen === false) {
                G.xp = Math.max(0, G.xp - 60);
                notify('⚠️ Tomaste la ruta peligrosa — penalización -60 XP', 'b');
            }
            G.controlReduction += G.cruceBonus;
        }
        if (ZONE.id === 6) {
            const totalReduction = Math.min(0.85, G.eppReduction + G.controlReduction);
            G.residualRisk = G.initialRisk * (1 - totalReduction);
        }
        if (ZONE.id === 7) {
            const arsenalBonus = Math.min(0.15, (BOSS ? BOSS.arsenalUsed * 0.03 : 0));
            const extBonus = Math.min(0.10, G.extinguisherUses * 0.02);
            const totalReduction = Math.min(0.95, G.eppReduction + G.controlReduction + arsenalBonus + extBonus);
            G.residualRisk = G.initialRisk * (1 - totalReduction);
            G.xp += BOSS ? (BOSS.arsenalUsed * 40) : 0;
        }

        // ── Record completion ──
        if (!G.doneLevels.includes(G.currentLevel)) {
            G.doneLevels.push(G.currentLevel);
        }
        G.xp += ZONE.xp; chkLvl();

        // ── 🟢 CORRECCIÓN 2 (PARTE A): Guardar progreso y proteger nivel máximo ──
        const nextLvlIdx = G.currentLevel + 1;
        const isLast = nextLvlIdx >= ALL_LEVELS.length;

        // Guardamos cuál es el nivel correlativo que tocaría jugar en secuencia directa
        G.nextLevelToPlay = isLast ? G.currentLevel : nextLvlIdx;

        // Inicializamos o actualizamos el récord del nivel máximo desbloqueado históricamente
        if (typeof G.maxLevelUnlocked === 'undefined') {
            G.maxLevelUnlocked = nextLvlIdx;
        } else {
            G.maxLevelUnlocked = Math.max(G.maxLevelUnlocked, nextLvlIdx);
        }

        // Protegemos G.currentLevel para que mantenga el nivel más alto y no bloquee el mapa
        G.currentLevel = Math.min(G.maxLevelUnlocked, ALL_LEVELS.length - 1);

        stopBGM();
        snd('lvlup');
        notify('Cargando preguntas de seguridad...', 'i');

        google.script.run
            .withSuccessHandler(function (preguntasTraidas) {
                prepararQuizDeNivel(preguntasTraidas, isLast);
            })
            .withFailureHandler(function (error) {
                console.error("Error al cargar trivia:", error);
                showVictoryOverlay(isLast);
            })
            .obtenerPreguntasAleatorias();
    }

    /* ═══════════════════════════════════════════
               LÓGICA DE TRIVIA OBLIGATORIA POR NIVEL
            ═══════════════════════════════════════════ */
    let TRIVIA_ACTUAL = {
        preguntas: [],
        indice: 0,
        correctas: 0,
        isLastLevel: false,
        respondido: false,
        detalleRespuestas: []
    };

    // 1. Inicia el cuestionario cuando llegan los datos de Apps Script
    function prepararQuizDeNivel(preguntas, isLast) {
        TRIVIA_ACTUAL.preguntas = preguntas;
        TRIVIA_ACTUAL.indice = 0;
        TRIVIA_ACTUAL.correctas = 0;
        TRIVIA_ACTUAL.isLastLevel = isLast;
        TRIVIA_ACTUAL.detalleRespuestas = [];

        document.querySelector('.qz-door-icon').textContent = '📝';
        document.querySelector('.qz-title').textContent = 'CHECK DE SEGURIDAD OBLIGATORIO';
        document.querySelector('.qz-subtitle').textContent = 'Demuestra tus conocimientos para avanzar de nivel.';

        $('qz-timer-label').style.display = 'none';
        document.querySelector('.qz-timer-bar-wrap').style.display = 'none';

        $('qz-main').style.display = 'block';
        $('qz-result').style.display = 'none';

        $('quiz-modal').classList.add('on');

        mostrarPreguntaTrivia();
    }

    // 2. Renderiza la pregunta en pantalla
    function mostrarPreguntaTrivia() {
        TRIVIA_ACTUAL.respondido = false;
        const q = TRIVIA_ACTUAL.preguntas[TRIVIA_ACTUAL.indice];

        const tema = q.tema ? q.tema : 'IPERC';
        $('qz-q-num').textContent = `PREGUNTA ${TRIVIA_ACTUAL.indice + 1} DE ${TRIVIA_ACTUAL.preguntas.length} — ${tema}`;
        $('qz-question').textContent = q.pregunta;

        const optsContainer = $('qz-options');
        optsContainer.innerHTML = '';

        q.opciones.forEach((opcion, index) => {
            const btn = document.createElement('button');
            btn.className = 'qz-opt';
            btn.textContent = opcion;
            btn.onclick = () => evaluarRespuestaTrivia(index, btn);
            optsContainer.appendChild(btn);
        });

        $('qz-feedback').innerHTML = '';
        $('qz-btn-next').style.display = 'none';
        $('qz-btn-next').onclick = siguientePreguntaTrivia;
    }
    // 4. Pasa a la siguiente o termina
    function siguientePreguntaTrivia() {
        TRIVIA_ACTUAL.indice++;
        // Si aún quedan preguntas, mostramos la siguiente
        if (TRIVIA_ACTUAL.indice < TRIVIA_ACTUAL.preguntas.length) {
            mostrarPreguntaTrivia();
        } else {
            // Si ya no hay preguntas, guardamos
            guardarResultadosYContinuar();
        }
    }

    // 3. Evalúa si el clic del usuario es correcto o incorrecto
    function evaluarRespuestaTrivia(selectedIndex, btnElement) {
        if (TRIVIA_ACTUAL.respondido) return;
        TRIVIA_ACTUAL.respondido = true;

        const q = TRIVIA_ACTUAL.preguntas[TRIVIA_ACTUAL.indice];
        const seleccionada = q.opciones[selectedIndex];
        const esCorrecta = (String(seleccionada).trim() === String(q.correcta).trim());

        // <-- NUEVO: Guardamos el historial de esta pregunta
        TRIVIA_ACTUAL.detalleRespuestas.push({
            p: q.pregunta,
            r: seleccionada,
            c: q.correcta
        });

        const botones = $('qz-options').querySelectorAll('.qz-opt');
        botones.forEach(b => b.style.opacity = '0.5');
        btnElement.style.opacity = '1';

        if (esCorrecta) {
            TRIVIA_ACTUAL.correctas++;
            btnElement.style.background = 'rgba(0, 238, 102, 0.2)';
            btnElement.style.borderColor = '#00ee66';
            $('qz-feedback').innerHTML = '<span style="color:#00ee66; font-weight:bold;">✅ ¡Respuesta Correcta!</span>';
            if (typeof snd === 'function') snd('good');
        } else {
            btnElement.style.background = 'rgba(255, 51, 85, 0.2)';
            btnElement.style.borderColor = '#ff3355';
            $('qz-feedback').innerHTML = `<span style="color:#ff3355; font-weight:bold;">❌ Incorrecto.</span><br><span style="font-size:0.85rem;color:#ccc">La correcta era: ${q.correcta}</span>`;
            if (typeof snd === 'function') snd('hit');
        }

        if (TRIVIA_ACTUAL.indice === TRIVIA_ACTUAL.preguntas.length - 1) {
            $('qz-btn-next').textContent = 'FINALIZAR Y GUARDAR →';
        } else {
            $('qz-btn-next').textContent = 'SIGUIENTE PREGUNTA →';
        }

        $('qz-btn-next').style.display = 'block';
    }

    // 5. Envía los datos al servidor y libera el juego
    function guardarResultadosYContinuar() {
        // Mostramos pantalla de guardando...
        $('qz-main').style.display = 'none';
        $('qz-result').style.display = 'block';
        $('qz-result-icon').textContent = '💾';
        $('qz-result-title').textContent = 'GUARDANDO RESULTADOS...';
        $('qz-result-msg').innerHTML = `Has respondido <b style="color:var(--cyan)">${TRIVIA_ACTUAL.correctas} de ${TRIVIA_ACTUAL.preguntas.length}</b> correctamente.<br><br><span style="color:#aaa;">Sincronizando con la base de datos...</span>`;

        const resultBtns = $('qz-result').querySelectorAll('button');

    function validarEncuesta() {
        const dniEl = document.getElementById('input-dni');
        const dni = dniEl ? dniEl.value : '';
        const rating = window._gameRating || 0;
        const btn = $('btn-enviar-rating');
        if (!btn) return;

        if (rating > 0 && dni.length === 8) {
            btn.disabled = false;
            btn.style.cursor = 'pointer';
            btn.style.borderColor = 'var(--gr2)';
            btn.style.color = 'var(--gr2)';
            btn.style.background = 'rgba(0,80,30,.2)';
        } else {
            btn.disabled = true;
            btn.style.cursor = 'not-allowed';
            btn.style.borderColor = 'var(--b3)';
            btn.style.color = 'var(--mut)';
            btn.style.background = 'rgba(0,0,0,.3)';
        }
    }

    /* ─────────────────────────────
       RESTART FUNCTIONS
    ───────────────────────────── */
    function restartCurrentLevel() {
        // Reset HP to partial recovery, keep XP and IPERC progress
        G.hp = Math.min(100, G.hp + 20);
        // Remove current level from done if it was there (shouldn't be on game over)
        startLevel(G.currentLevel);
    }

    function fullRestart() {
        G = {
            charIdx: null, hp: 100, xp: 0, level: 1, currentLevel: 0, doneLevels: [],
            severityScore: 0, probabilityScore: 0, initialRisk: 0,
            eppReduction: 0, controlReduction: 0, residualRisk: 0,
            collectedEPP: [], collectedControls: [], workersRescued: 0,
            lotoApplied: 0, lotoReduction: 0, phoneUses: 0, phonePenalty: 0,
            safeRouteChosen: null, cruceBonus: 0, extinguisherHeld: false, extinguisherUses: 0
        };
        buildChars(); show('s-char');
    }

    function rateStar(n) {
        const stars = document.querySelectorAll('#stars-row span');
        const labels = ['', '😟 Para nada', '😕 Poco entretenido', '😐 Más o menos', '😊 Bastante entretenido', '🤩 ¡Muy entretenido!'];
        const colors = ['', '#ff5577', '#ff8844', '#f5b200', '#88cc44', '#00ee66'];

        stars.forEach((s, i) => {
            s.style.filter = i < n ? 'none' : 'grayscale(1)';
            s.style.opacity = i < n ? '1' : '0.3';
            s.style.transform = i === n - 1 ? 'scale(1.25)' : 'scale(1)';
        });

        const lbl = $('rating-label');
        if (lbl) {lbl.textContent = labels[n]; lbl.style.color = colors[n];}

        window._gameRating = n;
        validarEncuesta();
    }

    function hoverStar(n) {
        if (window._gameRating) return;
        const stars = document.querySelectorAll('#stars-row span');
        stars.forEach((s, i) => {
            s.style.filter = n > 0 && i < n ? 'none' : 'grayscale(1)';
            s.style.opacity = n > 0 && i < n ? '0.85' : '0.35';
            s.style.transform = 'scale(1)';
        });
    }

    function enviarRating() {
        const rating = window._gameRating;
        if (!rating) return;

        const dniEl = document.getElementById('input-dni');
        const dniValue = dniEl ? dniEl.value : '';

        const btn = $('btn-enviar-rating');
        if (btn) {
            btn.textContent = 'GUARDANDO...';
            btn.disabled = true;
        }
        if (dniEl) dniEl.disabled = true;

        const labels = ['', 'Para nada', 'Poco entretenido', 'Más o menos', 'Bastante entretenido', '¡Muy entretenido!'];
        const ch = CHARS[G.charIdx] || {name: '—'};

        if (typeof google !== 'undefined' && google.script) {
            const ratingData = {
                fecha: new Date().toLocaleString('es-PE'),
                dni: dniValue,
                personaje: ch.name,
                estrellas: rating + " Estrellas - " + labels[rating],
                estado: "Completado (Riesgo Inicial: " + G.initialRisk + " / Riesgo Residual: " + G.residualRisk.toFixed(1) + ")",
                paisId: ubicacionSeleccionada.paisId,
                operacionId: ubicacionSeleccionada.operacionId
            };

            google.script.run
                .withSuccessHandler(function () {

    function initBoss() {
        const W = CV.width, H = CV.height, HUD = 52;
        BOSS = {
            x: W * .62, y: H * .18,
            w: 80, h: 80,
            hp: 125, maxHP: 125,

            vx: 0, vy: 0, onGround: false,
            atkCd: 0,
            projectiles: [], flames: [],
            flameCd: 0, flameAngle: 0,
            isThrowing: false, throwTimer: 0, throwCd: 0,
            dropCd: 0, dropsGiven: 0,
            arsenalNeeded: Math.max(3, G.collectedEPP.length + G.collectedControls.length),
            arsenalUsed: 0,

        };

    function updateBoss() {
        if (!BOSS || !BOSS.alive) return;
        const W = CV.width, H = CV.height;
        const B = BOSS;
        B.t++;

        // Phase transitions
        const hpPct = B.hp / B.maxHP;
        const newPhase = hpPct > 0.5 ? 1 : hpPct > 0.2 ? 2 : 3;
        if (newPhase > B.phase) {
            B.phase = newPhase;
            B.enrageAnim = 60;
            notify(newPhase === 2 ? '💥 ¡EL MONSTRUO LANZA MÁS FUEGO! Usa 🧯 [SPC]' : '☠️ ¡FURIA TOTAL! ¡Arrójale el extintor!', 'b');
            spawnP(B.x + B.w / 2, B.y + B.h / 2, 'rgba(255,100,0,0.8)', 24);
        }
        if (B.enrageAnim > 0) B.enrageAnim--;

        // Boss 2 moves faster and more erratically
        const speed = 0.9 + B.phase * .5;
        B.x += B.md * speed;
        if (B.x < W * .15 || B.x > W * .80) {B.md *= -1;}
        if (B.phase === 3) {B.y = H * .18 + Math.sin(B.t * .055) * 30;}

        // ── FIREBALL ATTACK ──
        const atkRate = B.phase === 3 ? 40 : B.phase === 2 ? 65 : 95;
        B.atkCd--;
        if (B.atkCd <= 0) {
            B.atkCd = atkRate;
            const dx = PL.x + PL.w / 2 - (B.x + B.w / 2);
            const dy = PL.y + PL.h / 2 - (B.y + B.h / 2);
            const dist = Math.sqrt(dx * dx + dy * dy) || 1;
            const spd = 4 + B.phase * 1.2;
            // Count of fireballs increases with phase
            const count = B.phase === 3 ? 3 : B.phase === 2 ? 2 : 1;
            for (let i = 0; i < count; i++) {
                const spread = (i - (count - 1) / 2) * 0.28;
                const ang = Math.atan2(dy, dx) + spread;
                B.projectiles.push({
                    x: B.x + B.w / 2, y: B.y + B.h / 2,
                    vx: Math.cos(ang) * spd,
                    vy: Math.sin(ang) * spd,
                    r: 12 + B.phase * 2,
                    t: 0,
                    life: 200,
                    spin: Math.random() * Math.PI * 2,
                    spinV: (Math.random() - .5) * 0.25,
                    size: 18 + B.phase * 4,
                });
            }
            snd('atk');

            // ── FLAME STREAM (short burst toward player, visual only) ──
            if (B.isThrowing || B.phase >= 2) {
                const count2 = B.phase === 3 ? 5 : 3;
                for (let i = 0; i < count2; i++) {
                    const spread2 = (Math.random() - .5) * (B.phase === 3 ? .9 : .5);
                    const ang2 = Math.atan2(dy, dx) + spread2;
                    const spd2 = 3 + Math.random() * 3;
                    B.flames.push({
                        x: B.x + B.w / 2, y: B.y + B.h / 2,
                        vx: Math.cos(ang2) * spd2, vy: Math.sin(ang2) * spd2,
                        r: 8 + Math.random() * 5,
                        t: 0, life: 18 + Math.random() * 10,
                        alpha: 1,
                    });
                }
            }
        }

        // ── CONTINUOUS FLAME EMITTER when isThrowing ──
        B.throwCd--;
        if (B.throwCd <= 0 && !B.isThrowing) {
            B.isThrowing = true;
            B.throwTimer = B.phase === 3 ? 70 : B.phase === 2 ? 50 : 35;
            B.throwCd = B.phase === 3 ? 55 : B.phase === 2 ? 80 : 110;
            const dx2 = PL.x + PL.w / 2 - (B.x + B.w / 2);
            const dy2 = PL.y + PL.h / 2 - (B.y + B.h / 2);
            B.flameAngle = Math.atan2(dy2, dx2);
        }
        if (B.isThrowing) {
            B.throwTimer--;
            if (B.throwTimer <= 0) B.isThrowing = false;
            if (B.t % 2 === 0) {
                const spread = (Math.random() - .5) * (B.phase === 3 ? .6 : .3);
                const ang = B.flameAngle + spread;
                const spd = 5 + Math.random() * 2.5;
                B.flames.push({
                    x: B.x + B.w / 2, y: B.y + B.h / 2,
                    vx: Math.cos(ang) * spd, vy: Math.sin(ang) * spd,
                    r: 9 + Math.random() * 4, t: 0, life: 20 + Math.random() * 10, alpha: 1,
                });
            }
            const dx2 = PL.x + PL.w / 2 - (B.x + B.w / 2);
            const dy2 = PL.y + PL.h / 2 - (B.y + B.h / 2);
            B.flameAngle += (Math.atan2(dy2, dx2) - B.flameAngle) * 0.07;
        }

        // ── UPDATE FLAME PARTICLES ──
        B.flames = B.flames.filter(f => f.t < f.life);
        for (const f of B.flames) {
            f.x += f.vx; f.y += f.vy; f.vx *= 0.93; f.vy *= 0.93;
            f.r *= 0.95; f.t++; f.alpha = 1 - (f.t / f.life);
            if (PL.invincible === 0 && ov(PL, {x: f.x - f.r, y: f.y - f.r, w: f.r * 2, h: f.r * 2})) {
                f.t = f.life;
                hurtPl({sev: 0.8 + B.phase * .3});
            }
        }

        // ── UPDATE PROJECTILES (fireballs) ──
        B.projectiles = B.projectiles.filter(p => p.t < p.life && p.x > -50 && p.x < W + 50 && p.y > -50 && p.y < H + 50);
        for (const p of B.projectiles) {
            p.x += p.vx; p.y += p.vy;
            p.vy += 0.08; // slight gravity on fireballs
            p.spin += p.spinV; p.t++;
            if (PL.invincible === 0 && ov(PL, {x: p.x - p.r, y: p.y - p.r, w: p.r * 2, h: p.r * 2})) {
                p.t = p.life;
                spawnP(p.x, p.y, 'rgba(255,80,0,0.8)', 8);
                hurtPl({sev: 1 + (B.phase * .5)});
            }
        }

        // ── UPDATE MINIS ──
        updateMiniMonsters();

        // Drop arsenal pickups
        B.dropCd--;
        const totalTools = G.collectedEPP.length + G.collectedControls.length;
        if (B.dropCd <= 0 && B.dropsGiven < Math.max(3, totalTools) && BOSS_DROPS.filter(d => !d.collected).length < 3) {
            B.dropCd = 200 - B.phase * 40;
            spawnArsenalDrop();
        }

        if (B.flashTimer > 0) B.flashTimer--;
        if (B.shakeX !== 0) {B.shakeX *= .7; if (Math.abs(B.shakeX) < 0.5) B.shakeX = 0;}
        if (B.shakeY !== 0) {B.shakeY *= .7; if (Math.abs(B.shakeY) < 0.5) B.shakeY = 0;}

        const el = $('hv-boss-hp');
        if (el) {
            el.textContent = '🐲 ' + Math.max(0, Math.round(B.hp / B.maxHP * 100)) + '%';
            el.style.color = hpPct > .5 ? '#ff55ff' : hpPct > .2 ? '#ff8800' : '#ff3355';
        }
    }

    function spawnMiniMonster(originX, originY) {
        if (!BOSS || !BOSS.minis) return;
        const W = CV.width;
        const side = Math.random() > .5 ? 1 : -1;
        BOSS.minis.push({

            vx: side * (1.5 + Math.random() * 1.5),
            vy: -4 - Math.random() * 3,

            bt: Math.random() * Math.PI * 2,

            emoji: '👾',
        });
    }
    function updateMiniMonsters() {
        if (!BOSS || !BOSS.minis) return;
        const H = CV.height, W = CV.width;
        for (const m of BOSS.minis) {
            if (!m.alive) continue;
            m.t++;
            m.bt += .06;
            m.vy += 0.45; // gravity
            m.x += m.vx;
            m.y += m.vy;
            // Bounce off walls
            if (m.x < 0) {m.x = 0; m.vx = Math.abs(m.vx);}
            if (m.x > W - m.w) {m.x = W - m.w; m.vx = -Math.abs(m.vx);}
            // Land on platforms
            m.onGround = false;
            for (const p of PLATS) {
                if (m.x + m.w > p.x && m.x < p.x + p.w && m.y + m.h > p.y && m.y + m.h < p.y + p.h + 16 && m.vy >= 0) {
                    m.y = p.y - m.h; m.vy = 0; m.onGround = true;
                }
            }
            if (m.y + m.h >= H) {m.y = H - m.h; m.vy = 0; m.onGround = true;}
            // Caminan hacia el jugador cuando están en el suelo
            if (m.onGround && PL) {
                const dir = PL.x + PL.w / 2 > m.x + m.w / 2 ? 1 : -1;
                m.vx = dir * 1.6;
            }
            if (m.flashTimer > 0) m.flashTimer--;
            // Hit player
            if (PL.invincible === 0 && ov(PL, {x: m.x, y: m.y, w: m.w, h: m.h})) {
                hurtPl({sev: 0.8});
            }
        }
        // Remove dead minis after flash
        BOSS.minis = BOSS.minis.filter(m => m.alive || m.flashTimer > 0);

        // Victoria: jefe muerto + todos los minis eliminados
        if (BOSS._waitingForMinis && !LEVEL_DONE) {
            const anyAlive = BOSS.minis.some(m => m.alive);
            if (!anyAlive && BOSS.minis.length > 0) {
                BOSS._waitingForMinis = false;
                notify('🏆 ¡TODOS LOS MONSTRUITOS ELIMINADOS! ¡RIESGO EXTINGUIDO!', 'g');
                spawnP(W / 2, H / 2, 'rgba(0,238,255,0.9)', 50);
                snd('good');
                setTimeout(() => finishLevel(), 1400);
            }
        }
    }
    function drawMiniMonsters() {
        if (!BOSS || !BOSS.minis) return;
        const t = Date.now();
        for (const m of BOSS.minis) {
            if (!m.alive && m.flashTimer <= 0) continue;
            const my = m.y + Math.sin(m.bt) * 2;
            // Glow
            const mg = CX.createRadialGradient(m.x + m.w / 2, my + m.h / 2, 0, m.x + m.w / 2, my + m.h / 2, 22);
            mg.addColorStop(0, 'rgba(120,80,255,.35)'); mg.addColorStop(1, 'rgba(0,0,0,0)');

    function drawBoss() {
        if (!BOSS || !BOSS.alive) return;
        const B = BOSS;
        const W = CV.width;
        if (!isFinite(B.x) || !isFinite(B.y)) return;
        const bx = B.x + (isFinite(B.shakeX) ? B.shakeX : 0);
        const by = B.y + (isFinite(B.shakeY) ? B.shakeY : 0);
        const hpPct = Math.max(0, Math.min(1, B.hp / B.maxHP));
        const t = Date.now();

        // ── DRAW FLAMES FIRST (visual stream, behind boss) ──
        for (const f of B.flames) {
            if (!isFinite(f.x) || !isFinite(f.y)) continue;
            const r = Math.max(1, f.r);
            const fg = CX.createRadialGradient(f.x, f.y, 0, f.x, f.y, r);
            const progress = f.t / f.life;
            fg.addColorStop(0, progress < .4 ? 'rgba(255,255,180,' + (f.alpha * .95) + ')' : 'rgba(255,140,0,' + (f.alpha * .9) + ')');
            fg.addColorStop(.5, 'rgba(255,60,0,' + (f.alpha * .7) + ')');
            fg.addColorStop(1, 'rgba(200,0,0,0)');
            CX.fillStyle = fg;
            CX.beginPath(); CX.arc(f.x, f.y, r, 0, Math.PI * 2); CX.fill();
        }

        // ── DRAW FIREBALLS (proyectiles visibles) ──
        for (const p of B.projectiles) {
            if (!isFinite(p.x) || !isFinite(p.y)) continue;
            const pr = Math.max(4, p.r);
            // Outer glow
            const pg = CX.createRadialGradient(p.x, p.y, 0, p.x, p.y, pr * 2.2);
            pg.addColorStop(0, 'rgba(255,220,80,.6)');
            pg.addColorStop(.35, 'rgba(255,80,0,.45)');
            pg.addColorStop(.7, 'rgba(200,30,0,.2)');
            pg.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = pg; CX.beginPath(); CX.arc(p.x, p.y, pr * 2.2, 0, Math.PI * 2); CX.fill();
            // Core ball
            const pc = CX.createRadialGradient(p.x - pr * .25, p.y - pr * .25, 0, p.x, p.y, pr);
            pc.addColorStop(0, 'rgba(255,255,200,1)');
            pc.addColorStop(.4, 'rgba(255,140,0,1)');
            pc.addColorStop(.8, 'rgba(220,40,0,1)');
            pc.addColorStop(1, 'rgba(100,0,0,0.8)');
            CX.fillStyle = pc; CX.beginPath(); CX.arc(p.x, p.y, pr, 0, Math.PI * 2); CX.fill();
            // Spin trail sparks
            for (let s = 0; s < 3; s++) {
                const sa = p.spin + s * (Math.PI * 2 / 3);
                const sx = p.x + Math.cos(sa) * pr * .6;
                const sy = p.y + Math.sin(sa) * pr * .6;
                CX.fillStyle = 'rgba(255,200,50,.7)';
                CX.beginPath(); CX.arc(sx, sy, pr * .18, 0, Math.PI * 2); CX.fill();
            }
        }

        // Boss aura
        const auraR = Math.max(1, B.w * (1.5 + Math.sin(t * .003) * .3));
        const auraCol = B.phase === 3 ? 'rgba(255,0,80,.22)' : B.phase === 2 ? 'rgba(255,100,0,.18)' : 'rgba(255,80,0,.14)';
        const ag = CX.createRadialGradient(bx + B.w / 2, by + B.h / 2, 0, bx + B.w / 2, by + B.h / 2, auraR);
        ag.addColorStop(0, auraCol); ag.addColorStop(1, 'rgba(0,0,0,0)');
        CX.fillStyle = ag; CX.fillRect(bx - B.w, by - B.w, B.w * 3, B.h * 3);

        // Phase 3 lightning bolts
        if (B.phase === 3) {
            CX.save(); CX.globalAlpha = 0.5 + Math.sin(t * .01) * .3;
            CX.strokeStyle = '#ff5500'; CX.lineWidth = 2;
            for (let i = 0; i < 4; i++) {
                const ang = (t * .003 + i * 1.57);
                const sx = bx + B.w / 2 + Math.cos(ang) * 80;
                const sy = by + B.h / 2 + Math.sin(ang) * 70;
                CX.beginPath(); CX.moveTo(bx + B.w / 2, by + B.h / 2); CX.lineTo(sx, sy); CX.stroke();
            }
            CX.restore();
        }

        // Flash on hit
        if (B.flashTimer > 0) {
            CX.save(); CX.globalAlpha = B.flashTimer / 15;
            CX.fillStyle = '#fff'; CX.fillRect(bx - 4, by - 4, B.w + 8, B.h + 8);
            CX.restore();
        }

        // Boss sprite
        const size = B.phase === 3 ? 74 : B.phase === 2 ? 70 : 62;
        const bob = Math.sin(t * .005) * 5;
        CX.save();
        CX.translate(bx + B.w / 2, by + B.h / 2 + bob);
        if (B.enrageAnim > 0) {const sc = 1 + (B.enrageAnim / 60) * .3; CX.scale(sc, sc);}
        if (B.md === -1) CX.scale(-1, 1);
        CX.shadowColor = '#ff4400'; CX.shadowBlur = 20 + B.phase * 8;
        CX.font = size + 'px serif'; CX.textAlign = 'center'; CX.textBaseline = 'middle';
        const sprite = B.phase === 3 ? '🐉' : B.phase === 2 ? '😈' : '🐲';
        CX.fillText(sprite, 0, 0);
        if (B.isThrowing) {
            CX.font = (size * 0.55) + 'px serif';
            CX.fillText('🔥', -(size * .3), -(size * .4));
            CX.fillText('🔥', (size * .3), -(size * .4));
        }
        CX.restore(); CX.textBaseline = 'alphabetic'; CX.textAlign = 'left';

        // Flame thrower muzzle flash
        if (B.isThrowing) {
            const mx = bx + B.w / 2 + Math.cos(B.flameAngle) * 42;
            const my = by + B.h / 2 + Math.sin(B.flameAngle) * 42;
            const mg = CX.createRadialGradient(mx, my, 0, mx, my, 20);
            mg.addColorStop(0, 'rgba(255,255,100,.8)');
            mg.addColorStop(.4, 'rgba(255,120,0,.5)');
            mg.addColorStop(1, 'rgba(255,0,0,0)');
            CX.fillStyle = mg; CX.beginPath(); CX.arc(mx, my, 20, 0, Math.PI * 2); CX.fill();
        }

        // Phase label
        const phLbl = ['', 'FASE 1', 'FURIA', 'LLAMAS TOTALES'][B.phase];
        const phCol = ['', '#ff8800', '#ff6600', '#ff3333'][B.phase];
        const bossLabel = '🐲 MONSTRUO DE FUEGO';
        CX.font = 'bold 9px "JetBrains Mono",monospace';
        CX.fillStyle = phCol; CX.textAlign = 'center';
        CX.fillText(bossLabel + ' · ' + phLbl, bx + B.w / 2, by - 14);

        // HP bar
        const barW = B.w + 40, barX = bx - 20, barY = by - 32;
        CX.fillStyle = 'rgba(0,0,0,.8)'; CX.fillRect(barX, barY, barW, 10);
        const hpCol = hpPct > .5 ? '#ff55ff' : hpPct > .2 ? '#ff8800' : '#ff3355';
        CX.fillStyle = hpCol; CX.fillRect(barX, barY, barW * hpPct, 10);
        CX.strokeStyle = 'rgba(255,255,255,.2)'; CX.lineWidth = 1; CX.strokeRect(barX, barY, barW, 10);
        CX.font = 'bold 7px "JetBrains Mono",monospace';
        CX.fillStyle = '#fff'; CX.textAlign = 'center';
        CX.fillText(bossLabel + ' — ' + Math.max(0, Math.round(hpPct * 100)) + '%', barX + barW / 2, barY - 4);

        // Arsenal meter
        const arTotal = Math.max(3, G.collectedEPP.length + G.collectedControls.length);
        const arPct = Math.min(1, (B.arsenalUsed || 0) / arTotal);
        CX.fillStyle = 'rgba(0,0,0,.7)'; CX.fillRect(barX, barY + 14, barW, 6);
        CX.fillStyle = '#00eeff'; CX.fillRect(barX, barY + 14, barW * arPct, 6);
        CX.font = '6px "JetBrains Mono",monospace';
        CX.fillStyle = '#00eeff'; CX.textAlign = 'center';
        CX.fillText('ARSENAL: ' + B.arsenalUsed + '/' + arTotal, barX + barW / 2, barY + 25);

        // Arsenal drops
        for (const bd of BOSS_DROPS) {
            if (bd.collected) continue;
            if (!isFinite(bd.x) || !isFinite(bd.y)) continue;
            const bdY = bd.y + Math.sin(bd.bt) * 5;
            const bdg = CX.createRadialGradient(bd.x + 14, bdY + 14, 0, bd.x + 14, bdY + 14, 28);
            bdg.addColorStop(0, 'rgba(0,238,255,.3)'); bdg.addColorStop(1, 'rgba(0,0,0,0)');
            CX.fillStyle = bdg; CX.fillRect(bd.x - 8, bdY - 8, 52, 52);
            CX.font = '22px serif'; CX.textAlign = 'center'; CX.fillText(bd.emoji, bd.x + 14, bdY + 20);
            CX.font = '7px "JetBrains Mono",monospace';
            CX.fillStyle = '#00eeff'; CX.textAlign = 'center'; CX.fillText('ARSENAL', bd.x + 14, bdY - 4);
            CX.textAlign = 'left';
        }

        // Draw mini-monsters
        drawMiniMonsters();
    }
    function drawMarioMushroom(cx, x, y, size, capColor, pulse) {

        CX.fillRect(cx2 - r * .55, cy2 + r * .1, r * 1.1, r * .55);
        // Stem eyes

        CX.beginPath(); CX.ellipse(cx2 + r * .22, cy2 + r * .35, r * .1, r * .16, .2, 0, Math.PI * 2); CX.fill();

        // Cap
        CX.fillStyle = capColor;
        CX.beginPath(); CX.arc(cx2, cy2, r, Math.PI, 0, false); CX.fill();

    function hurtBoss(dmg) {
        if (!BOSS || !BOSS.alive) return;
        const mult = bossDamageMult();
        const final = Math.round(dmg * mult);
        BOSS.hp = Math.max(0, BOSS.hp - final);
        BOSS.flashTimer = 15;
        BOSS.shakeX = (Math.random() - .5) * 14;
        BOSS.shakeY = (Math.random() - .5) * 8;
        spawnP(BOSS.x + BOSS.w / 2, BOSS.y + BOSS.h / 2, 'rgba(255,100,200,0.8)', 10);
        ft(BOSS.x + BOSS.w / 2, BOSS.y, '−' + final + ' HP', '#ff55ff');
        snd('kill');

        // Spawn 1 mini por umbral mientras el jefe vive
        const hpPct = Math.round(BOSS.hp / BOSS.maxHP * 100);
        for (const thresh of BOSS.miniSpawnThresholds) {
            if (hpPct <= thresh && !BOSS.miniSpawned.includes(thresh)) {
                BOSS.miniSpawned.push(thresh);
                notify(`👾 ¡El monstruo suelta un mini! (${BOSS.miniSpawned.length}/5)`, 'b');
                spawnP(BOSS.x + BOSS.w / 2, BOSS.y + BOSS.h, 'rgba(255,60,0,0.9)', 20);
            }
        }

        if (BOSS.hp <= 0) {
            BOSS.alive = false;
            snd('good');
            spawnP(BOSS.x + BOSS.w / 2, BOSS.y + BOSS.h / 2, 'rgba(255,200,0,0.9)', 60);
            ft(BOSS.x + BOSS.w / 2, BOSS.y - 20, '¡MONSTRUO CAÍDO!', '#ffcc00');
            notify('💥 ¡MONSTRUO DERRIBADO! ¡Pero soltó sus monstruitos — elimínalos todos!', 'w');

            // Soltar 5 monstruitos caminadores al morir el jefe
            const W = CV.width, H = CV.height;
            for (let i = 0; i < 5; i++) {
                setTimeout(() => {
                    if (BOSS && BOSS.minis !== undefined)
                        spawnMiniMonster(BOSS.x + BOSS.w / 2 + (i - 2) * 35, BOSS.y + BOSS.h);
                }, i * 180);
            }

            // Hongos de batalla: rojo=crece, verde=encoge
            setTimeout(() => spawnBossMushrooms(), 600);

            // Verificar victoria: cuando todos los minis mueran
            BOSS._waitingForMinis = true;
        }
    }

    /* ═══════════════════════════════════════════
       CELULAR DISTRACTOR (Level 3 LOTO)
       Mecánica: el celular aparece en zonas claramente
       separadas de los LOTO. El jugador puede IGNORARLO
       o acercarse y presionar [E] para "usarlo" (penalización).
       NO penaliza al pasar caminando cerca.
    ═══════════════════════════════════════════ */
    let PHONE_EMOJIS = [];
    function initPhoneDistractors() {
        PHONE_EMOJIS = [];
        // Place phones in CORNERS / edges of platforms — far from collectibles
        // Collectibles are at pl.w*.68; phones go at the far left edge (pl.x+8)
        // Only on platforms 1 and 3 (skip platform 2 which has the most LOTO items)
        const slots = [
            {pl: PLATS[1], xOff: 8},     // plataforma 2, lado izquierdo
            {pl: PLATS[3], xOff: PLATS[3].w - 36}, // plataforma 4, lado derecho
            {pl: PLATS[4], xOff: 8},     // plataforma 5, lado izquierdo
        ];
        for (const s of slots) {
            PHONE_EMOJIS.push({
                x: s.pl.x + s.xOff,
                y: s.pl.y - 44,
                w: 34, h: 40,
                warnR: 55,        // radio de zona de advertencia visible
                bt: Math.random() * Math.PI * 2,
                active: true,
                respawnT: 0,
                nearTimer: 0,     // cuánto tiempo lleva el jugador dentro de la zona
                ringing: false,   // animación de "vibración"
            });
        }
    }
    function updatePhone() {
        for (const ph of PHONE_EMOJIS) {
            if (!ph.active) {
                ph.respawnT--;
                if (ph.respawnT <= 0) {ph.active = true; ph.nearTimer = 0; ph.ringing = false;}
                continue;
            }
            ph.bt += .05;
            const dist = Math.hypot(PL.x + PL.w / 2 - (ph.x + ph.w / 2), PL.y + PL.h / 2 - (ph.y + ph.h / 2));
            const inZone = dist < ph.warnR;
            ph.ringing = inZone;

            if (inZone) {
                ph.nearTimer++;
                // Warn player after 30 frames in zone
                if (ph.nearTimer === 30) {
                    notify('📱 ¡Celular cerca! Presiona [E] para usarlo o IGNÓRALO y sigue trabajando', 'w');
                }
            } else {
                ph.nearTimer = 0;
            }

            // Penalty ONLY when player presses E while inside zone (handled in keydown)
        }
    }
    function triggerPhoneUse() {
        // Called when player presses E near a phone
        if (!ZONE || !ZONE.isLotoLevel) return false;
        for (const ph of PHONE_EMOJIS) {
            if (!ph.active) continue;
            const dist = Math.hypot(PL.x + PL.w / 2 - (ph.x + ph.w / 2), PL.y + PL.h / 2 - (ph.y + ph.h / 2));
            if (dist < ph.warnR) {
                // Player chose to use the phone!
                G.phoneUses++;
                const pen = 12;
                G.xp = Math.max(0, G.xp - pen);
                G.phonePenalty = (G.phonePenalty || 0) + pen;
                PL.invincible = 25;
                spawnP(ph.x + ph.w / 2, ph.y, 'rgba(255,200,0,0.8)', 12);
                ft(ph.x + ph.w / 2, ph.y - 14, '📱 DISTRACCIÓN -' + pen + ' XP', '#ffcc00');
                notify('📱 Usaste el celular en zona operativa — conducta insegura! -' + pen + ' XP', 'b');

                ph.active = false;
                ph.respawnT = 420; // 7 seconds before reappearing
                const el = $('hv-phone'); if (el) el.textContent = '-' + (G.phonePenalty || 0) + 'xp';

        }
