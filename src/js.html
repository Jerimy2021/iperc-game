<script>
    // 1. Efecto Visual: Escanear Enemigo en Tiempo Real
    const inputsAmenaza = document.querySelectorAll('.game-input');
    const bossBar = document.getElementById('boss-atk-bar');
    const bossText = document.getElementById('boss-atk-text');

    function actualizarPoderEnemigo() {
        let s = parseInt(document.getElementById('sel-severidad').value);
        let e = parseInt(document.getElementById('sel-exposicion').value);
        let poder = s * e; // Máximo 9

        // Animamos la barra del jefe (escala visual de 10 a 100%)
        let porcentaje = (poder / 9) * 100;
        bossBar.style.width = porcentaje + '%';
        bossText.innerText = (poder * 10) + ' ATK';
    }

    // Escuchar cambios en los selects de Amenaza
    inputsAmenaza.forEach(input => input.addEventListener('change', actualizarPoderEnemigo));

    // 2. El Golpe Final (Botón de Impacto)
    const btnImpacto = document.getElementById('btn-impact');

    btnImpacto.addEventListener('click', () => {
        // Bloquear botón mientras procesa
        btnImpacto.disabled = true;
        btnImpacto.innerText = '⚔️ CALCULANDO DAÑO...';

        // Recopilar datos
        const datos = {
            severidad: document.getElementById('sel-severidad').value,
            exposicion: document.getElementById('sel-exposicion').value,
            ingenieria: document.getElementById('sel-ingenieria').value,
            epp: document.getElementById('sel-epp').value
        };

        // Enviar al servidor
        google.script.run
            .withSuccessHandler(recibirImpacto)
            .procesarMisionIPERC(datos);
    });

    // 3. Procesar el Daño en Pantalla
    function recibirImpacto(resultado) {
        // Actualizar barra de vida del jugador
        const playerBar = document.getElementById('player-hp-bar');
        const playerText = document.getElementById('player-hp-text');

        playerBar.style.width = resultado.hp + '%';
        playerText.innerText = resultado.hp + '% HP';

        // Cambiar color de vida si baja mucho
        if (resultado.hp <= 30) {
            playerBar.style.background = 'var(--riesgo-intolerable)';
            playerBar.style.boxShadow = '0 0 10px var(--riesgo-intolerable)';
        } else {
            playerBar.style.background = 'var(--riesgo-aceptable)';
            playerBar.style.boxShadow = '0 0 10px var(--riesgo-aceptable)';
        }

        // Mostrar Panel de Resultados
        const panel = document.getElementById('battle-result');
        const statusEl = document.getElementById('result-status');
        const scoreEl = document.getElementById('result-score');

        panel.style.display = 'block';
        panel.className = `hud-result border-${resultado.claseCSS}`;

        statusEl.innerText = resultado.estadoFinal;
        statusEl.className = `hud-status status-${resultado.claseCSS}`;

        scoreEl.innerText = `Daño Residual: ${resultado.danioRecibido}`;

        // Restaurar botón
        btnImpacto.disabled = false;
        btnImpacto.innerText = '💥 RECIBIR IMPACTO 💥';
    }
</script>
